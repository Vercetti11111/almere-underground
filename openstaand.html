<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Almere Underground – Openstaande Posten</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f13; color: #f1f1f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
    .container { max-width: 480px; margin: 0 auto; padding: 0 12px 80px; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 8px; }
    .header .back { color: #7c3aed; text-decoration: none; font-size: 14px; font-weight: 600; }
    .header .title { font-size: 18px; font-weight: 800; }
    .lang-switch { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 8px; padding: 4px 8px; color: #f1f1f5; font-size: 12px; cursor: pointer; }

    /* Login */
    .login-overlay { position: fixed; inset: 0; background: #0f0f13; display: flex; align-items: center; justify-content: center; z-index: 999; }
    .login-box { text-align: center; padding: 32px; }
    .login-box .icon { font-size: 48px; margin-bottom: 12px; }
    .login-box h2 { font-size: 20px; margin-bottom: 16px; font-weight: 700; }
    .login-box input { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 10px; padding: 12px 16px; color: #f1f1f5; font-size: 16px; width: 200px; text-align: center; outline: none; }
    .login-box input:focus { border-color: #7c3aed; }
    .login-box .err { color: #ef4444; font-size: 12px; margin-top: 8px; min-height: 18px; }

    /* Date nav */
    .date-nav { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 12px 0; position: relative; }
    .date-nav button { background: none; border: none; color: #7c3aed; font-size: 20px; cursor: pointer; padding: 4px 8px; }
    .date-nav .date-label { font-size: 15px; font-weight: 700; cursor: pointer; min-width: 140px; text-align: center; }
    .date-nav input[type="date"] { position: absolute; opacity: 0; width: 140px; height: 30px; cursor: pointer; }

    /* Summary cards */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 12px 0; }
    .summary-card { background: #1a1a24; border-radius: 12px; padding: 12px; text-align: center; }
    .summary-card .label { font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .summary-card .value { font-size: 18px; font-weight: 800; }
    .summary-card .value.green { color: #22c55e; }
    .summary-card .value.orange { color: #f59e0b; }
    .summary-card .value.red { color: #ef4444; }

    /* Section */
    .section { margin: 16px 0 8px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a2a3a; margin-bottom: 8px; }
    .section-title { font-size: 14px; font-weight: 700; }
    .section-count { font-size: 12px; color: #888; }
    .section-total { font-size: 13px; font-weight: 700; color: #f59e0b; }

    /* Booking row */
    .booking-row { background: #1a1a24; border-radius: 10px; padding: 12px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .booking-info { flex: 1; min-width: 0; }
    .booking-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .booking-meta { font-size: 11px; color: #888; margin-top: 2px; }
    .booking-amounts { text-align: right; flex-shrink: 0; }
    .booking-owing { font-size: 14px; font-weight: 800; color: #f59e0b; }
    .booking-total { font-size: 11px; color: #666; }

    /* Status badge */
    .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 6px; }
    .badge.pending { background: #f59e0b22; color: #f59e0b; }
    .badge.partial { background: #3b82f622; color: #3b82f6; }
    .badge.overdue { background: #ef444422; color: #ef4444; }

    /* Loading */
    .loading { text-align: center; padding: 60px 0; color: #888; }
    .loading .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #2a2a3a; border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Refresh btn */
    .refresh-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
    .refresh-info { font-size: 11px; color: #555; }
    .refresh-btn { background: #7c3aed; border: none; color: white; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .refresh-btn:active { opacity: 0.7; }

    /* Month group (collapsible) */
    .month-group { margin: 6px 0; }
    .month-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #1e1e2a; border-radius: 10px; cursor: pointer; user-select: none; }
    .month-header:active { opacity: 0.7; }
    .month-header .month-left { display: flex; align-items: center; gap: 8px; }
    .month-header .chevron { font-size: 12px; color: #888; transition: transform 0.2s; }
    .month-header .chevron.open { transform: rotate(90deg); }
    .month-header .month-name { font-size: 13px; font-weight: 700; }
    .month-header .month-count { font-size: 11px; color: #888; }
    .month-header .month-total { font-size: 13px; font-weight: 700; color: #f59e0b; }
    .month-body { overflow: hidden; transition: max-height 0.3s ease; }
    .month-body.collapsed { max-height: 0 !important; }
    .month-body .booking-row:first-child { margin-top: 6px; }

    /* Empty */
    .empty { text-align: center; padding: 40px 0; color: #555; font-size: 14px; }

    /* Responsive */
    @media (max-width: 380px) {
      .summary-card .value { font-size: 15px; }
      .booking-name { font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="icon">💰</div>
    <h2>Openstaande Posten</h2>
    <input type="password" id="login-code" placeholder="Toegangscode" autofocus />
    <div class="err" id="login-error"></div>
  </div>
</div>

<div class="container" id="app" style="display:none">
  <div class="header">
    <a class="back" href="index.html">← Menu</a>
    <span class="title" id="page-title">Openstaande Posten</span>
    <select class="lang-switch" id="lang-switch">
      <option value="nl">🇳🇱 NL</option>
      <option value="en">🇬🇧 EN</option>
    </select>
  </div>

  <div class="date-nav">
    <button onclick="shiftDate(-1)">‹</button>
    <span class="date-label" id="date-label" onclick="document.getElementById('date-picker').showPicker?.()"></span>
    <input type="date" id="date-picker" />
    <button onclick="shiftDate(1)">›</button>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div><br>Laden...</div>
  </div>
</div>

<script>
const WORKER = 'https://almere-underground.frankkeijzer.workers.dev';
let accessCode = null;
let currentDate = new Date();
let lang = localStorage.getItem('au_lang') || 'nl';
let allBookings = [];
let dataGeneratedAt = null;

// ── Translations ────────────────────────────────────────────────────────────
const T = {
  nl: {
    pageTitle: 'Openstaande Posten',
    outstanding: 'Openstaand',
    totalValue: 'Totaal waarde',
    paid: 'Betaald',
    pastBookings: 'Verlopen boekingen',
    futureBookings: 'Toekomstige boekingen',
    noOutstanding: 'Geen openstaande posten gevonden',
    loading: 'Laden...',
    refreshed: 'Bijgewerkt',
    refresh: '🔄 Ververs',
    pending: 'Te betalen',
    partial: 'Deelbetaling',
    overdue: 'Achterstallig',
    visit: 'Bezoek',
    created: 'Aangemaakt',
    bookings: 'boekingen',
    months: ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'],
    days: ['zo','ma','di','wo','do','vr','za'],
  },
  en: {
    pageTitle: 'Outstanding Payments',
    outstanding: 'Outstanding',
    totalValue: 'Total value',
    paid: 'Paid',
    pastBookings: 'Past bookings',
    futureBookings: 'Future bookings',
    noOutstanding: 'No outstanding payments found',
    loading: 'Loading...',
    refreshed: 'Updated',
    refresh: '🔄 Refresh',
    pending: 'Pending',
    partial: 'Partial',
    overdue: 'Overdue',
    visit: 'Visit',
    created: 'Created',
    bookings: 'bookings',
    months: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    days: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
  }
};

function t(key) { return (T[lang] || T.nl)[key] || key; }

function fmtEur(n) {
  return '€' + (n || 0).toLocaleString('nl-NL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDateShort(iso) {
  if (!iso) return '-';
  const d = new Date(iso + 'T12:00:00');
  return `${d.getDate()} ${t('months')[d.getMonth()]} ${d.getFullYear()}`;
}

function fmtDateLabel(d) {
  const day = t('days')[d.getDay()];
  const date = d.getDate();
  const month = t('months')[d.getMonth()];
  const year = d.getFullYear();
  return `${day} ${date} ${month} ${year}`;
}

function dateStr(d) {
  return d.toISOString().split('T')[0];
}

// ── Login ───────────────────────────────────────────────────────────────────
const loginInput = document.getElementById('login-code');
loginInput.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  const code = loginInput.value.trim();
  if (!code) return;
  try {
    const r = await fetch(`${WORKER}/health`);
    // Verify code by making a test call
    const r2 = await fetch(`${WORKER}/api/openstaand?code=${encodeURIComponent(code)}`);
    const d = await r2.json();
    if (d.error === 'Ongeldige toegangscode') {
      document.getElementById('login-error').textContent = lang === 'nl' ? 'Ongeldige code' : 'Invalid code';
      return;
    }
    accessCode = code;
    localStorage.setItem('au_code', code);
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  } catch (err) {
    document.getElementById('login-error').textContent = 'Verbindingsfout';
  }
});

// Auto-login
const savedCode = localStorage.getItem('au_code');
if (savedCode) {
  accessCode = savedCode;
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}

// ── Language ────────────────────────────────────────────────────────────────
const langSwitch = document.getElementById('lang-switch');
langSwitch.value = lang;
langSwitch.addEventListener('change', () => {
  lang = langSwitch.value;
  localStorage.setItem('au_lang', lang);
  render();
});

// ── Date navigation ─────────────────────────────────────────────────────────
const datePicker = document.getElementById('date-picker');
datePicker.value = dateStr(currentDate);
datePicker.addEventListener('change', () => {
  currentDate = new Date(datePicker.value + 'T12:00:00');
  render();
});

function shiftDate(delta) {
  currentDate.setDate(currentDate.getDate() + delta);
  datePicker.value = dateStr(currentDate);
  render();
}

// ── Data loading ────────────────────────────────────────────────────────────
async function loadData() {
  const content = document.getElementById('content');
  content.innerHTML = `<div class="loading"><div class="spinner"></div><br>${t('loading')}</div>`;

  try {
    const r = await fetch(`${WORKER}/api/openstaand?code=${encodeURIComponent(accessCode)}`);
    const data = await r.json();
    if (data.error) {
      content.innerHTML = `<div class="empty">⚠️ ${data.error}</div>`;
      return;
    }
    allBookings = data.bookings || [];
    dataGeneratedAt = data.generatedAt || null;
    render();
  } catch (err) {
    content.innerHTML = `<div class="empty">⚠️ ${err.message}</div>`;
  }
}

// ── Render ──────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('page-title').textContent = t('pageTitle');
  document.getElementById('date-label').textContent = fmtDateLabel(currentDate);

  const refDate = dateStr(currentDate);
  const content = document.getElementById('content');

  if (!allBookings.length) {
    content.innerHTML = `<div class="empty">${t('noOutstanding')}</div>`;
    return;
  }

  // Split past vs future based on selected date
  const past = [];
  const future = [];

  for (const b of allBookings) {
    if (b.bookingDate <= refDate) {
      past.push(b);
    } else {
      future.push(b);
    }
  }

  // Sort: past by createdDate descending, future by bookingDate ascending
  past.sort((a, b) => (b.createdDate || '').localeCompare(a.createdDate || ''));
  future.sort((a, b) => (a.bookingDate || '').localeCompare(b.bookingDate || ''));

  const totalOwing = allBookings.reduce((s, b) => s + (b.owing || 0), 0);
  const totalValue = allBookings.reduce((s, b) => s + (b.total || 0), 0);
  const totalPaid = totalValue - totalOwing;
  const pastOwing = past.reduce((s, b) => s + (b.owing || 0), 0);
  const futureOwing = future.reduce((s, b) => s + (b.owing || 0), 0);

  let html = '';

  // Summary
  html += `<div class="summary-grid">
    <div class="summary-card">
      <div class="label">${t('outstanding')}</div>
      <div class="value orange">${fmtEur(totalOwing)}</div>
    </div>
    <div class="summary-card">
      <div class="label">${t('totalValue')}</div>
      <div class="value">${fmtEur(totalValue)}</div>
    </div>
    <div class="summary-card">
      <div class="label">${t('paid')}</div>
      <div class="value green">${fmtEur(totalPaid)}</div>
    </div>
  </div>`;

  // Refresh bar
  const genTime = dataGeneratedAt ? new Date(dataGeneratedAt).toLocaleString('nl-NL', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : '-';
  html += `<div class="refresh-bar">
    <span class="refresh-info">${t('refreshed')}: ${genTime}</span>
    <button class="refresh-btn" onclick="loadData()">${t('refresh')}</button>
  </div>`;

  // Past bookings
  if (past.length > 0) {
    html += renderSection(t('pastBookings'), past, pastOwing, true);
  }

  // Future bookings — grouped by month
  if (future.length > 0) {
    html += renderFutureGrouped(future, futureOwing);
  }

  if (past.length === 0 && future.length === 0) {
    html += `<div class="empty">${t('noOutstanding')}</div>`;
  }

  content.innerHTML = html;

  // Set initial max-height for open month groups
  document.querySelectorAll('.month-body:not(.collapsed)').forEach(el => {
    el.style.maxHeight = el.scrollHeight + 'px';
  });
}

function getMonthKey(iso) {
  if (!iso) return '0000-00';
  return iso.substring(0, 7); // "2026-07"
}

function getMonthLabel(key) {
  const [y, m] = key.split('-').map(Number);
  const monthNames = {
    nl: ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'],
    en: ['January','February','March','April','May','June','July','August','September','October','November','December']
  };
  const names = monthNames[lang] || monthNames.nl;
  return `${names[m - 1]} ${y}`;
}

function renderFutureGrouped(bookings, totalOwing) {
  // Group by month
  const groups = new Map();
  for (const b of bookings) {
    const key = getMonthKey(b.bookingDate);
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(b);
  }

  // Current month and next month should be expanded
  const now = new Date();
  const curKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
  const nextKey = `${nextMonth.getFullYear()}-${String(nextMonth.getMonth() + 1).padStart(2, '0')}`;

  let html = `<div class="section">
    <div class="section-header">
      <div>
        <span class="section-title">${t('futureBookings')}</span>
        <span class="section-count"> · ${bookings.length} ${t('bookings')}</span>
      </div>
      <span class="section-total">${fmtEur(totalOwing)}</span>
    </div>`;

  let groupIdx = 0;
  for (const [monthKey, monthBookings] of groups) {
    const monthOwing = monthBookings.reduce((s, b) => s + (b.owing || 0), 0);
    const isOpen = monthKey === curKey || monthKey === nextKey;
    const gid = `mg-${groupIdx++}`;

    html += `<div class="month-group">
      <div class="month-header" onclick="toggleMonth('${gid}', this)">
        <div class="month-left">
          <span class="chevron ${isOpen ? 'open' : ''}" id="${gid}-chev">▶</span>
          <span class="month-name">${getMonthLabel(monthKey)}</span>
          <span class="month-count">(${monthBookings.length})</span>
        </div>
        <span class="month-total">${fmtEur(monthOwing)}</span>
      </div>
      <div class="month-body ${isOpen ? '' : 'collapsed'}" id="${gid}">`;

    for (const b of monthBookings) {
      const badgeClass = b.status === 'PartiallyPaid' ? 'partial' : 'pending';
      const badgeText = b.status === 'PartiallyPaid' ? t('partial') : t('pending');

      html += `<div class="booking-row">
        <div class="booking-info">
          <div class="booking-name">${escHtml(b.name || '–')}</div>
          <div class="booking-meta">
            <span class="badge ${badgeClass}">${badgeText}</span>
            ${t('visit')}: ${fmtDateShort(b.bookingDate)}
          </div>
        </div>
        <div class="booking-amounts">
          <div class="booking-owing">${fmtEur(b.owing)}</div>
          <div class="booking-total">/ ${fmtEur(b.total)}</div>
        </div>
      </div>`;
    }

    html += `</div></div>`;
  }

  html += '</div>';
  return html;
}

function toggleMonth(gid, headerEl) {
  const body = document.getElementById(gid);
  const chev = document.getElementById(gid + '-chev');
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    body.style.maxHeight = body.scrollHeight + 'px';
    chev.classList.add('open');
  } else {
    body.style.maxHeight = body.scrollHeight + 'px';
    requestAnimationFrame(() => {
      body.classList.add('collapsed');
      chev.classList.remove('open');
    });
  }
}

function renderSection(title, bookings, totalOwing, isPast) {
  let html = `<div class="section">
    <div class="section-header">
      <div>
        <span class="section-title">${title}</span>
        <span class="section-count"> · ${bookings.length} ${t('bookings')}</span>
      </div>
      <span class="section-total">${fmtEur(totalOwing)}</span>
    </div>`;

  for (const b of bookings) {
    const isOverdue = isPast && b.status === 'PendingPayment';
    const badgeClass = isOverdue ? 'overdue' : (b.status === 'PartiallyPaid' ? 'partial' : 'pending');
    const badgeText = isOverdue ? t('overdue') : (b.status === 'PartiallyPaid' ? t('partial') : t('pending'));

    const metaDate = isPast
      ? `${t('created')}: ${fmtDateShort(b.createdDate ? b.createdDate.split('T')[0] : null)} · ${t('visit')}: ${fmtDateShort(b.bookingDate)}`
      : `${t('visit')}: ${fmtDateShort(b.bookingDate)}`;

    html += `<div class="booking-row">
      <div class="booking-info">
        <div class="booking-name">${escHtml(b.name || '–')}</div>
        <div class="booking-meta">
          <span class="badge ${badgeClass}">${badgeText}</span>
          ${metaDate}
        </div>
      </div>
      <div class="booking-amounts">
        <div class="booking-owing">${fmtEur(b.owing)}</div>
        <div class="booking-total">/ ${fmtEur(b.total)}</div>
      </div>
    </div>`;
  }

  html += '</div>';
  return html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
