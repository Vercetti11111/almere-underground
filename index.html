<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Almere Underground – Analytics</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    body { margin: 0; background: #0f0f13; color: #f1f1f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    select { background: #1a1a24; color: #f1f1f5; border: 1px solid #3a3a4a; border-radius: 8px; padding: 6px 10px; font-size: 14px; cursor: pointer; }

    /* Login */
    #login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .login-logo { font-size:40px; margin-bottom:12px; }
    .login-title { font-size:22px; font-weight:800; margin-bottom:4px; }
    .login-sub { font-size:13px; color:#888; margin-bottom:32px; }
    .login-card { background:#1a1a24; border-radius:20px; padding:28px 24px; width:100%; max-width:360px; }
    .login-label { font-size:12px; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }
    .login-input { width:100%; background:#0f0f13; border:2px solid #2a2a38; border-radius:12px; padding:14px 16px; font-size:18px; color:#f1f1f5; letter-spacing:0.15em; text-align:center; outline:none; transition:border-color 0.2s; font-family:monospace; }
    .login-input:focus { border-color:#7c3aed; }
    .login-input.error { border-color:#ef4444; animation: shake 0.3s; }
    .login-btn { width:100%; margin-top:16px; background:#7c3aed; color:white; border:none; border-radius:12px; padding:15px; font-size:16px; font-weight:700; cursor:pointer; transition:background 0.2s; }
    .login-btn:active { background:#6d28d9; }
    .login-error { color:#ef4444; font-size:13px; text-align:center; margin-top:12px; min-height:18px; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    /* App */
    #app-screen { display:none; max-width:480px; margin:0 auto; padding:16px 12px 90px; }

    /* Common */
    .card { background:#1a1a24; border-radius:16px; padding:16px; margin-bottom:12px; }
    .card-sm { background:#1a1a24; border-radius:12px; padding:12px; }
    .tab-bar { background:#1a1a24; border-radius:12px; padding:4px; display:flex; gap:4px; margin-bottom:20px; }
    .tab-btn { flex:1; padding:8px 2px; border-radius:8px; font-size:12px; font-weight:600; text-align:center; cursor:pointer; border:none; background:transparent; color:#888; transition:all 0.2s; white-space:nowrap; }
    .tab-btn.active { background:#7c3aed; color:white; }
    .bar-bg { background:#2a2a38; border-radius:999px; height:6px; }
    .bar-fill { border-radius:999px; height:6px; transition:width 0.4s ease; }
    .kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
    .kpi-card { background:#1a1a24; border-radius:12px; padding:12px 8px; text-align:center; }
    .kpi-label { font-size:11px; color:#888; margin-bottom:2px; }
    .kpi-value { font-size:16px; font-weight:700; }
    .section-title { font-size:12px; font-weight:700; color:#aaa; margin-bottom:12px; text-transform:uppercase; letter-spacing:0.05em; }
    .spinner { width:32px; height:32px; border:3px solid #2a2a38; border-top-color:#7c3aed; border-radius:50%; animation:spin 0.8s linear infinite; margin:48px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .nav-btn { background:#1a1a24; border:none; color:#aaa; border-radius:10px; padding:8px 14px; font-size:18px; cursor:pointer; }
    .nav-btn:active { background:#2a2a38; }
    .date-label { font-size:15px; font-weight:700; text-align:center; flex:1; }
    .info-banner { background:#1a1a2480; border:1px solid #2a2a3a; border-radius:10px; padding:10px 12px; font-size:12px; color:#888; margin-bottom:12px; }
    .cat-row { margin-bottom:14px; }
    .cat-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
    .cat-name { display:flex; align-items:center; gap:8px; font-size:14px; font-weight:600; }
    .cat-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .cat-sub { display:flex; justify-content:space-between; font-size:11px; color:#888; margin-top:4px; }
    .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; }
    .week-day-card { background:#1a1a24; border-radius:12px; padding:12px; cursor:pointer; transition:background 0.15s; margin-bottom:8px; }
    .week-day-card:active { background:#2a2a38; }

    .err-msg { text-align:center; padding:40px 20px; color:#ef4444; font-size:13px; line-height:1.6; }

    /* Language switcher */
    #lang-select { background:#1a1a24; border:1px solid #2a2a38; color:#f1f1f5; border-radius:8px; padding:5px 8px; font-size:13px; cursor:pointer; }

    /* Runsheet */
    .rs-section { border-radius:14px; overflow:hidden; margin-bottom:20px; }
    .rs-section-header { padding:14px 16px 12px; font-size:14px; font-weight:800; letter-spacing:0.04em; }

  @media print {
    body { background:#fff !important; color:#000 !important; font-size:11pt; }
    #login-screen, .tab-bar, .nav-btn, #refresh-btn, #lang-select, .cache-label, .no-print { display:none !important; }

    .rs-kf { background:#7c1a1a; }

<body>

<!-- ── LOGIN ─────────────────────────────────────────────────────────────── -->

    <button class="login-btn" id="login-btn" onclick="doLogin()">Inloggen →</button>

<!-- ── APP ───────────────────────────────────────────────────────────────── -->

let lang = localStorage.getItem('au_lang') || 'nl';

function t(key) {
  return (TRANSLATIONS[lang] || TRANSLATIONS.nl)[key] || TRANSLATIONS.nl[key] || key;
}

function locale() {
  return lang === 'en' ? 'en-GB' : 'nl-NL';
}

function setLang(newLang) {
  lang = newLang;
  localStorage.setItem('au_lang', lang);
  applyLang();
  render();
}

function applyLang() {
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = lang;
  // Tabs
  const tw = document.getElementById('tab-week');
  const tb = document.getElementById('tab-bezoek');
  const tv = document.getElementById('tab-verkoop');
  const tr = document.getElementById('tab-runsheet');
  const tp = document.getElementById('tab-personeel');
  if (tw) tw.textContent = t('tabWeek');
  if (tb) tb.textContent = t('tabBezoek');
  if (tv) tv.textContent = t('tabVerkoop');
  if (tr) tr.textContent = t('tabRun');
  if (tp) tp.textContent = t('tabPersoneel');
  // Login screen
  const ll = document.getElementById('login-label');
  const lb = document.getElementById('login-btn');
  if (ll) ll.textContent = t('accessCode');
  if (lb) lb.textContent = t('loginBtn');
}

// ── Auth ──────────────────────────────────────────────────────────────────────
let accessCode = sessionStorage.getItem('au_code') || '';

async function doLogin() {
  const input = document.getElementById('code-input');
  const errEl = document.getElementById('login-error');
  const code = input.value.trim();
  if (!code) return;

  errEl.textContent = '';
  input.disabled = true;

  try {
    const test = await fetch(`${WORKER}/api/day?date=${todayStr()}`, {
      headers: { 'X-Access-Code': code }
    });
    const data = await test.json();

    if (data.error && data.error.includes('Ongeldig')) {
      input.classList.add('error');
      setTimeout(() => input.classList.remove('error'), 600);
      errEl.textContent = t('invalidCode');
      input.disabled = false;
      input.focus();
      return;
    }

    accessCode = code;
    sessionStorage.setItem('au_code', code);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    render();
  } catch (e) {
    errEl.textContent = t('connError');
    input.disabled = false;
  }
}

// Check if already logged in
if (accessCode) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
}

// ── API ───────────────────────────────────────────────────────────────────────
const cache = {};

async function api(path, forceRefresh = false) {
  const key = path;
  if (!forceRefresh && cache[key]) return cache[key];
  const sep = path.includes('?') ? '&' : '?';
  const url = forceRefresh ? `${WORKER}${path}${sep}refresh=1` : `${WORKER}${path}`;
  const r = await fetch(url, { headers: { 'X-Access-Code': accessCode } });
  const data = await r.json();
  if (data.error) throw new Error(data.error);
  cache[key] = data;
  if (!forceRefresh) setTimeout(() => delete cache[key], 5 * 60 * 1000);
  return data;
}

async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  Object.keys(cache).forEach(k => delete cache[k]);
  try {
    await renderCurrentTab(true);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔄'; }
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function todayStr() {
  return new Date().toLocaleDateString('sv-SE');
}

function addDays(s, n) {
  const d = new Date(s + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toLocaleDateString('sv-SE');
}

function fmtEur(v) {
  if (v == null || isNaN(v)) return '—';
  return '€\u00a0' + v.toLocaleString(locale(), { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(s) {
  return new Date(s + 'T00:00:00').toLocaleDateString(locale(), { weekday: 'short', day: 'numeric', month: 'short' });
}

function fmtDateLong(s) {
  return new Date(s + 'T00:00:00').toLocaleDateString(locale(), { weekday: 'long', day: 'numeric', month: 'long' });
}

function fmtTime(t) {
  if (!t) return '—';
  return t.length > 5 ? t.substring(11, 16) : t;
}

function setContent(html) { document.getElementById('content').innerHTML = html; }
function spinner() { return '<div class="spinner"></div>'; }
function errMsg(m) { return `<div class="err-msg">⚠️ ${m}</div>`; }

// ── Cache label ───────────────────────────────────────────────────────────────
function cacheLabel(data) {
  if (!data) return '';
  const at = data._cachedAt || data.generatedAt;
  const fromCache = data._cached;
  const age = data._cacheAge;
  const timeStr = at ? new Date(at).toLocaleString(locale(),{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
  const ageStr = age != null ? (age < 60 ? `${age}${t('agoSec')}` : `${Math.floor(age/60)}${t('agoMin')}`) : '';
  const icon = fromCache ? '📦' : '⚡';
  const label = fromCache ? `${t('fromCache')} · ${ageStr}` : t('liveData');

}

// ── WEEK VIEW ─────────────────────────────────────────────────────────────────
async function renderWeek(forceRefresh = false) {
  setContent(spinner());
  try {
    const data = await api(`/api/week?offset=${weekOffset}`, forceRefresh);
    const days = data.days || [];
    const today = todayStr();
    const maxRev = Math.max(...days.map(d => d.visit?.netRevenue || 0), 1);

    const startLabel = new Date(days[0]?.date + 'T00:00:00').toLocaleDateString(locale(), { day: 'numeric', month: 'short' });
    const endLabel   = new Date(days[6]?.date + 'T00:00:00').toLocaleDateString(locale(), { day: 'numeric', month: 'short' });

    // ── Cumulative week category breakdown ────────────────────────────────────
    const weekRcData = {};
    let weekTotalRev = 0;
    let weekTotalVis = 0;
    for (const day of days) {
      const rc = day.visit?.byReportingCategory || {};
      const dayMyposRev = (day.mypos?.omzetExclBtw || 0);
      const dayPayterRev = (day.payter?.omzetExclBtw || 0);
      weekTotalRev += (day.visit?.netRevenue || 0) + dayMyposRev + dayPayterRev;
      weekTotalVis += day.visit?.visitors || 0;
      for (const [catName, catData] of Object.entries(rc)) {
        if (!weekRcData[catName]) weekRcData[catName] = { revenue: 0, visitors: 0, subcategories: {} };
        weekRcData[catName].revenue += catData.revenue || 0;
        weekRcData[catName].visitors += catData.visitors || 0;
        for (const [subName, subData] of Object.entries(catData.subcategories || {})) {
          if (!weekRcData[catName].subcategories[subName]) weekRcData[catName].subcategories[subName] = { revenue: 0, visitors: 0 };
          weekRcData[catName].subcategories[subName].revenue += subData.revenue || 0;
          weekRcData[catName].subcategories[subName].visitors += subData.visitors || 0;
        }
      }
      // MyPOS excl. BTW → Overig subcategorie
      if (dayMyposRev > 0) {
        if (!weekRcData['Overig']) weekRcData['Overig'] = { revenue: 0, visitors: 0, subcategories: {} };
        weekRcData['Overig'].revenue += dayMyposRev;
        if (!weekRcData['Overig'].subcategories['Speelgoed Automaat (MyPOS)']) weekRcData['Overig'].subcategories['Speelgoed Automaat (MyPOS)'] = { revenue: 0, visitors: 0 };
        weekRcData['Overig'].subcategories['Speelgoed Automaat (MyPOS)'].revenue += dayMyposRev;
        weekRcData['Overig'].subcategories['Speelgoed Automaat (MyPOS)'].visitors += day.mypos?.aantalBetalingen || 0;
      }
      // Payter excl. BTW → Overig subcategorie
      if (dayPayterRev > 0) {
        if (!weekRcData['Overig']) weekRcData['Overig'] = { revenue: 0, visitors: 0, subcategories: {} };
        weekRcData['Overig'].revenue += dayPayterRev;
        if (!weekRcData['Overig'].subcategories['Kluisjes (Payter)']) weekRcData['Overig'].subcategories['Kluisjes (Payter)'] = { revenue: 0, visitors: 0 };
        weekRcData['Overig'].subcategories['Kluisjes (Payter)'].revenue += dayPayterRev;
        weekRcData['Overig'].subcategories['Kluisjes (Payter)'].visitors += day.payter?.transactions || 0;
      }
    }
    const RC_COLORS_W = ['#7c3aed','#2563eb','#059669','#d97706','#dc2626','#0891b2','#7c3aed','#6b7280'];
    const weekRcEntries = Object.entries(weekRcData).sort((a,b) => b[1].revenue - a[1].revenue).filter(([,d]) => d.revenue > 0);
    let weekCatRows = '';
    weekRcEntries.forEach(([catName, catData], ci) => {
      const color = RC_COLORS_W[ci % RC_COLORS_W.length];
      const pct = weekTotalRev > 0 ? (catData.revenue / weekTotalRev * 100).toFixed(1) : 0;
      const catAvg = catData.visitors > 0 ? catData.revenue / catData.visitors : 0;
      const subEntries = Object.entries(catData.subcategories || {}).sort((a,b) => b[1].revenue - a[1].revenue).filter(([,s]) => s.revenue > 0);
      let subRows = '';
      for (const [subName, subData] of subEntries) {
        const subPct = catData.revenue > 0 ? (subData.revenue / catData.revenue * 100).toFixed(0) : 0;
        const subAvg = subData.visitors > 0 ? (subData.revenue / subData.visitors).toFixed(2) : 0;
        subRows += `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0 5px 14px;border-left:2px solid ${color}30;margin-left:4px;">
            <div style="flex:1;"><div style="font-size:12px;color:#ccc;">${subName}</div><div style="font-size:11px;color:#888;">${subData.visitors.toLocaleString(locale())} ${t('visitors')} · gem. ${fmtEur(parseFloat(subAvg))}/pers.</div></div>
            <div style="text-align:right;margin-left:8px;"><div style="font-size:12px;font-weight:600;">${fmtEur(subData.revenue)}</div><div style="font-size:10px;color:#888;">${subPct}% ${t('ofCat')}</div></div>
          </div>`;
      }
      weekCatRows += `<div style="margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
            <div><span style="font-size:14px;font-weight:700;">${catName}</span>${subEntries.length > 0 ? `<span style="font-size:10px;color:#888;margin-left:6px;">${subEntries.length} ${t('subcategories')}</span>` : ''}</div>
            <div style="text-align:right;"><div style="font-size:14px;font-weight:700;">${fmtEur(catData.revenue)}</div><div style="font-size:11px;color:#888;">${pct}% · ${catData.visitors.toLocaleString(locale())} ${t('visitors')} · ${fmtEur(catAvg)}/pers.</div></div>
          </div>
          <div style="height:4px;border-radius:999px;background:${color};width:${pct}%;margin-bottom:${subEntries.length > 0 ? 6 : 0}px;"></div>
          ${subRows}
        </div>`;
    });

    let dayRows = '';
    for (const day of days) {
      const isToday = day.date === today;
      const rev = day.visit?.netRevenue || 0;
      const vis = day.visit?.visitors || 0;
      const barW = Math.round((rev / maxRev) * 100);
      const dayName = new Date(day.date + 'T00:00:00').toLocaleDateString(locale(), { weekday: 'short' });
      const dayNum  = new Date(day.date + 'T00:00:00').toLocaleDateString(locale(), { day: 'numeric', month: 'short' });
      dayRows += `
        <div class="week-day-card ${isToday ? 'today' : ''}" onclick="goToDay('${day.date}')">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="wd-name" style="font-size:13px;font-weight:700;min-width:28px;">${dayName}</div>
              <div style="font-size:12px;color:#888;">${dayNum}</div>
              ${isToday ? `<span class="badge" style="background:#7c3aed22;color:#7c3aed;">${t('today')}</span>` : ''}
            </div>
            <div style="text-align:right;">
              <div style="font-size:14px;font-weight:700;">${fmtEur(rev)}</div>
              <div style="font-size:11px;color:#888;">${vis.toLocaleString(locale())} ${t('visitors')}</div>
            </div>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${barW}%;background:#7c3aed;"></div></div>
        </div>`;
    }

    setContent(`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <button class="nav-btn" onclick="shiftWeek(-1)">‹</button>
        <div class="date-label">${startLabel} – ${endLabel}</div>
        <button class="nav-btn" onclick="shiftWeek(1)">›</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
        <div class="kpi-card">
          <div class="kpi-label">${t('revenueVisit')}</div>
          <div class="kpi-value" style="font-size:14px;">${fmtEur(data.totals?.netRevenue)}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">${t('visitors')}</div>
          <div class="kpi-value" style="font-size:14px;">${(data.totals?.visitors||0).toLocaleString(locale())}</div>
        </div>
      </div>
      ${weekCatRows.length > 0 ? `

        ${weekCatRows}

      ${dayRows}
      ${cacheLabel(data)}

  } catch (e) { setContent(errMsg(e.message)); }
}


// ── Hourly line chart ─────────────────────────────────────────────────────────
function hourlyBarChart(byHour, color = '#2563eb') {
  // Show hours 09–01 (CEST business day)
  const hours = [];
  for (let i = 9; i <= 23; i++) hours.push(String(i).padStart(2, '0'));
  hours.push('00', '01');

  const vals = hours.map(h => byHour[h] || 0);
  const max = Math.max(...vals, 1);

  // SVG dimensions
  const W = 600, H = 90, padL = 0, padR = 8, padT = 20, padB = 22;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const n = hours.length;

  // Format value without currency: e.g. 1234 → "1234", 12345 → "12k"
  function fmtVal(v) {
    if (v >= 1000) return Math.round(v / 1000 * 10) / 10 + 'k';
    return Math.round(v).toString();
  }

  // X/Y helpers
  const x = i => padL + (i / (n - 1)) * chartW;
  const y = v => padT + chartH - (v / max) * chartH;

  // Build polyline points
  const points = vals.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');

  // Fill area under line
  const fillPts = `${x(0).toFixed(1)},${(padT + chartH).toFixed(1)} ` +
    vals.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ') +
    ` ${x(n-1).toFixed(1)},${(padT + chartH).toFixed(1)}`;

  // Dots + labels every hour
  const dotsSVG = hours.map((h, i) => {
    const v = vals[i];
    const cx = x(i).toFixed(1), cy = y(v).toFixed(1);
    const showLabel = v > 0;
    const labelY = (parseFloat(cy) - 5 < padT + 4) ? parseFloat(cy) + 12 : parseFloat(cy) - 5;
    return `
      <circle cx="${cx}" cy="${cy}" r="${v > 0 ? 2.5 : 1.5}" fill="${v > 0 ? color : '#ccc'}" />
      ${showLabel ? `<text x="${cx}" y="${labelY.toFixed(1)}" text-anchor="middle" font-size="11" fill="white" font-weight="800" stroke="rgba(0,0,0,0.55)" stroke-width="3" paint-order="stroke">${fmtVal(v)}</text>` : ''}
    `;
  }).join('');

  // X-axis hour labels (every hour)
  const labelsSVG = hours.map((h, i) => {
    return `<text x="${x(i).toFixed(1)}" y="${(H - 4).toFixed(1)}" text-anchor="middle" font-size="9" fill="#888">${parseInt(h)}</text>`;
  }).join('');

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible;" preserveAspectRatio="none">
    <defs>
      <linearGradient id="lg${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.01"/>
      </linearGradient>
    </defs>
    <!-- fill area -->
    <polygon points="${fillPts}" fill="url(#lg${color.replace('#','')})" />
    <!-- baseline -->
    <line x1="${padL}" y1="${padT + chartH}" x2="${W - padR}" y2="${padT + chartH}" stroke="#e5e7eb" stroke-width="1"/>
    <!-- line -->
    <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- dots + value labels -->
    ${dotsSVG}
    <!-- hour labels -->
    ${labelsSVG}
  </svg>`;
}

// ── BEZOEK VIEW ───────────────────────────────────────────────────────────────
async function renderBezoek(forceRefresh = false) {
  setContent(spinner());
  try {
    const [data, mypos, payter] = await Promise.all([
      api(`/api/day?date=${selectedDate}`, forceRefresh),
      api(`/api/mypos?date=${selectedDate}`, forceRefresh).catch(() => null),

    const myposRev = mypos?.omzetExclBtw || 0;
    const payterRev = payter?.omzetExclBtw || 0;
    const totalRev = visit.netRevenue + myposRev + payterRev;
    const avg = visit.visitors > 0 ? totalRev / visit.visitors : 0;

    const cats = CAT_ORDER.filter(c => visit.byCategory?.[c]);
    let catRows = '';
    for (const cat of cats) {
      const d = visit.byCategory[cat];
      const pct = totalRev > 0 ? Math.round((d.revenue / totalRev) * 100) : 0;
      const catAvg = d.visitors > 0 ? d.revenue / d.visitors : 0;
      const color = CAT_COLORS[cat] || '#6b7280';
      catRows += `
        <div class="cat-row">
          <div class="cat-top">
            <div class="cat-name">
              <div class="cat-dot" style="background:${color};"></div>${cat}
            </div>

          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div>

            <span>${d.visitors.toLocaleString(locale())} ${t('visitors')}</span>
            <span>${t('avgPer').replace('Gem.','gem.')} ${fmtEur(catAvg)}/pers.</span>
          </div>
        </div>`;
    }

    // Reporting category breakdown — include MyPOS under Overig
    const rcData = JSON.parse(JSON.stringify(visit.byReportingCategory || {}));
    if (myposRev > 0) {
      if (!rcData['Overig']) rcData['Overig'] = { revenue: 0, visitors: 0, subcategories: {} };
      rcData['Overig'].revenue = (rcData['Overig'].revenue || 0) + myposRev;
      if (!rcData['Overig'].subcategories) rcData['Overig'].subcategories = {};
      rcData['Overig'].subcategories['Speelgoed Automaat (MyPOS)'] = { revenue: myposRev, visitors: mypos.transactions || 0 };
    }
    if (payterRev > 0) {
      if (!rcData['Overig']) rcData['Overig'] = { revenue: 0, visitors: 0, subcategories: {} };
      rcData['Overig'].revenue = (rcData['Overig'].revenue || 0) + payterRev;
      if (!rcData['Overig'].subcategories) rcData['Overig'].subcategories = {};
      rcData['Overig'].subcategories['Kluisjes (Payter)'] = { revenue: payterRev, visitors: payter.transactions || 0 };
    }

    rcEntries.forEach(([catName, catData], ci) => {
      if (catData.revenue === 0) return;
      const color = RC_COLORS[ci % RC_COLORS.length];
      const pct = totalRev > 0 ? (catData.revenue / totalRev * 100).toFixed(1) : 0;
      const catAvg = catData.visitors > 0 ? catData.revenue / catData.visitors : 0;
      const subEntries = Object.entries(catData.subcategories || {}).sort((a,b) => b[1].revenue - a[1].revenue).filter(([,s]) => s.revenue > 0);

      let subRows = '';

        const subAvg = subData.visitors > 0 ? (subData.revenue / subData.visitors).toFixed(2) : 0;
        subRows += `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0 5px 14px;border-left:2px solid ${color}30;margin-left:4px;">
            <div style="flex:1;">

              <div style="font-size:11px;color:#888;">${subData.visitors.toLocaleString(locale())} ${t('visitors')} · gem. ${fmtEur(parseFloat(subAvg))}/pers.</div>
            </div>
            <div style="text-align:right;margin-left:8px;">
              <div style="font-size:12px;font-weight:600;">${fmtEur(subData.revenue)}</div>
              <div style="font-size:10px;color:#888;">${subPct}% ${t('ofCat')}</div>
            </div>
          </div>`;
      }

      rcRows += `
        <div style="margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
            <div>
              <span style="font-size:14px;font-weight:700;">${catName}</span>
              ${subEntries.length > 0 ? `<span style="font-size:10px;color:#888;margin-left:6px;">${subEntries.length} ${t('subcategories')}</span>` : ''}

          </div>
          ${subRows}
        </div>`;

    // Combine Roller + MyPOS + Payter hourly data (both excl BTW)
    const visitByHourCombined = Object.assign({}, visit.byHour || {});
    for (const [h, v] of Object.entries(mypos?.byHour || {})) {
      visitByHourCombined[h] = (visitByHourCombined[h] || 0) + (v / 1.21);
    }
    for (const [h, v] of Object.entries(payter?.byHour || {})) {
      visitByHourCombined[h] = (visitByHourCombined[h] || 0) + (v / 1.21);
    }
    const hasHourData = Object.keys(visitByHourCombined).length > 0;

    setContent(`
      ${dateNav()}
      <div class="info-banner">${t('bannerBezoek')}</div>
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">${t('revenue')}</div><div class="kpi-value">${fmtEur(totalRev)}</div></div>

        <div class="kpi-card"><div class="kpi-label">${t('avgPer')}</div><div class="kpi-value">${fmtEur(avg)}</div></div>

        </div>`;
    }

    // Combine Roller + MyPOS + Payter hourly data (both incl BTW for payments)
    const salesByHourCombined = Object.assign({}, sales.byHour || {});
    for (const [h, v] of Object.entries(mypos?.byHour || {})) {
      salesByHourCombined[h] = (salesByHourCombined[h] || 0) + v;
    }
    for (const [h, v] of Object.entries(payter?.byHour || {})) {
      salesByHourCombined[h] = (salesByHourCombined[h] || 0) + v;
    }
    const hasSalesHourData = Object.keys(salesByHourCombined).length > 0;

    setContent(`
      ${dateNav()}
      <div class="info-banner">${t('bannerVerkoop')}</div>
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">${t('received')}</div><div class="kpi-value">${fmtEur(grandTotal)}</div></div>
        <div class="kpi-card"><div class="kpi-label">${t('transCount')}</div><div class="kpi-value">${totalTrans.toLocaleString(locale())}</div></div>
        <div class="kpi-card"><div class="kpi-label">${t('avgTrans')}</div><div class="kpi-value">${fmtEur(avg)}</div></div>
      </div>
      ${hasSalesHourData ? `<div class="card"><div class="section-title">💳 Betalingen per uur</div>${hourlyBarChart(salesByHourCombined, '#059669')}</div>` : ''}
      ${chEntries.length || myposSalesAmount > 0 ? `<div class="card"><div class="section-title">${t('salesChannel')}</div>${chRows}</div>` : ''}
      ${cacheLabel(data)}
    `);
  } catch (e) { setContent(errMsg(e.message)); }
}

// ── RUNSHEET VIEW ─────────────────────────────────────────────────────────────
async function renderRunsheet(forceRefresh = false) {
  setContent(spinner());
  try {
    const data = await api(`/api/runsheet?date=${rsDate}`, forceRefresh);

    function renderBooking(b) {
      const isPaid = b.paymentStatus === 'paid';
      const payClass = isPaid ? 'pay-paid' : 'pay-unpaid';
      const fmtE = v => '€' + (v || 0).toLocaleString(locale(), {minimumFractionDigits:2, maximumFractionDigits:2});
      const amountPaid = (b.total || 0) - (b.amountOwing || 0);
      const payLabel = isPaid
        ? `${t('paid')} · ${fmtE(b.total)}`
        : `${t('outstanding')} · ${fmtE(amountPaid)} ${t('paidWord')} / ${fmtE(b.amountOwing)} ${t('openWord')}`;

      let actRows = '';
      for (const act of (b.activities || [])) {
        const locs = act.locations?.length ? act.locations.join(', ') : '—';
        actRows += `
          <tr>
            <td>${act.mainActivity || '—'}</td>
            <td>${act.subtype || '—'}</td>
            <td>${fmtTime(act.startTime)}${act.endTime ? '–'+fmtTime(act.endTime) : ''}</td>
            <td>${act.quantity || '—'}</td>
            <td>${locs}</td>
          </tr>`;
      }

      const notes = [b.bookingNotes, b.posNotes].filter(Boolean).join(' · ') || t('noNotes');

      return `
        <div class="rs-booking">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
            <div class="rs-booking-name">${b.name}</div>
            <span class="pay-badge ${payClass}">${payLabel}</span>
          </div>
          <div class="rs-booking-id">${t('bookingNr')}${b.id}${b.totalGuests ? ` · ${b.totalGuests} ${t('pers')}` : ''}</div>
          ${actRows ? `
          <table class="rs-table">
            <tr>
              <th>${t('activity')}</th><th>${t('subtype')}</th><th>${t('time')}</th><th>${t('persons')}</th><th>${t('location')}</th>
            </tr>
            ${actRows}
          </table>` : ''}
          <div class="rs-notes">
            <div class="rs-notes-label">${t('notes')}</div>
            ${notes}
          </div>
        </div>`;
    }

    function bookingCount(n) {
      return n === 1 ? `1 ${t('booking')}` : `${n} ${t('bookings')}`;
    }

    const kfSection = data.kf?.length ? `
      <div class="rs-section">
        <div class="rs-section-header rs-kf">🎂 ${t('kfTitle')} — ${bookingCount(data.kf.length)}</div>
        ${data.kf.map(renderBooking).join('')}
      </div>` : '';

    const bfSection = data.bf?.length ? `
      <div class="rs-section">
        <div class="rs-section-header rs-bf">🏢 ${t('bfTitle')} — ${bookingCount(data.bf.length)}</div>
        ${data.bf.map(renderBooking).join('')}
      </div>` : '';

    const empty = (!data.kf?.length && !data.bf?.length) ?
      `<div class="rs-empty">${t('noBookings')} ${fmtDate(rsDate)}</div>` : '';

    setContent(`
      ${dateNav('runsheet', true)}
      <div style="text-align:right;margin-bottom:14px;" class="no-print">
        <button onclick="downloadRunsheetPDF('${rsDate}')" style="background:#6366f1;color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;">${t('downloadPdf')}</button>
      </div>
      <div id="rs-print-header" style="display:none;margin-bottom:16px;">
        <div style="font-size:18pt;font-weight:800;">${t('runsheetTitle')}</div>
        <div style="font-size:12pt;color:#555;">${fmtDateLong(rsDate)}</div>
      </div>
      ${kfSection}${bfSection}${empty}
      ${cacheLabel(data)}
    `);
  } catch (e) { setContent(errMsg(e.message)); }
}

function downloadRunsheetPDF(date) {
  const hdr = document.getElementById('rs-print-header');
  if (hdr) hdr.style.display = 'block';
  const origTitle = document.title;
  document.title = `Run Sheet - Almere Underground - ${date}`;
  window.print();
  setTimeout(() => {
    document.title = origTitle;
    if (hdr) hdr.style.display = 'none';
  }, 1000);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function dateNav(mode = 'day', noPrint = false) {
  const dateStr = mode === 'day' ? selectedDate : (mode === 'runsheet' ? rsDate : persDate);
  const shiftFn = mode === 'day' ? 'shiftDay' : (mode === 'runsheet' ? 'shiftRs' : 'shiftPers');
  const changeFn = mode === 'day' ? 'onDayDateChange' : (mode === 'runsheet' ? 'onRsDateChange' : 'onPersDateChange');
  return `
    <div ${noPrint ? 'class="no-print"' : ''} style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <button class="nav-btn" onclick="${shiftFn}(-1)">‹</button>
      <div style="flex:1;text-align:center;cursor:pointer;position:relative;min-height:38px;display:flex;align-items:center;justify-content:center;" onclick="triggerDatePicker('dp-${mode}')">
        <div class="date-label" style="text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;pointer-events:none;">${fmtDateLong(dateStr)}</div>
        <input type="date" id="dp-${mode}" value="${dateStr}" onchange="${changeFn}(this.value)" style="position:absolute;inset:0;opacity:0.001;border:none;cursor:pointer;z-index:10;background:transparent;pointer-events:none;">
      </div>
      <button class="nav-btn" onclick="${shiftFn}(1)">›</button>
    </div>`;
}

function triggerDatePicker(id) {
  const el = document.getElementById(id);
  if (!el) return;
  try { if (el.showPicker) el.showPicker(); else el.click(); } catch(e) { el.click(); }
}
function onDayDateChange(val) { selectedDate = val; render(); }
function onRsDateChange(val) { rsDate = val; render(); }
function onPersDateChange(val) { persDate = val; expandedDept = null; render(); }
function shiftDay(n) { selectedDate = addDays(selectedDate, n); render(); }
function shiftWeek(n) { weekOffset += n; render(); }
function shiftRs(n) { rsDate = addDays(rsDate, n); render(); }
function shiftPers(n) { persDate = addDays(persDate, n); expandedDept = null; render(); }

function goToDay(date) {
  selectedDate = date;
  switchTab('bezoek');
}

function switchTab(tab) {
  currentTab = tab;
  expandedDept = null;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('tab-' + tab);
  if (el) el.classList.add('active');
  render();
}

function render() {
  if (!accessCode) return;
  renderCurrentTab(false);
}

async function renderCurrentTab(forceRefresh = false) {
  if (!accessCode) return;
  if (currentTab === 'week')      await renderWeek(forceRefresh);
  else if (currentTab === 'bezoek')   await renderBezoek(forceRefresh);
  else if (currentTab === 'verkoop')  await renderVerkoop(forceRefresh);
  else if (currentTab === 'runsheet') await renderRunsheet(forceRefresh);
  else if (currentTab === 'personeel') await renderPersoneel(forceRefresh);
}

// ── PERSONEEL VIEW ────────────────────────────────────────────────────────────

async function renderPersoneel(forceRefresh = false) {
  setContent(spinner());
  try {
    const data = await api(`/api/personeel?date=${persDate}`, forceRefresh);
    const depts = data.departments || [];
    const totals = data.totals || {};

    // If a department is expanded, show drill-down view
    if (expandedDept !== null) {
      const dept = depts.find(d => d.deptId === expandedDept);
      if (!dept) { expandedDept = null; return renderPersoneel(forceRefresh); }
      const people = dept.people || [];
      let rows = '';
      for (const p of people) {
        const hasPlanned = p.plannedH > 0;
        const hasClocked = p.clockedH > 0;
        rows += `
          <div style="background:#12121c;border-radius:10px;padding:14px 16px;margin-bottom:10px;">
            <div style="font-size:14px;font-weight:700;color:#e0e0f0;margin-bottom:10px;">${p.name}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              <div style="background:#1a1a2e;border-radius:8px;padding:10px;">
                <div style="font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">📅 ${t('staffPlanned')}</div>
                ${hasPlanned ? `
                  <div style="font-size:13px;font-weight:700;color:#7c3aed;">${p.plannedH.toFixed(1)}u</div>
                  <div style="font-size:12px;color:#aaa;">${fmtEur(p.plannedCost)}</div>
                  <div style="font-size:11px;color:#666;margin-top:4px;">${p.plannedStart || '—'} – ${p.plannedEnd || '—'}</div>
                ` : `<div style="font-size:12px;color:#555;">—</div>`}
              </div>
              <div style="background:#1a1a2e;border-radius:8px;padding:10px;">
                <div style="font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">🕐 ${t('staffClocked')}</div>
                ${hasClocked ? `
                  <div style="font-size:13px;font-weight:700;color:#10b981;">${p.clockedH.toFixed(2)}u</div>
                  <div style="font-size:12px;color:#aaa;">${fmtEur(p.clockedCost)}</div>
                  <div style="font-size:11px;color:#666;margin-top:4px;">${p.clockedEnter || '—'} – ${p.clockedExit || '—'}</div>
                ` : `<div style="font-size:12px;color:#555;">—</div>`}
              </div>
            </div>
          </div>`;
      }
      setContent(`
        <div style="margin-bottom:16px;display:flex;align-items:center;gap:12px;">
          <button onclick="expandedDept=null;renderPersoneel()" style="background:#1a1a24;border:1px solid #2a2a38;color:#aaa;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;">${t('staffBack')}</button>
          <div style="font-size:16px;font-weight:800;color:#e0e0f0;">${dept.deptName}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
          <div class="kpi-card">
            <div class="kpi-label">📅 ${t('staffPlanned')}</div>
            <div class="kpi-value" style="font-size:14px;">${dept.plannedH.toFixed(1)}u</div>
            <div style="font-size:12px;color:#888;">${fmtEur(dept.plannedCost)}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">🕐 ${t('staffClocked')}</div>
            <div class="kpi-value" style="font-size:14px;">${dept.clockedH.toFixed(2)}u</div>
            <div style="font-size:12px;color:#888;">${fmtEur(dept.clockedCost)}</div>
          </div>
        </div>
        <div class="section-title">${t('staffName')}</div>
        ${rows || `<div style="color:#666;text-align:center;padding:20px;">${t('staffNoData')}</div>`}
        ${cacheLabel(data)}
      `);
      return;
    }

    // Overview: date selector + department table
    const hasPlanData = depts.some(d => d.plannedH > 0);
    const hasClockData = depts.some(d => d.clockedH > 0);

    let deptCards = '';
    for (const dept of depts) {
      const hasPlan = dept.plannedH > 0;
      const hasClock = dept.clockedH > 0;
      if (!hasPlan && !hasClock) continue;

      const diffH = dept.clockedH - dept.plannedH;
      const diffSign = diffH > 0 ? '+' : '';
      const diffColor = Math.abs(diffH) < 0.5 ? '#10b981' : diffH > 0 ? '#f59e0b' : '#6b7280';

      deptCards += `
        <div onclick="expandedDept='${dept.deptId}';renderPersoneel()" style="background:#12121c;border-radius:10px;padding:14px 16px;margin-bottom:8px;cursor:pointer;border:1px solid #1e1e2a;transition:border-color .2s;" onmouseover="this.style.borderColor='#7c3aed'" onmouseout="this.style.borderColor='#1e1e2a'">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div style="font-size:14px;font-weight:700;color:#e0e0f0;">${dept.deptName}</div>
            <div style="font-size:11px;color:#666;">${dept.people.length} pers. ›</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
            <div style="text-align:center;">
              <div style="font-size:10px;color:#888;margin-bottom:3px;">📅 Gepland</div>
              <div style="font-size:13px;font-weight:700;color:#7c3aed;">${hasPlan ? dept.plannedH.toFixed(1)+'u' : '—'}</div>
              <div style="font-size:11px;color:#888;">${hasPlan ? fmtEur(dept.plannedCost) : ''}</div>
            </div>
            <div style="text-align:center;">
              <div style="font-size:10px;color:#888;margin-bottom:3px;">🕐 Geklokt</div>
              <div style="font-size:13px;font-weight:700;color:#10b981;">${hasClock ? dept.clockedH.toFixed(1)+'u' : '—'}</div>
              <div style="font-size:11px;color:#888;">${hasClock ? fmtEur(dept.clockedCost) : ''}</div>
            </div>
            <div style="text-align:center;">
              <div style="font-size:10px;color:#888;margin-bottom:3px;">Δ Verschil</div>
              <div style="font-size:13px;font-weight:700;color:${diffColor};">${hasPlan && hasClock ? diffSign+diffH.toFixed(1)+'u' : '—'}</div>
            </div>
          </div>
        </div>`;
    }

    if (!deptCards) {
      deptCards = `<div style="color:#666;text-align:center;padding:40px;">${t('staffNoData')}</div>`;
    }

    setContent(`
      ${dateNav('personeel')}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
        <div class="kpi-card">
          <div class="kpi-label">📅 Gepland totaal</div>
          <div class="kpi-value" style="font-size:14px;">${totals.plannedH?.toFixed(1) || '0'}u</div>
          <div style="font-size:12px;color:#888;">${fmtEur(totals.plannedCost)}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">🕐 Geklokt totaal</div>
          <div class="kpi-value" style="font-size:14px;">${totals.clockedH?.toFixed(1) || '0'}u</div>
          <div style="font-size:12px;color:#888;">${fmtEur(totals.clockedCost)}</div>
        </div>
      </div>
      <div class="section-title">Per afdeling — tik voor details</div>
      ${deptCards}
      ${cacheLabel(data)}
    `);
  } catch (e) { setContent(errMsg(e.message)); }
}

// ── Start ─────────────────────────────────────────────────────────────────────
applyLang();
if (accessCode) render();
</script>
