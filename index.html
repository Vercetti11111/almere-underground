<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Almere Underground</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    body { margin: 0; background: #0f0f13; color: #f1f1f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    
    .container { max-width: 480px; margin: 0 auto; padding: 40px 16px; min-height: 100vh; }
    
    .header { text-align: center; margin-bottom: 48px; }
    .logo { font-size: 56px; margin-bottom: 12px; }
    .title { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888; }
    
    .menu { display: flex; flex-direction: column; gap: 12px; }
    
    .menu-card {
      background: #1a1a24;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: #f1f1f5;
      transition: all 0.2s;
      border: 1px solid #2a2a38;
      cursor: pointer;
    }
    .menu-card:active { background: #2a2a38; transform: scale(0.98); }
    
    .menu-icon { font-size: 32px; flex-shrink: 0; }
    .menu-text { flex: 1; }
    .menu-title { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .menu-desc { font-size: 12px; color: #888; line-height: 1.4; }
    .menu-arrow { font-size: 18px; color: #555; flex-shrink: 0; }
    
    .footer { text-align: center; margin-top: 48px; font-size: 11px; color: #444; }
    
    /* Top bar */
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .top-bar-right { display: flex; gap: 8px; align-items: center; }
    #lang-select { background: #1a1a24; border: 1px solid #2a2a38; color: #f1f1f5; border-radius: 8px; padding: 5px 8px; font-size: 13px; cursor: pointer; }
    
    .user-badge {
      background: #1a1a24; border: 1px solid #2a2a38; border-radius: 8px;
      padding: 5px 10px; font-size: 12px; color: #888;
      display: flex; align-items: center; gap: 6px;
    }
    .user-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
    
    .logout-btn {
      background: none; border: 1px solid #333; border-radius: 8px;
      color: #888; padding: 5px 10px; font-size: 12px; cursor: pointer;
    }
    .logout-btn:active { background: #2a2a38; }
    
    /* Login overlay */
    .login-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #0f0f13; z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box { text-align: center; width: 100%; max-width: 360px; padding: 16px; }
    .login-box .logo { font-size: 64px; }
    .login-box .title { font-size: 24px; margin-bottom: 8px; }
    .login-box .subtitle { margin-bottom: 32px; }
    
    .login-input {
      width: 100%; background: #1a1a24; border: 1px solid #2a2a38;
      color: #f1f1f5; border-radius: 12px; padding: 14px 16px;
      font-size: 16px; text-align: center; letter-spacing: 3px;
      font-weight: 700; outline: none; margin-bottom: 12px;
    }
    .login-input:focus { border-color: #6366f1; }
    .login-input.error { border-color: #ef4444; animation: shake 0.4s; }
    @keyframes shake { 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    
    .login-btn {
      width: 100%; background: #6366f1; border: none; border-radius: 12px;
      color: white; padding: 14px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    .login-btn:active { opacity: 0.8; }
    .login-btn:disabled { opacity: 0.5; }
    
    .login-error { color: #ef4444; font-size: 13px; margin-top: 12px; min-height: 20px; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- Login overlay -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <div class="logo">🎳</div>
      <div class="title">Almere Underground</div>
      <div class="subtitle" id="login-subtitle">Voer je toegangscode in</div>
      <input type="text" class="login-input" id="login-code" placeholder="••••••" autocomplete="off" autocapitalize="characters" />
      <button class="login-btn" id="login-btn" onclick="doLogin()">Inloggen</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- Main content (hidden until login) -->
  <div class="container hidden" id="main-content">
    <div class="top-bar">
      <div class="user-badge" id="user-badge">
        <span class="dot"></span>
        <span id="user-name"></span>
      </div>
      <div class="top-bar-right">
        <select id="lang-select" onchange="setLang(this.value)">
          <option value="nl">🇳🇱 NL</option>
          <option value="en">🇬🇧 EN</option>
        </select>
        <button class="logout-btn" onclick="doLogout()" id="logout-btn">Uitloggen</button>
      </div>
    </div>
    
    <div class="header">
      <div class="logo">🎳</div>
      <div class="title">Almere Underground</div>
      <div class="subtitle" id="lp-subtitle">Rapportages & Analytics</div>
    </div>
    
    <div class="menu" id="menu-container"></div>
    
    <div class="footer">© 2026 Almere Underground</div>
  </div>

<script>
const WORKER = 'https://api.almereunderground.com';

const TRANSLATIONS = {
  nl: {
    subtitle: 'Rapportages & Analytics',
    loginSubtitle: 'Voer je toegangscode in',
    loginBtn: 'Inloggen',
    logoutBtn: 'Uitloggen',
    dashTitle: 'Omzet Dashboard',
    dashDesc: 'Bezoek, Verkoop, Week & Controle',
    persTitle: 'Personeelsplanning',
    persDesc: 'Dagplanning, geklokte uren & Gantt tijdlijn per afdeling',
    kpiTitle: 'KPI Dashboard',
    kpiDesc: 'Loonkosten vs omzet per afdeling — dag, week & maand',
    runTitle: 'Run Sheet',
    runDesc: 'Dagelijkse runsheet voor Kinderfeestjes (KF) & Bedrijfsfeesten (BF)',
    openTitle: 'Openstaande Posten',
    openDesc: 'Overzicht van openstaande en toekomstige boekingen',
    leadsTitle: 'Leads & Reserveringen',
    leadsDesc: 'Toekomstige reserveringen & op te volgen leads',
    rechtenTitle: 'Gebruikersrechten',
    rechtenDesc: 'Beheer toegangscodes, rollen en paginatoegang',
    socialTitle: 'Social Stats',
    socialDesc: 'Social media volgers, reviews & trends',
    orderTitle: 'Orderboek',
    orderDesc: 'Boekingsvergelijking KF/BF/FF/RR vs vorig jaar',
    keukenTitle: 'Keuken',
    keukenDesc: 'Komende feesten, taarten & ontdooien voor morgen',
    noAccess: 'Geen pagina\'s beschikbaar voor deze rol',
  },
  en: {
    subtitle: 'Reports & Analytics',
    loginSubtitle: 'Enter your access code',
    loginBtn: 'Sign in',
    logoutBtn: 'Sign out',
    dashTitle: 'Revenue Dashboard',
    dashDesc: 'Visit, Sales, Week & Control',
    persTitle: 'Staff Planning',
    persDesc: 'Daily schedule, clocked hours & Gantt timeline per department',
    kpiTitle: 'KPI Dashboard',
    kpiDesc: 'Labor costs vs revenue per department — day, week & month',
    runTitle: 'Run Sheet',
    runDesc: 'Daily run sheet for Birthday Parties (KF) & Corporate Events (BF)',
    openTitle: 'Outstanding Bookings',
    openDesc: 'Overview of outstanding and upcoming bookings',
    leadsTitle: 'Leads & Reservations',
    leadsDesc: 'Upcoming reservations & follow-up leads',
    rechtenTitle: 'User Permissions',
    rechtenDesc: 'Manage access codes, roles and page access',
    socialTitle: 'Social Stats',
    socialDesc: 'Social media followers, reviews & trends',
    orderTitle: 'Order Book',
    orderDesc: 'Booking comparison KF/BF/FF/RR vs last year',
    keukenTitle: 'Kitchen',
    keukenDesc: 'Upcoming parties, cakes & defrost for tomorrow',
    noAccess: 'No pages available for this role',
  }
};

let lang = localStorage.getItem('au_lang') || 'nl';
let session = null; // { name, role, pages, code }

function t(key) { return (TRANSLATIONS[lang] || TRANSLATIONS.nl)[key] || key; }

function setLang(newLang) {
  lang = newLang;
  localStorage.setItem('au_lang', lang);
  document.getElementById('lang-select').value = lang;
  renderMenu();
  document.getElementById('lp-subtitle').textContent = t('subtitle');
  document.getElementById('logout-btn').textContent = t('logoutBtn');
  // Update login screen text too
  document.getElementById('login-subtitle').textContent = t('loginSubtitle');
  document.getElementById('login-btn').textContent = t('loginBtn');
}

const PAGES = [
  { id: 'dashboard',  icon: '📊', titleKey: 'dashTitle',    descKey: 'dashDesc',    href: 'dashboard.html' },
  { id: 'personeel',  icon: '👥', titleKey: 'persTitle',    descKey: 'persDesc',    href: 'personeel.html' },
  { id: 'kpi',        icon: '📈', titleKey: 'kpiTitle',     descKey: 'kpiDesc',     href: 'kpi.html' },
  { id: 'social',     icon: '📱', titleKey: 'socialTitle',  descKey: 'socialDesc',  href: 'social.html' },
  { id: 'keuken',     icon: '🍽️', titleKey: 'keukenTitle',  descKey: 'keukenDesc',  href: 'keuken.html' },
  { id: 'runsheet',   icon: '📋', titleKey: 'runTitle',     descKey: 'runDesc',     href: 'runsheet.html' },
  { id: 'openstaand', icon: '💰', titleKey: 'openTitle',    descKey: 'openDesc',    href: 'openstaand.html' },
  { id: 'leads',      icon: '🎯', titleKey: 'leadsTitle',   descKey: 'leadsDesc',   href: 'leads.html' },
  { id: 'orderboek',  icon: '📒', titleKey: 'orderTitle',   descKey: 'orderDesc',   href: 'orderboek.html' },
  { id: 'rechten',    icon: '🔐', titleKey: 'rechtenTitle', descKey: 'rechtenDesc', href: 'rechten.html' },
];

function renderMenu() {
  if (!session) return;
  document.getElementById('lp-subtitle').textContent = t('subtitle');
  document.getElementById('user-name').textContent = session.name;
  document.getElementById('logout-btn').textContent = t('logoutBtn');
  
  const allowed = session.pages || [];
  const visible = PAGES.filter(p => allowed.includes(p.id));
  
  const container = document.getElementById('menu-container');
  if (visible.length === 0) {
    container.innerHTML = `<div style="text-align:center;color:#888;padding:40px 0;">${t('noAccess')}</div>`;
    return;
  }
  
  container.innerHTML = visible.map(p => `
    <a class="menu-card" href="${p.href}">
      <div class="menu-icon">${p.icon}</div>
      <div class="menu-text">
        <div class="menu-title">${t(p.titleKey)}</div>
        <div class="menu-desc">${t(p.descKey)}</div>
      </div>
      <div class="menu-arrow">›</div>
    </a>`).join('');
}

async function doLogin() {
  const input = document.getElementById('login-code');
  const errorEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  const code = input.value.trim().toUpperCase();
  
  if (!code) { input.classList.add('error'); setTimeout(() => input.classList.remove('error'), 400); return; }
  
  btn.disabled = true;
  btn.textContent = '...';
  errorEl.textContent = '';
  
  try {
    const r = await fetch(`${WORKER}/api/auth`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code }) });
    const data = await r.json();
    
    if (data.error) {
      input.classList.add('error');
      setTimeout(() => input.classList.remove('error'), 400);
      errorEl.textContent = data.error;
      btn.disabled = false;
      btn.textContent = t('loginBtn');
      return;
    }
    
    session = data;
    localStorage.setItem('au_session', JSON.stringify(session));
    showMain();
  } catch (e) {
    errorEl.textContent = 'Verbindingsfout';
    btn.disabled = false;
    btn.textContent = t('loginBtn');
  }
}

function doLogout() {
  session = null;
  localStorage.removeItem('au_session');
  document.getElementById('main-content').classList.add('hidden');
  document.getElementById('login-overlay').classList.remove('hidden');
  document.getElementById('login-code').value = '';
  document.getElementById('login-error').textContent = '';
}

function showMain() {
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('main-content').classList.remove('hidden');
  renderMenu();
}

// Enter key on login input
document.getElementById('login-code').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// Init: check for saved session
const savedSession = localStorage.getItem('au_session');
if (savedSession) {
  try {
    session = JSON.parse(savedSession);
    // Re-validate session in background
    // Check session expiry
    if (session.expiresAt && Date.now() > session.expiresAt) {
      doLogout();
    } else {
      // Re-validate session in background
      fetch(`${WORKER}/api/auth`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code: session.code }) })
        .then(r => r.json())
        .then(data => {
          if (data.error) { doLogout(); return; }
          session = data;
          localStorage.setItem('au_session', JSON.stringify(session));
          renderMenu();
        })
        .catch(() => {}); // offline = keep cached session
      showMain();
    }
  } catch { /* invalid JSON, show login */ }
}

document.getElementById('lang-select').value = lang;
setLang(lang);
</script>
</body>
</html>
