<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Almere Underground</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    body { margin: 0; background: #0f0f13; color: #f1f1f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    
    .container { max-width: 480px; margin: 0 auto; padding: 40px 16px; min-height: 100vh; }
    
    .header { text-align: center; margin-bottom: 48px; }
    .logo { font-size: 56px; margin-bottom: 12px; }
    .title { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888; }
    
    .menu { display: flex; flex-direction: column; gap: 12px; }
    
    .menu-card {
      background: #1a1a24;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: #f1f1f5;
      transition: all 0.2s;
      border: 1px solid #2a2a38;
      cursor: pointer;
    }
    .menu-card:active { background: #2a2a38; transform: scale(0.98); }
    
    .menu-icon { font-size: 32px; flex-shrink: 0; }
    .menu-text { flex: 1; }
    .menu-title { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .menu-desc { font-size: 12px; color: #888; line-height: 1.4; }
    .menu-arrow { font-size: 18px; color: #555; flex-shrink: 0; }
    
    .menu-card.locked { opacity: 0.35; pointer-events: none; }
    .menu-card.locked .menu-arrow { display: none; }
    .lock-badge { font-size: 11px; color: #ef4444; font-weight: 600; }
    
    .footer { text-align: center; margin-top: 48px; font-size: 11px; color: #444; }
    
    /* Lang switcher */
    .lang-bar { display: flex; justify-content: flex-end; margin-bottom: 24px; }
    #lang-select { background: #1a1a24; border: 1px solid #2a2a38; color: #f1f1f5; border-radius: 8px; padding: 5px 8px; font-size: 13px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="lang-bar">
      <select id="lang-select" onchange="setLang(this.value)">
        <option value="nl">🇳🇱 NL</option>
        <option value="en">🇬🇧 EN</option>
      </select>
    </div>
    
    <div class="header">
      <div class="logo">🎳</div>
      <div class="title">Almere Underground</div>
      <div class="subtitle" id="lp-subtitle">Rapportages & Analytics</div>
    </div>
    
    <div class="menu" id="menu-container">
      <!-- Filled by JS based on access -->
    </div>
    
    <div class="footer">© 2026 Almere Underground</div>
  </div>

<script>
const WORKER = 'https://almere-underground.frankkeijzer.workers.dev';

const TRANSLATIONS = {
  nl: {
    subtitle: 'Rapportages & Analytics',
    dashTitle: 'Omzet Dashboard',
    dashDesc: 'Bezoek, Verkoop, Week, KPI, Personeel & Controle',
    runTitle: 'Run Sheet',
    runDesc: 'Dagelijkse runsheet voor Kinderfeestjes (KF) & Bedrijfsfeesten (BF)',
    openTitle: 'Openstaande Posten',
    openDesc: 'Overzicht van openstaande en toekomstige boekingen',
    locked: 'Geen toegang',
    comingSoon: 'Binnenkort beschikbaar',
  },
  en: {
    subtitle: 'Reports & Analytics',
    dashTitle: 'Revenue Dashboard',
    dashDesc: 'Visit, Sales, Week, KPI, Staff & Control',
    runTitle: 'Run Sheet',
    runDesc: 'Daily run sheet for Birthday Parties (KF) & Corporate Events (BF)',
    openTitle: 'Outstanding Bookings',
    openDesc: 'Overview of outstanding and upcoming bookings',
    locked: 'No access',
    comingSoon: 'Coming soon',
  }
};

let lang = localStorage.getItem('au_lang') || 'nl';
function t(key) { return (TRANSLATIONS[lang] || TRANSLATIONS.nl)[key] || key; }

function setLang(newLang) {
  lang = newLang;
  localStorage.setItem('au_lang', lang);
  document.getElementById('lang-select').value = lang;
  renderMenu();
}

// Menu items with access roles (for now all open, roles come later)
const PAGES = [
  { id: 'dashboard', icon: '📊', titleKey: 'dashTitle', descKey: 'dashDesc', href: 'dashboard.html', roles: ['admin', 'manager'] },
  { id: 'runsheet',  icon: '📋', titleKey: 'runTitle',  descKey: 'runDesc',  href: 'runsheet.html',  roles: ['admin', 'manager', 'operations'] },
  { id: 'openstaand', icon: '💰', titleKey: 'openTitle', descKey: 'openDesc', href: 'openstaand.html', roles: ['admin', 'manager'], comingSoon: true },
];

function renderMenu() {
  document.getElementById('lp-subtitle').textContent = t('subtitle');
  const container = document.getElementById('menu-container');
  container.innerHTML = PAGES.map(p => {
    const locked = p.comingSoon;
    return `
      <a class="menu-card${locked ? ' locked' : ''}" ${locked ? '' : `href="${p.href}"`}>
        <div class="menu-icon">${p.icon}</div>
        <div class="menu-text">
          <div class="menu-title">${t(p.titleKey)}</div>
          <div class="menu-desc">${t(p.descKey)}</div>
          ${locked ? `<div class="lock-badge">🔒 ${t('comingSoon')}</div>` : ''}
        </div>
        ${locked ? '' : '<div class="menu-arrow">›</div>'}
      </a>`;
  }).join('');
}

// Init
document.getElementById('lang-select').value = lang;
renderMenu();
</script>
</body>
</html>
