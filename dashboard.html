<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Almere Underground – Dashboard</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    body { margin: 0; background: #0f0f13; color: #f1f1f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    select { background: #1a1a24; color: #f1f1f5; border: 1px solid #3a3a4a; border-radius: 8px; padding: 6px 10px; font-size: 14px; cursor: pointer; }

    /* Login */
    /* login removed - SSO via landing page */
    .login-logo { font-size:40px; margin-bottom:12px; }
    .login-title { font-size:22px; font-weight:800; margin-bottom:4px; }
    .login-sub { font-size:13px; color:#888; margin-bottom:32px; }
    .login-card { background:#1a1a24; border-radius:20px; padding:28px 24px; width:100%; max-width:360px; }
    .login-label { font-size:12px; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }
    .login-input { width:100%; background:#0f0f13; border:2px solid #2a2a38; border-radius:12px; padding:14px 16px; font-size:18px; color:#f1f1f5; letter-spacing:0.15em; text-align:center; outline:none; transition:border-color 0.2s; font-family:monospace; }
    .login-input:focus { border-color:#7c3aed; }
    .login-input.error { border-color:#ef4444; animation: shake 0.3s; }
    .login-btn { width:100%; margin-top:16px; background:#7c3aed; color:white; border:none; border-radius:12px; padding:15px; font-size:16px; font-weight:700; cursor:pointer; transition:background 0.2s; }
    .login-btn:active { background:#6d28d9; }
    .login-error { color:#ef4444; font-size:13px; text-align:center; margin-top:12px; min-height:18px; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    /* App */
    #app-screen { display:block; max-width:480px; margin:0 auto; padding:16px 12px 90px; transition:max-width .3s; }

    /* Common */
    .card { background:#1a1a24; border-radius:16px; padding:16px; margin-bottom:12px; }
    .card-sm { background:#1a1a24; border-radius:12px; padding:12px; }
    .tab-bar { background:#1a1a24; border-radius:12px; padding:4px; display:flex; gap:4px; margin-bottom:20px; }
    .tab-btn { flex:1; padding:8px 2px; border-radius:8px; font-size:12px; font-weight:600; text-align:center; cursor:pointer; border:none; background:transparent; color:#888; transition:all 0.2s; white-space:nowrap; }
    .tab-btn.active { background:#7c3aed; color:white; }
    .bar-bg { background:#2a2a38; border-radius:999px; height:6px; }
    .bar-fill { border-radius:999px; height:6px; transition:width 0.4s ease; }
    .kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
    .kpi-card { background:#1a1a24; border-radius:12px; padding:12px 8px; text-align:center; }
    .kpi-label { font-size:11px; color:#888; margin-bottom:2px; }
    .kpi-value { font-size:16px; font-weight:700; }
    .section-title { font-size:12px; font-weight:700; color:#aaa; margin-bottom:12px; text-transform:uppercase; letter-spacing:0.05em; }
    .spinner { width:32px; height:32px; border:3px solid #2a2a38; border-top-color:#7c3aed; border-radius:50%; animation:spin 0.8s linear infinite; margin:48px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .nav-btn { background:#1a1a24; border:none; color:#aaa; border-radius:10px; padding:8px 14px; font-size:18px; cursor:pointer; }
    .nav-btn:active { background:#2a2a38; }
    .date-label { font-size:15px; font-weight:700; text-align:center; flex:1; }
    .info-banner { background:#1a1a2480; border:1px solid #2a2a3a; border-radius:10px; padding:10px 12px; font-size:12px; color:#888; margin-bottom:12px; }
    .cat-row { margin-bottom:14px; }
    .cat-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
    .cat-name { display:flex; align-items:center; gap:8px; font-size:14px; font-weight:600; }
    .cat-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .cat-sub { display:flex; justify-content:space-between; font-size:11px; color:#888; margin-top:4px; }
    .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; }
    .week-day-card { background:#1a1a24; border-radius:12px; padding:12px; cursor:pointer; transition:background 0.15s; margin-bottom:8px; }
    .week-day-card:active { background:#2a2a38; }
    .week-day-card.today { border:2px solid #7c3aed; }
    .week-day-card.today .wd-name { color:#7c3aed; }
    .err-msg { text-align:center; padding:40px 20px; color:#ef4444; font-size:13px; line-height:1.6; }

    /* Language switcher */
    #lang-select { background:#1a1a24; border:1px solid #2a2a38; color:#f1f1f5; border-radius:8px; padding:5px 8px; font-size:13px; cursor:pointer; }

    /* Runsheet */
    .rs-section { border-radius:14px; overflow:hidden; margin-bottom:20px; }
    .rs-section-header { padding:14px 16px 12px; font-size:14px; font-weight:800; letter-spacing:0.04em; }

  @media print {
    body { background:#fff !important; color:#000 !important; font-size:11pt; }
    .tab-bar, .nav-btn, #refresh-btn, #lang-select, .cache-label, .no-print { display:none !important; }
    #app-screen { padding:0 !important; max-width:100% !important; }
    .rs-section { border:1px solid #ccc !important; border-radius:4px !important; break-inside:avoid; margin-bottom:12pt; }
    .rs-section-header { -webkit-print-color-adjust:exact; print-color-adjust:exact; padding:8px 12px !important; }
    .rs-booking { border-bottom:1px solid #eee !important; padding:8px 12px !important; break-inside:avoid; }
    .rs-table { font-size:9pt !important; }
    .pay-badge { border:1px solid #888 !important; color:#000 !important; background:#fff !important; }
    .pay-paid { background:#d4edda !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .pay-unpaid { background:#fff3cd !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .rs-kf { background:#7c3aed !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .rs-bf { background:#1d4ed8 !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    h2, .date-label { color:#000 !important; }
    * { box-shadow:none !important; }
  }
    .rs-kf { background:#7c1a1a; }
    .rs-bf { background:#1a3060; }
    .rs-booking { background:#1a1a24; margin-bottom:1px; padding:14px 16px; }
    .rs-booking:last-child { border-radius:0 0 14px 14px; }
    .rs-booking-name { font-size:15px; font-weight:700; margin-bottom:2px; }
    .rs-booking-id { font-size:11px; color:#666; margin-bottom:10px; }
    .rs-table { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:10px; }
    .rs-table th { text-align:left; color:#888; font-weight:600; padding:4px 6px 4px 0; border-bottom:1px solid #2a2a38; }
    .rs-table td { padding:5px 6px 5px 0; vertical-align:top; border-bottom:1px solid #1e1e2a; color:#ddd; }
    .rs-table tr:last-child td { border-bottom:none; }
    .rs-notes { background:#111118; border-radius:8px; padding:10px 12px; font-size:12px; color:#bbb; margin-top:8px; }
    .rs-notes-label { font-size:10px; color:#666; font-weight:600; text-transform:uppercase; margin-bottom:4px; }
    .pay-badge { display:inline-block; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:700; color:white; }
    .pay-paid { background:#166534; }
    .pay-unpaid { background:#92400e; }
    .rs-empty { text-align:center; padding:32px; color:#555; font-size:13px; background:#1a1a24; border-radius:12px; }

    /* ── Responsive / Desktop ─────────────────────── */
    @media (min-width: 768px) {
      body.desktop-mode #app-screen { max-width:1100px; padding:24px 32px 60px; }
      body.desktop-mode .tab-bar { gap:6px; }
      body.desktop-mode .tab-btn { font-size:13px; padding:10px 6px; }
      body.desktop-mode .kpi-grid { grid-template-columns:repeat(4,1fr); }
      body.desktop-mode .kpi-card { padding:16px 12px; }
      body.desktop-mode .kpi-value { font-size:20px; }
    }
    body.force-desktop #app-screen { max-width:1100px !important; padding:24px 32px 60px !important; }
    body.force-desktop .tab-bar { gap:6px; }
    body.force-desktop .tab-btn { font-size:13px; padding:10px 6px; }
    body.force-mobile #app-screen { max-width:480px !important; }

    /* View toggle */
    .view-toggle { background:#1a1a24; border:1px solid #2a2a38; color:#aaa; border-radius:8px; padding:5px 8px; font-size:13px; cursor:pointer; }
    .view-toggle:hover { border-color:#7c3aed; color:#e0e0f0; }

    /* ── Gantt Chart ──────────────────────────────── */
    .gantt-container { overflow-x:auto; margin-bottom:24px; }
    .gantt-wrap { min-width:600px; }
    .gantt-header { display:flex; align-items:center; margin-bottom:4px; padding-left:140px; }
    .gantt-hour { flex:1; text-align:center; font-size:10px; color:#555; font-weight:600; }
    .gantt-dept-label { font-size:13px; font-weight:700; color:#7c3aed; margin:16px 0 6px; padding:6px 0; border-bottom:1px solid #1e1e2a; }
    .gantt-row { display:flex; align-items:center; margin-bottom:3px; min-height:28px; }
    .gantt-name { width:140px; flex-shrink:0; font-size:12px; color:#ccc; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:8px; }
    .gantt-track { flex:1; position:relative; height:22px; background:#12121c; border-radius:4px; }
    .gantt-bar { position:absolute; height:16px; top:3px; border-radius:3px; min-width:3px; }
    .gantt-bar.planned { background:rgba(124,58,237,0.5); border:1px solid #7c3aed; }
    .gantt-bar.clocked { background:rgba(16,185,129,0.5); border:1px solid #10b981; }
    .gantt-grid-line { position:absolute; top:0; bottom:0; width:1px; background:#1e1e2a; }
    .gantt-legend { display:flex; gap:16px; justify-content:center; margin:12px 0 8px; font-size:11px; color:#888; }
    .gantt-legend-dot { display:inline-block; width:12px; height:12px; border-radius:3px; margin-right:4px; vertical-align:middle; }
    .gantt-now-line { position:absolute; top:-2px; bottom:-2px; width:2px; background:#ef4444; z-index:5; }
    .gantt-now-label { position:absolute; top:-16px; font-size:9px; color:#ef4444; font-weight:700; transform:translateX(-50%); }
  
  </style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────────────────────── -->
<!-- SSO: login via landing page -->

<!-- ── APP ───────────────────────────────────────────────────────────────── -->
<div id="app-screen">
  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <div>
      <a href="index.html" style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;text-decoration:none;">← Almere Underground</a>
      <div style="font-size:20px;font-weight:800;">Omzet Dashboard</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <select id="lang-select" onchange="setLang(this.value)" title="Language / Taal">
        <option value="nl">🇳🇱 NL</option>
        <option value="en">🇬🇧 EN</option>
      </select>
      <button id="view-toggle-btn" class="view-toggle" onclick="toggleViewMode()" title="Wissel weergave">🖥️</button>
      <div id="live-dot" style="width:8px;height:8px;border-radius:50%;background:#10b981;" title="Live data"></div>
      <button id="refresh-btn" onclick="refreshAll()" style="background:#1a1a24;border:1px solid #2a2a38;color:#aaa;border-radius:8px;padding:6px 10px;font-size:16px;cursor:pointer;line-height:1;" title="Data verversen">🔄</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('week')" id="tab-week">📅 Week</button>
    <button class="tab-btn" onclick="switchTab('bezoek')" id="tab-bezoek">🏟️ Bezoek</button>
    <button class="tab-btn" onclick="switchTab('verkoop')" id="tab-verkoop">💳 Verkoop</button>
    <button class="tab-btn" onclick="switchTab('controle')" id="tab-controle">🔍 Controle</button>
  </div>

  <div id="content"></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const WORKER = 'https://almere-underground.frankkeijzer.workers.dev';

// ── View Mode Toggle ─────────────────────────────────────────────────────────
function getViewMode() { return localStorage.getItem('au_view_mode') || 'auto'; }
function applyViewMode() {
  const mode = getViewMode();
  document.body.classList.remove('desktop-mode','force-desktop','force-mobile');
  if (mode === 'desktop') document.body.classList.add('force-desktop');
  else if (mode === 'mobile') document.body.classList.add('force-mobile');
  else if (window.innerWidth >= 768) document.body.classList.add('desktop-mode');
  const btn = document.getElementById('view-toggle-btn');
  if (btn) btn.textContent = mode === 'desktop' ? '📱' : mode === 'mobile' ? '🖥️' : (window.innerWidth >= 768 ? '📱' : '🖥️');
  if (btn) btn.title = {auto:'Automatisch — klik om te wisselen', desktop:'Desktop geforceerd', mobile:'Mobiel geforceerd'}[mode];
}
function toggleViewMode() {
  const modes = ['auto','desktop','mobile'];
  const cur = getViewMode();
  const next = modes[(modes.indexOf(cur)+1)%3];
  localStorage.setItem('au_view_mode', next);
  applyViewMode();
  // Re-render current tab for layout changes
  if (typeof renderCurrentTab === 'function') renderCurrentTab();
}
function isWideView() {
  const m = getViewMode();
  return m === 'desktop' || (m === 'auto' && window.innerWidth >= 768);
}
window.addEventListener('resize', applyViewMode);


// ── BMI Historical Data ────────────────────────────────────────────────────
let bmiData = null;
async function loadBmiData() {
  if (bmiData) return bmiData;
  try {
    const r = await fetch(`${WORKER}/api/bmi`, { headers: { 'X-Access-Code': accessCode } });
    bmiData = await r.json();
  } catch(e) { bmiData = {}; }
  return bmiData;
}
function bmiForDate(dateStr) {
  // Returns { total, byCategory } for a given date, or null
  if (!bmiData || !bmiData[dateStr]) return null;
  const d = bmiData[dateStr];
  const total = Object.values(d).reduce((s,c) => s + (c.total||0), 0);
  return { total, byCategory: d };
}
function bmiForDates(dates) {
  // Aggregate bmi data for a list of date strings
  if (!bmiData) return null;
  const agg = {}; let total = 0;
  for (const dt of dates) {
    const d = bmiData[dt];
    if (!d) continue;
    for (const [cat, v] of Object.entries(d)) {
      if (!agg[cat]) agg[cat] = { total: 0, subs: {} };
      agg[cat].total += v.total || 0;
      total += v.total || 0;
      for (const [sub, amt] of Object.entries(v.subs || {})) {
        agg[cat].subs[sub] = (agg[cat].subs[sub] || 0) + amt;
      }
    }
  }
  return total > 0 ? { total, byCategory: agg } : null;
}
function dateMinusYear(dateStr) {
  // Returns dateStr - 364 days (same weekday last year)
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() - 364);
  return d.toISOString().slice(0,10);
}

// ── Weather (Open-Meteo, free, no key) ────────────────────────────────────────
const WMO_ICONS = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌦️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'❄️', 73:'❄️', 75:'❄️', 77:'🌨️',
  80:'🌧️', 81:'🌧️', 82:'⛈️',
  85:'❄️', 86:'❄️',
  95:'⛈️', 96:'⛈️', 99:'⛈️'
};
function wmoIcon(code) { return WMO_ICONS[code] || '🌡️'; }
const _weatherCache = {};
async function fetchWeather(dateStr) {
  if (_weatherCache[dateStr] !== undefined) return _weatherCache[dateStr];
  try {
    const today = new Date().toISOString().slice(0,10);
    const isArchive = dateStr < today;
    const base = isArchive
      ? 'https://archive-api.open-meteo.com/v1/archive'
      : 'https://api.open-meteo.com/v1/forecast';
    const url = `${base}?latitude=52.37&longitude=5.22&daily=weathercode,temperature_2m_max,temperature_2m_min&start_date=${dateStr}&end_date=${dateStr}&timezone=Europe%2FAmsterdam`;
    const r = await fetch(url);
    const d = await r.json();
    if (!d.daily?.weathercode?.length) { _weatherCache[dateStr] = null; return null; }
    const w = { icon: wmoIcon(d.daily.weathercode[0]), max: Math.round(d.daily.temperature_2m_max[0]), min: Math.round(d.daily.temperature_2m_min[0]) };
    _weatherCache[dateStr] = w;
    return w;
  } catch(e) { _weatherCache[dateStr] = null; return null; }
}
function weatherBadge(w, small = false) {
  if (!w) return '';
  const fs = small ? '11px' : '13px';
  return `<span style="font-size:${fs};color:#aaa;white-space:nowrap;">${w.icon} ${w.max}° / ${w.min}°</span>`;
}

function bmiComparisonCard(bmiResult, label, currentTotal, weather = null, myposLY = null, payterLY = null, nayaxLY = null) {
  if (!bmiResult) return '';
  // Deep-clone to avoid mutating cached data
  const byCategory = JSON.parse(JSON.stringify(bmiResult.byCategory || {}));
  // Inject MyPOS + Payter vorig jaar onder Overig
  const myposExcl = myposLY?.omzetExclBtw || 0;
  const payterExcl = payterLY?.omzetExclBtw || 0;
  if (myposExcl > 0 || payterExcl > 0) {
    if (!byCategory['Overig']) byCategory['Overig'] = { total: 0, subs: {} };
    if (myposExcl > 0) {
      byCategory['Overig'].subs['Speelgoed Automaat (MyPOS)'] = (byCategory['Overig'].subs['Speelgoed Automaat (MyPOS)'] || 0) + myposExcl;
      byCategory['Overig'].total += myposExcl;
    }
    if (payterExcl > 0) {
      byCategory['Overig'].subs['Kluisjes (Payter)'] = (byCategory['Overig'].subs['Kluisjes (Payter)'] || 0) + payterExcl;
      byCategory['Overig'].total += payterExcl;
    }
  }
  // Inject Nayax (Photobooths) vorig jaar onder Overig
  const nayaxPhotoExcl = nayaxLY?.photobooth?.omzetExclBtw || 0;
  const nayaxSpiegelExcl = nayaxLY?.spiegel?.omzetExclBtw || 0;
  if (nayaxPhotoExcl > 0 || nayaxSpiegelExcl > 0) {
    if (!byCategory['Overig']) byCategory['Overig'] = { total: 0, subs: {} };
    if (nayaxPhotoExcl > 0) {
      byCategory['Overig'].subs['Photobooth Wit (Nayax)'] = (byCategory['Overig'].subs['Photobooth Wit (Nayax)'] || 0) + nayaxPhotoExcl;
      byCategory['Overig'].total += nayaxPhotoExcl;
    }
    if (nayaxSpiegelExcl > 0) {
      byCategory['Overig'].subs['Spiegel Booth (Nayax)'] = (byCategory['Overig'].subs['Spiegel Booth (Nayax)'] || 0) + nayaxSpiegelExcl;
      byCategory['Overig'].total += nayaxSpiegelExcl;
    }
  }
  const total = bmiResult.total + myposExcl + payterExcl + nayaxPhotoExcl + nayaxSpiegelExcl;
  if (total === 0) return '';
  const growth = currentTotal > 0 ? ((currentTotal - total) / total * 100).toFixed(1) : null;
  const growthHtml = growth !== null
    ? `<span style="font-size:13px;font-weight:600;color:${parseFloat(growth)>=0?'#22c55e':'#ef4444'};margin-left:8px;">${parseFloat(growth)>=0?'↑':'↓'} ${Math.abs(growth)}%</span>`
    : '';
  const weatherHtml = weather ? `<span style="font-size:12px;color:#888;margin-left:8px;">${weather.icon} ${weather.max}°/${weather.min}°</span>` : '';
  const RC_COLORS = { 'Activiteiten':'#7c3aed','F&B':'#2563eb','Bedrijfsarrangementen':'#059669','Overig':'#6b7280' };
  const sorted = Object.entries(byCategory).sort((a,b) => b[1].total - a[1].total).filter(([,v]) => v.total > 0);
  let rows = '';
  for (const [cat, v] of sorted) {
    const pct = total > 0 ? (v.total/total*100).toFixed(1) : 0;
    const color = RC_COLORS[cat] || '#6b7280';
    const subEntries = Object.entries(v.subs || {}).sort((a,b)=>b[1]-a[1]).filter(([,s])=>s>0);
    let subRows = '';
    for (const [sub, amt] of subEntries) {
      const subPct = v.total > 0 ? (amt/v.total*100).toFixed(0) : 0;
      subRows += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 4px 12px;border-left:2px solid ${color}40;margin-left:4px;">
        <span style="font-size:11px;color:#aaa;">${sub}</span>
        <span style="font-size:11px;color:#aaa;">${fmtEur(amt)} <span style="color:#666;">${subPct}%</span></span>
      </div>`;
    }
    rows += `<div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;"></div>
          <span style="font-size:12px;color:#ccc;">${cat}</span>
        </div>
        <div style="font-size:12px;font-weight:600;color:#ccc;">${fmtEur(v.total)} <span style="color:#666;">${pct}%</span></div>
      </div>
      <div style="height:4px;background:#333;border-radius:2px;margin-bottom:4px;">
        <div style="height:4px;background:${color}80;border-radius:2px;width:${pct}%;"></div>
      </div>
      ${subRows}
    </div>`;
  }
  return `<div class="card" style="opacity:0.85;border:1px solid #333;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div>
        <div class="section-title" style="margin-bottom:0;">📊 ${label}</div>
        ${weatherHtml}
      </div>
      <div style="font-size:16px;font-weight:700;color:#aaa;">${fmtEur(total)}${growthHtml}</div>
    </div>
    ${rows}
  </div>`;
}

// ── API ───────────────────────────────────────────────────────────────────────
const cache = {};

async function api(path, forceRefresh = false) {
  const key = path;
  if (!forceRefresh && cache[key]) return cache[key];
  const sep = path.includes('?') ? '&' : '?';
  const url = forceRefresh ? `${WORKER}${path}${sep}refresh=1` : `${WORKER}${path}`;
  const r = await fetch(url, { headers: { 'X-Access-Code': accessCode } });
  const data = await r.json();
  if (data.error) throw new Error(data.error);
  cache[key] = data;
  if (!forceRefresh) setTimeout(() => delete cache[key], 5 * 60 * 1000);
  return data;
}

async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  Object.keys(cache).forEach(k => delete cache[k]);
  try {
    await renderCurrentTab(true);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔄'; }
  }
}

function todayStr() {
  return new Date().toLocaleDateString('sv-SE');
}

function addDays(s, n) {
  const d = new Date(s + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toLocaleDateString('sv-SE');
}

function fmtEur(v) {
  if (v == null || isNaN(v)) return '—';
  return '€\u00a0' + v.toLocaleString(locale(), { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(s) {
  return new Date(s + 'T00:00:00').toLocaleDateString(locale(), { weekday: 'short', day: 'numeric', month: 'short' });
}

function fmtDateLong(s) {
  return new Date(s + 'T00:00:00').toLocaleDateString(locale(), { weekday: 'long', day: 'numeric', month: 'long' });
}

function fmtTime(t) {
  if (!t) return '—';
  return t.length > 5 ? t.substring(11, 16) : t;
}

  const age = data._cacheAge;
  const timeStr = at ? new Date(at).toLocaleString(locale(),{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
  const ageStr = age != null ? (age < 60 ? `${age}${t('agoSec')}` : `${Math.floor(age/60)}${t('agoMin')}`) : '';

}

// ── WEEK VIEW ─────────────────────────────────────────────────────────────────
async function renderWeek(forceRefresh = false) {
  setContent(spinner());
  try {
    const data = await api(`/api/week?offset=${weekOffset}`, forceRefresh);
    const days = data.days || [];
    const today = todayStr();
    const maxRev = Math.max(...days.map(d => d.visit?.netRevenue || 0), 1);

    const startLabel = new Date(days[0]?.date + 'T00:00:00').toLocaleDateString(locale(), { day: 'numeric', month: 'short' });
    const endLabel   = new Date(days[6]?.date + 'T00:00:00').toLocaleDateString(locale(), { day: 'numeric', month: 'short' });

    // ── Cumulative week category breakdown ────────────────────────────────────
    const weekRcData = {};
    let weekTotalRev = 0;
    let weekTotalVis = 0;
    for (const day of days) {
      const rc = day.visit?.byReportingCategory || {};
      const dayMyposRev = (day.mypos?.omzetExclBtw || 0);
      const dayPayterRev = (day.payter?.omzetExclBtw || 0);
      weekTotalRev += (day.visit?.netRevenue || 0) + dayMyposRev + dayPayterRev;
      weekTotalVis += day.visit?.visitors || 0;
      for (const [catName, catData] of Object.entries(rc)) {
        if (!weekRcData[catName]) weekRcData[catName] = { revenue: 0, visitors: 0, subcategories: {} };
        weekRcData[catName].revenue += catData.revenue || 0;
        weekRcData[catName].visitors += catData.visitors || 0;
        for (const [subName, subData] of Object.entries(catData.subcategories || {})) {
          if (!weekRcData[catName].subcategories[subName]) weekRcData[catName].subcategories[subName] = { revenue: 0, visitors: 0 };
          weekRcData[catName].subcategories[subName].revenue += subData.revenue || 0;
          weekRcData[catName].subcategories[subName].visitors += subData.visitors || 0;
        }
      }
      // MyPOS excl. BTW → Overig subcategorie
      if (dayMyposRev > 0) {
        if (!weekRcData['Overig']) weekRcData['Overig'] = { revenue: 0, visitors: 0, subcategories: {} };
        weekRcData['Overig'].revenue += dayMyposRev;
        if (!weekRcData['Overig'].subcategories['Speelgoed Automaat (MyPOS)']) weekRcData['Overig'].subcategories['Speelgoed Automaat (MyPOS)'] = { revenue: 0, visitors: 0 };
        weekRcData['Overig'].subcategories['Speelgoed Automaat (MyPOS)'].revenue += dayMyposRev;
        weekRcData['Overig'].subcategories['Speelgoed Automaat (MyPOS)'].visitors += day.mypos?.aantalBetalingen || 0;
      }
      // Payter excl. BTW → Overig subcategorie
      if (dayPayterRev > 0) {
        if (!weekRcData['Overig']) weekRcData['Overig'] = { revenue: 0, visitors: 0, subcategories: {} };
        weekRcData['Overig'].revenue += dayPayterRev;
        if (!weekRcData['Overig'].subcategories['Kluisjes (Payter)']) weekRcData['Overig'].subcategories['Kluisjes (Payter)'] = { revenue: 0, visitors: 0 };
        weekRcData['Overig'].subcategories['Kluisjes (Payter)'].revenue += dayPayterRev;
        weekRcData['Overig'].subcategories['Kluisjes (Payter)'].visitors += day.payter?.transactions || 0;
      }
      // Nayax excl. BTW → Overig subcategorieën (Photobooth Wit + Spiegel Booth)
      const dayNayaxPhotoRev = day.nayax?.photobooth?.omzetExclBtw || 0;
      const dayNayaxSpiegelRev = day.nayax?.spiegel?.omzetExclBtw || 0;
      if (dayNayaxPhotoRev > 0) {
        if (!weekRcData['Overig']) weekRcData['Overig'] = { revenue: 0, visitors: 0, subcategories: {} };
        weekRcData['Overig'].revenue += dayNayaxPhotoRev;
        weekTotalRev += dayNayaxPhotoRev;
        if (!weekRcData['Overig'].subcategories['Photobooth Wit (Nayax)']) weekRcData['Overig'].subcategories['Photobooth Wit (Nayax)'] = { revenue: 0, visitors: 0 };
        weekRcData['Overig'].subcategories['Photobooth Wit (Nayax)'].revenue += dayNayaxPhotoRev;
        weekRcData['Overig'].subcategories['Photobooth Wit (Nayax)'].visitors += day.nayax?.photobooth?.transactions || 0;
      }
      if (dayNayaxSpiegelRev > 0) {
        if (!weekRcData['Overig']) weekRcData['Overig'] = { revenue: 0, visitors: 0, subcategories: {} };
        weekRcData['Overig'].revenue += dayNayaxSpiegelRev;
        weekTotalRev += dayNayaxSpiegelRev;
        if (!weekRcData['Overig'].subcategories['Spiegel Booth (Nayax)']) weekRcData['Overig'].subcategories['Spiegel Booth (Nayax)'] = { revenue: 0, visitors: 0 };
        weekRcData['Overig'].subcategories['Spiegel Booth (Nayax)'].revenue += dayNayaxSpiegelRev;
        weekRcData['Overig'].subcategories['Spiegel Booth (Nayax)'].visitors += day.nayax?.spiegel?.transactions || 0;
      }
      // Untill F&B (excl BTW for Bezoek-context week view)
      const dayUntillDrankExcl = (day.untill?.drank || 0) / 1.21;
      const dayUntillFoodExcl = (day.untill?.food || 0) / 1.09;
      const dayUntillDivExcl = (day.untill?.diversen || 0) / 1.21;
      const dayUntillRevExcl = dayUntillDrankExcl + dayUntillFoodExcl + dayUntillDivExcl;
      if (dayUntillRevExcl > 0) {
        weekTotalRev += dayUntillRevExcl;
        if (!weekRcData['F&B']) weekRcData['F&B'] = { revenue: 0, visitors: 0, subcategories: {} };
        weekRcData['F&B'].revenue += dayUntillRevExcl;
        if (!weekRcData['F&B'].subcategories['🍺 Dranken']) weekRcData['F&B'].subcategories['🍺 Dranken'] = { revenue: 0, visitors: 0 };
        weekRcData['F&B'].subcategories['🍺 Dranken'].revenue += dayUntillDrankExcl;
        if (!weekRcData['F&B'].subcategories['🍽️ Keuken']) weekRcData['F&B'].subcategories['🍽️ Keuken'] = { revenue: 0, visitors: 0 };
        weekRcData['F&B'].subcategories['🍽️ Keuken'].revenue += dayUntillFoodExcl;
      }
    }
    const RC_COLORS_W = ['#7c3aed','#2563eb','#059669','#d97706','#dc2626','#0891b2','#7c3aed','#6b7280'];
    const weekRcEntries = Object.entries(weekRcData).sort((a,b) => b[1].revenue - a[1].revenue).filter(([,d]) => d.revenue > 0);
    let weekCatRows = '';
    weekRcEntries.forEach(([catName, catData], ci) => {
      const color = RC_COLORS_W[ci % RC_COLORS_W.length];
      const pct = weekTotalRev > 0 ? (catData.revenue / weekTotalRev * 100).toFixed(1) : 0;

// ── Hourly line chart ─────────────────────────────────────────────────────────
function hourlyBarChart(byHour, color = '#2563eb') {
  // Show hours 09–01 (CEST business day)
  const hours = [];
  for (let i = 9; i <= 23; i++) hours.push(String(i).padStart(2, '0'));
  hours.push('00', '01');

  const vals = hours.map(h => byHour[h] || 0);
  const max = Math.max(...vals, 1);

  // SVG dimensions
  const W = 600, H = 90, padL = 0, padR = 8, padT = 20, padB = 22;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const n = hours.length;

  // Format value without currency: e.g. 1234 → "1234", 12345 → "12k"
  function fmtVal(v) {
    if (v >= 1000) return Math.round(v / 1000 * 10) / 10 + 'k';
    return Math.round(v).toString();
  }

  // X/Y helpers
  const x = i => padL + (i / (n - 1)) * chartW;
  const y = v => padT + chartH - (v / max) * chartH;

  // Build polyline points
  const points = vals.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');

  // Fill area under line
  const fillPts = `${x(0).toFixed(1)},${(padT + chartH).toFixed(1)} ` +
    vals.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ') +
    ` ${x(n-1).toFixed(1)},${(padT + chartH).toFixed(1)}`;

  // Dots + labels every hour
  const dotsSVG = hours.map((h, i) => {
    const v = vals[i];
    const cx = x(i).toFixed(1), cy = y(v).toFixed(1);
    const showLabel = v > 0;
    const labelY = (parseFloat(cy) - 5 < padT + 4) ? parseFloat(cy) + 12 : parseFloat(cy) - 5;
    return `
      <circle cx="${cx}" cy="${cy}" r="${v > 0 ? 2.5 : 1.5}" fill="${v > 0 ? color : '#ccc'}" />
      ${showLabel ? `<text x="${cx}" y="${labelY.toFixed(1)}" text-anchor="middle" font-size="11" fill="white" font-weight="800" stroke="rgba(0,0,0,0.55)" stroke-width="3" paint-order="stroke">${fmtVal(v)}</text>` : ''}
    `;
  }).join('');

  // X-axis hour labels (every hour)
  const labelsSVG = hours.map((h, i) => {
    return `<text x="${x(i).toFixed(1)}" y="${(H - 4).toFixed(1)}" text-anchor="middle" font-size="9" fill="#888">${parseInt(h)}</text>`;
  }).join('');

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible;" preserveAspectRatio="none">
    <defs>
      <linearGradient id="lg${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.01"/>
      </linearGradient>
    </defs>
    <!-- fill area -->
    <polygon points="${fillPts}" fill="url(#lg${color.replace('#','')})" />
    <!-- baseline -->
    <line x1="${padL}" y1="${padT + chartH}" x2="${W - padR}" y2="${padT + chartH}" stroke="#e5e7eb" stroke-width="1"/>
    <!-- line -->
    <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- dots + value labels -->
    ${dotsSVG}
    <!-- hour labels -->
    ${labelsSVG}
  </svg>`;
}

// ── Navigation ────────────────────────────────────────────────────────────────
function dateNav(mode = 'day', noPrint = false) {
  const dateStr = mode === 'day' ? selectedDate : persDate;
  const shiftFn = mode === 'day' ? 'shiftDay' : 'shiftPers';
  const changeFn = mode === 'day' ? 'onDayDateChange' : 'onPersDateChange';
  return `
    <div ${noPrint ? 'class="no-print"' : ''} style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <button class="nav-btn" onclick="${shiftFn}(-1)">‹</button>
      <div style="flex:1;text-align:center;cursor:pointer;position:relative;min-height:38px;display:flex;align-items:center;justify-content:center;" onclick="triggerDatePicker('dp-${mode}')">
        <div class="date-label" style="text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;pointer-events:none;">${fmtDateLong(dateStr)}</div>
        <input type="date" id="dp-${mode}" value="${dateStr}" onchange="${changeFn}(this.value)" style="position:absolute;inset:0;opacity:0.001;border:none;cursor:pointer;z-index:10;background:transparent;">
      </div>
      <button class="nav-btn" onclick="${shiftFn}(1)">›</button>
    </div>`;
}

function triggerDatePicker(id) {
  const el = document.getElementById(id);
  if (!el) return;
  try { if (el.showPicker) el.showPicker(); else el.click(); } catch(e) { el.click(); }
}
function onDayDateChange(val) { selectedDate = val; render(); }
function onPersDateChange(val) { persDate = val; expandedDept = null; render(); }
function shiftDay(n) { selectedDate = addDays(selectedDate, n); render(); }
function shiftWeek(n) { weekOffset += n; render(); }
function shiftPers(n) { persDate = addDays(persDate, n); expandedDept = null; render(); }

function goToDay(date) {
  selectedDate = date;
  switchTab('bezoek');
}


function renderCurrentTab() {
  switchTab(currentTab, false);
}

function switchTab(tab) {
  currentTab = tab;
  expandedDept = null;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('tab-' + tab);
  if (el) el.classList.add('active');
  render();
}

function render() {
  if (!accessCode) return;
  renderCurrentTab(false);
}

async function renderCurrentTab(forceRefresh = false) {
  if (!accessCode) return;
  if (currentTab === 'week')      await renderWeek(forceRefresh);
  else if (currentTab === 'bezoek')   await renderBezoek(forceRefresh);
  else if (currentTab === 'verkoop')  await renderVerkoop(forceRefresh);
  else if (currentTab === 'controle')  await renderControle(forceRefresh);
}

// ── CONTROLE VIEW ─────────────────────────────────────────────────────────────

function controleModeBtns() {
  return `<div style="display:flex;gap:8px;margin-bottom:16px;">
    <button onclick="controleMode='dag';renderControle()" style="flex:1;padding:9px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;${controleMode==='dag'?'background:#7c3aed;color:#fff;':'background:#1a1a24;color:#aaa;'}">${t('ctrlDag')}</button>
    <button onclick="controleMode='week';renderControle()" style="flex:1;padding:9px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;${controleMode==='week'?'background:#7c3aed;color:#fff;':'background:#1a1a24;color:#aaa;'}">${t('ctrlWeek')}</button>
  </div>`;
}

async function renderControle(forceRefresh = false) {
  setContent(spinner());
  try {
    if (controleMode === 'dag') {
      await renderControleDay(forceRefresh);
    } else {
      await renderControleWeek(forceRefresh);
    }
  } catch(e) { setContent(errMsg(e.message)); }
}

async function renderControleDay(forceRefresh = false) {
  const [data, mypos, payter, nayax] = await Promise.all([
    api(`/api/day?date=${selectedDate}`, forceRefresh),
    api(`/api/mypos?date=${selectedDate}`, forceRefresh).catch(() => null),
    api(`/api/payter?date=${selectedDate}`, forceRefresh).catch(() => null),
    api(`/api/nayax?date=${selectedDate}`, forceRefresh).catch(() => null),
  ]);
  const { visit, sales } = data;

  // Omzet (excl BTW, boekingsdatum)
  const rollerOmzet    = visit?.netRevenue || 0;
  const myposOmzet     = mypos?.omzetExclBtw || 0;
  const payterOmzet    = payter?.omzetExclBtw || 0;
  const nayaxPhotoOmzet   = nayax?.photobooth?.omzetExclBtw || 0;
  const nayaxSpiegelOmzet = nayax?.spiegel?.omzetExclBtw || 0;
  const totalOmzet = rollerOmzet + myposOmzet + payterOmzet + nayaxPhotoOmzet + nayaxSpiegelOmzet;

  // Betalingen (incl BTW, transactiedatum)
  const rollerBetaling    = sales?.fundsReceived || 0;
  const myposBetaling     = mypos?.totalInclBtw || 0;
  const payterBetaling    = payter?.totalInclBtw || 0;
  const nayaxPhotoBetaling   = nayax?.photobooth?.totalInclBtw || 0;
  const nayaxSpiegelBetaling = nayax?.spiegel?.totalInclBtw || 0;
  const totalBetaling = rollerBetaling + myposBetaling + payterBetaling + nayaxPhotoBetaling + nayaxSpiegelBetaling;

  // Referentie-totalen zoals Bezoek/Verkoop tab ze berekenen
  const bezoekRef  = rollerOmzet + myposOmzet + payterOmzet + (nayax?.omzetExclBtw || 0);
  const verkoopRef = rollerBetaling + myposBetaling + payterBetaling + (nayax?.totalInclBtw || 0);
  const omzetMatch   = Math.abs(totalOmzet - bezoekRef) < 0.02;
  const betalingMatch = Math.abs(totalBetaling - verkoopRef) < 0.02;

  function sysRow(emoji, name, amount, tx, isTotaal = false) {
    if (!isTotaal && amount === 0 && tx === 0) return '';
    const style = isTotaal ? 'border-top:2px solid #3a3a4a;' : '';
    const fw = isTotaal ? '800' : '600';
    const fs = isTotaal ? '15px' : '13px';
    return `<tr style="${style}">
      <td style="padding:9px 4px;font-size:${isTotaal?'14px':'13px'};font-weight:${fw};">${emoji ? emoji+' ' : ''}${name}</td>
      <td style="padding:9px 4px;text-align:right;font-size:${fs};font-weight:${fw};">${fmtEur(amount)}</td>
      <td style="padding:9px 4px;text-align:right;font-size:12px;color:#888;">${tx > 0 ? tx.toLocaleString(locale()) : (isTotaal ? '' : '—')}</td>
    </tr>`;
  }

  function checkBadge(ok, label) {
    if (ok) return `<span style="background:#05966920;color:#059669;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;">✅ ${label}</span>`;
    return `<span style="background:#ef444420;color:#ef4444;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;">⚠️ ${t('controleDiff')}</span>`;
  }

  function tableHead(amountLabel) {
    return `<thead><tr style="border-bottom:1px solid #3a3a4a;">
      <th style="text-align:left;padding:6px 4px;font-size:11px;color:#888;font-weight:600;">${t('ctrlSystem')}</th>
      <th style="text-align:right;padding:6px 4px;font-size:11px;color:#888;font-weight:600;">${amountLabel}</th>
      <th style="text-align:right;padding:6px 4px;font-size:11px;color:#888;font-weight:600;">${t('ctrlTx')}</th>
    </tr></thead>`;
  }

  const diffOmzetBetaling = Math.abs(totalOmzet - totalBetaling);

  setContent(`
    ${controleModeBtns()}
    ${dateNav()}

    <div class="card">
      <div class="section-title">📊 ${t('ctrlOmzetTitle')} <span style="font-size:11px;color:#888;font-weight:400;">(${t('ctrlOmzetSub')})</span></div>
      <table style="width:100%;border-collapse:collapse;">
        ${tableHead(t('ctrlOmzet'))}
        <tbody>
          ${sysRow('🎳', 'Roller', rollerOmzet, visit?.visitors || 0)}
          ${sysRow('🎮', 'Speelgoed Automaat (MyPOS)', myposOmzet, mypos?.aantalBetalingen || 0)}
          ${sysRow('🔐', 'Kluisjes (Payter)', payterOmzet, payter?.transactions || 0)}
          ${sysRow('📸', 'Photobooth Wit (Nayax)', nayaxPhotoOmzet, nayax?.photobooth?.transactions || 0)}
          ${sysRow('🪞', 'Spiegel Booth (Nayax)', nayaxSpiegelOmzet, nayax?.spiegel?.transactions || 0)}
          ${sysRow('', t('ctrlTotal'), totalOmzet, 0, true)}
        </tbody>
      </table>
      <div style="margin-top:12px;">${checkBadge(omzetMatch, t('ctrlMatchBezoek'))}</div>
    </div>

    <div class="card">
      <div class="section-title">💳 ${t('ctrlBetalingTitle')} <span style="font-size:11px;color:#888;font-weight:400;">(${t('ctrlBetalingSub')})</span></div>
      <table style="width:100%;border-collapse:collapse;">
        ${tableHead(t('ctrlBetaling'))}
        <tbody>
          ${sysRow('🎳', 'Roller', rollerBetaling, sales?.transactionCount || 0)}
          ${sysRow('🎮', 'Speelgoed Automaat (MyPOS)', myposBetaling, mypos?.transactions || 0)}
          ${sysRow('🔐', 'Kluisjes (Payter)', payterBetaling, payter?.transactions || 0)}
          ${sysRow('📸', 'Photobooth Wit (Nayax)', nayaxPhotoBetaling, nayax?.photobooth?.transactions || 0)}
          ${sysRow('🪞', 'Spiegel Booth (Nayax)', nayaxSpiegelBetaling, nayax?.spiegel?.transactions || 0)}
          ${sysRow('', t('ctrlTotal'), totalBetaling, 0, true)}
        </tbody>
      </table>
      <div style="margin-top:12px;">${checkBadge(betalingMatch, t('ctrlMatchVerkoop'))}</div>
    </div>

    ${diffOmzetBetaling > 0.01 ? `
    <div class="card" style="background:#ffffff08;border:1px solid #3a3a4a;">
      <div style="font-size:12px;color:#aaa;text-align:center;line-height:1.6;">
        💡 <strong>${t('ctrlDiffLabel')}: ${fmtEur(diffOmzetBetaling)}</strong><br>
        <span style="color:#666;">${t('ctrlDiffNote')}</span>
      </div>
    </div>` : ''}

    ${cacheLabel(data)}
  `);
}

async function renderControleWeek(forceRefresh = false) {
  const data = await api(`/api/week?offset=${weekOffset}`, forceRefresh);
  const days = data.days || [];
  const today = todayStr();

  const startLabel = new Date(days[0]?.date + 'T00:00:00').toLocaleDateString(locale(), { day: 'numeric', month: 'short' });
  const endLabel   = new Date(days[6]?.date + 'T00:00:00').toLocaleDateString(locale(), { day: 'numeric', month: 'short' });

  // Aggregate week totals per system
  let wRollerOmzet = 0, wMyposOmzet = 0, wPayterOmzet = 0, wNayaxPhotoOmzet = 0, wNayaxSpiegelOmzet = 0;
  let wRollerBet = 0, wMyposBet = 0, wPayterBet = 0, wNayaxPhotoBet = 0, wNayaxSpiegelBet = 0;
  let wRollerTx = 0, wMyposTx = 0, wPayterTx = 0, wNayaxPhotoTx = 0, wNayaxSpiegelTx = 0;

  for (const day of days) {
    wRollerOmzet  += day.visit?.netRevenue || 0;
    wMyposOmzet   += day.mypos?.omzetExclBtw || 0;
    wPayterOmzet  += day.payter?.omzetExclBtw || 0;
    wNayaxPhotoOmzet   += day.nayax?.photobooth?.omzetExclBtw || 0;
    wNayaxSpiegelOmzet += day.nayax?.spiegel?.omzetExclBtw || 0;

    wRollerBet  += day.sales?.fundsReceived || 0;
    wMyposBet   += day.mypos?.totalInclBtw || 0;
    wPayterBet  += day.payter?.totalInclBtw || 0;
    wNayaxPhotoBet   += day.nayax?.photobooth?.totalInclBtw || 0;
    wNayaxSpiegelBet += day.nayax?.spiegel?.totalInclBtw || 0;

    wRollerTx  += day.visit?.visitors || 0;
    wMyposTx   += day.mypos?.aantalBetalingen || 0;
    wPayterTx  += day.payter?.transactions || 0;
    wNayaxPhotoTx   += day.nayax?.photobooth?.transactions || 0;
    wNayaxSpiegelTx += day.nayax?.spiegel?.transactions || 0;
  }

  const wTotalOmzet  = wRollerOmzet + wMyposOmzet + wPayterOmzet + wNayaxPhotoOmzet + wNayaxSpiegelOmzet;
  const wTotalBet    = wRollerBet + wMyposBet + wPayterBet + wNayaxPhotoBet + wNayaxSpiegelBet;
  const wDiff = Math.abs(wTotalOmzet - wTotalBet);

  function sysRow(emoji, name, amount, tx, isTotaal = false) {
    if (!isTotaal && amount === 0 && tx === 0) return '';
    const style = isTotaal ? 'border-top:2px solid #3a3a4a;' : '';
    const fw = isTotaal ? '800' : '600';
    return `<tr style="${style}">
      <td style="padding:9px 4px;font-size:${isTotaal?'14px':'13px'};font-weight:${fw};">${emoji ? emoji+' ' : ''}${name}</td>
      <td style="padding:9px 4px;text-align:right;font-size:${isTotaal?'15px':'13px'};font-weight:${fw};">${fmtEur(amount)}</td>
      <td style="padding:9px 4px;text-align:right;font-size:12px;color:#888;">${tx > 0 ? tx.toLocaleString(locale()) : (isTotaal ? '' : '—')}</td>
    </tr>`;
  }

  function tableHead(amountLabel) {
    return `<thead><tr style="border-bottom:1px solid #3a3a4a;">
      <th style="text-align:left;padding:6px 4px;font-size:11px;color:#888;font-weight:600;">${t('ctrlSystem')}</th>
      <th style="text-align:right;padding:6px 4px;font-size:11px;color:#888;font-weight:600;">${amountLabel}</th>
      <th style="text-align:right;padding:6px 4px;font-size:11px;color:#888;font-weight:600;">${t('ctrlTx')}</th>
    </tr></thead>`;
  }

  // Per-day rows
  let dayOmzetRows = '';
  let dayBetRows = '';
  for (const day of days) {
    const isToday = day.date === today;
    const dayLabel = new Date(day.date + 'T00:00:00').toLocaleDateString(locale(), { weekday: 'short', day: 'numeric', month: 'short' });
    const dRollerOmzet = day.visit?.netRevenue || 0;
    const dMyposOmzet  = day.mypos?.omzetExclBtw || 0;
    const dPayterOmzet = day.payter?.omzetExclBtw || 0;
    const dNayaxOmzet  = (day.nayax?.photobooth?.omzetExclBtw || 0) + (day.nayax?.spiegel?.omzetExclBtw || 0);
    const dTotalOmzet  = dRollerOmzet + dMyposOmzet + dPayterOmzet + dNayaxOmzet;

    const dRollerBet = day.sales?.fundsReceived || 0;
    const dMyposBet  = day.mypos?.totalInclBtw || 0;
    const dPayterBet = day.payter?.totalInclBtw || 0;
    const dNayaxBet  = (day.nayax?.photobooth?.totalInclBtw || 0) + (day.nayax?.spiegel?.totalInclBtw || 0);
    const dTotalBet  = dRollerBet + dMyposBet + dPayterBet + dNayaxBet;

    const todayStyle = isToday ? 'color:#a78bfa;font-weight:700;' : '';
    const rowStyle = isToday ? 'background:#7c3aed10;' : '';

    dayOmzetRows += `<tr style="${rowStyle}" onclick="selectedDate='${day.date}';controleMode='dag';renderControle();" style="cursor:pointer;">
      <td style="padding:8px 4px;font-size:12px;${todayStyle}">${dayLabel}${isToday?' ·':''}</td>
      <td style="padding:8px 4px;text-align:right;font-size:12px;">${dRollerOmzet > 0 ? fmtEur(dRollerOmzet) : '<span style="color:#555">—</span>'}</td>
      <td style="padding:8px 4px;text-align:right;font-size:12px;">${dMyposOmzet > 0 ? fmtEur(dMyposOmzet) : '<span style="color:#555">—</span>'}</td>
      <td style="padding:8px 4px;text-align:right;font-size:12px;">${dPayterOmzet > 0 ? fmtEur(dPayterOmzet) : '<span style="color:#555">—</span>'}</td>
      <td style="padding:8px 4px;text-align:right;font-size:12px;">${dNayaxOmzet > 0 ? fmtEur(dNayaxOmzet) : '<span style="color:#555">—</span>'}</td>

function togglePersView(view) {
  const listEl = document.getElementById('pers-list-view');
  const ganttEl = document.getElementById('pers-gantt-view');
  const btnList = document.getElementById('pers-view-list');
  const btnGantt = document.getElementById('pers-view-gantt');
  if (!listEl || !ganttEl) return;

    listEl.style.display = 'none';
    ganttEl.style.display = 'block';
    btnList.style.background = '#1a1a24'; btnList.style.color = '#888';
    btnGantt.style.background = '#7c3aed'; btnGantt.style.color = 'white';
  } else {
    listEl.style.display = 'block';
    ganttEl.style.display = 'none';
    btnList.style.background = '#7c3aed'; btnList.style.color = 'white';
    btnGantt.style.background = '#1a1a24'; btnGantt.style.color = '#888';
  }
}

function buildGanttChart(activeDepts) {
  // Determine time range: find earliest start and latest end
  let minH = 24, maxH = 0;
  for (const dept of activeDepts) {
    for (const p of dept.people) {
      if (p.plannedStart) { const h = parseTimeToH(p.plannedStart); if (h < minH) minH = h; }
      if (p.plannedEnd) { const h = parseTimeToH(p.plannedEnd); if (h > maxH) maxH = h; }
      if (p.clockedEnter) { const h = parseTimeToH(p.clockedEnter); if (h < minH) minH = h; }
      if (p.clockedExit && p.clockedExit !== '00:00') { const h = parseTimeToH(p.clockedExit); if (h > maxH) maxH = h; }
    }
  }
  // Default range if no data
  if (minH >= maxH) { minH = 8; maxH = 24; }
  // Round to full hours with padding
  minH = Math.floor(minH);
  maxH = Math.ceil(maxH);
  if (maxH <= minH) maxH = minH + 1;
  const rangeH = maxH - minH;

  // Hour header labels
  let hourLabels = '';
  let gridLines = '';
  for (let h = minH; h <= maxH; h++) {
    hourLabels += `<div class="gantt-hour">${String(h).padStart(2,'0')}:00</div>`;
    const pct = ((h - minH) / rangeH * 100).toFixed(2);
    gridLines += `<div class="gantt-grid-line" style="left:${pct}%"></div>`;
  }

  // Now line
  const now = new Date();
  const nowH = now.getHours() + now.getMinutes() / 60;
  let nowLine = '';
  if (nowH >= minH && nowH <= maxH) {
    const nowPct = ((nowH - minH) / rangeH * 100).toFixed(2);
    nowLine = `<div class="gantt-now-line" style="left:${nowPct}%"><div class="gantt-now-label">Nu</div></div>`;
  }

  // Build rows per department
  let ganttRows = '';
  for (const dept of activeDepts) {
    const activePeople = dept.people.filter(p => p.plannedH > 0 || p.clockedH > 0);
    if (activePeople.length === 0) continue;

    ganttRows += `<div class="gantt-dept-label">${dept.deptName} (${activePeople.length})</div>`;

    for (const p of activePeople) {
      let bars = '';
      // Planned bar
      if (p.plannedStart && p.plannedEnd) {
        const s = parseTimeToH(p.plannedStart);
        const e = parseTimeToH(p.plannedEnd);
        const left = ((s - minH) / rangeH * 100).toFixed(2);
        const width = ((e - s) / rangeH * 100).toFixed(2);
        bars += `<div class="gantt-bar planned" style="left:${left}%;width:${width}%" title="Gepland: ${p.plannedStart}–${p.plannedEnd} (${p.plannedH.toFixed(1)}u)"></div>`;
      }
      // Clocked bar
      if (p.clockedEnter && p.clockedExit && p.clockedExit !== '00:00' && p.clockedH > 0) {
        const s = parseTimeToH(p.clockedEnter);
        const e = parseTimeToH(p.clockedExit);
        if (e > s) {
          const left = ((s - minH) / rangeH * 100).toFixed(2);
          const width = ((e - s) / rangeH * 100).toFixed(2);
          bars += `<div class="gantt-bar clocked" style="left:${left}%;width:${width}%" title="Geklokt: ${p.clockedEnter}–${p.clockedExit} (${p.clockedH.toFixed(2)}u)"></div>`;
        }
      }
      // Currently clocked in (no exit yet)
      if (p.clockedEnter && (!p.clockedExit || p.clockedExit === '00:00') && p.clockedH > 0) {
        const s = parseTimeToH(p.clockedEnter);
        const e = Math.min(nowH, maxH);
        if (e > s) {
          const left = ((s - minH) / rangeH * 100).toFixed(2);
          const width = ((e - s) / rangeH * 100).toFixed(2);
          bars += `<div class="gantt-bar clocked" style="left:${left}%;width:${width}%;border-right:2px dashed #10b981;" title="Ingeklokt sinds ${p.clockedEnter} (${p.clockedH.toFixed(2)}u)"></div>`;
        }
      }

      ganttRows += `
        <div class="gantt-row">
          <div class="gantt-name" title="${p.name}">${p.name.split(' ')[0]}</div>
          <div class="gantt-track">${gridLines}${nowLine}${bars}</div>
        </div>`;
    }
  }

  return `
    <div class="gantt-container">
      <div class="gantt-wrap">
        <div class="gantt-legend">
          <span><span class="gantt-legend-dot" style="background:rgba(124,58,237,0.5);border:1px solid #7c3aed;"></span> Gepland</span>
          <span><span class="gantt-legend-dot" style="background:rgba(16,185,129,0.5);border:1px solid #10b981;"></span> Geklokt</span>
          <span style="color:#ef4444;">▏Nu</span>
        </div>
        <div class="gantt-header">${hourLabels}</div>
        ${ganttRows}
      </div>
    </div>`;
}

function parseTimeToH(timeStr) {
  if (!timeStr || timeStr === '—') return 0;
  const parts = timeStr.split(':');
  return parseInt(parts[0]) + (parseInt(parts[1] || 0) / 60);
}

// ── KPI VIEW ──────────────────────────────────────────────────────────────────

// Department → revenue & KPI config
const DEPT_KPI = {
  // Roller reporting categories (actual names from API):
  //   'Activiteiten', 'Bedrijfsarrangementen', 'F&B', 'Overig', 'Aanpassingen'
  'Activiteiten': {
    icon: '🎳', color: '#7c3aed',
    // Activiteiten + Bedrijfsarrangementen = all activity-based revenue
    revCats: ['Activiteiten', 'Bedrijfsarrangementen'],
    revLabelKey: 'kpiActRevLabel'
  },
  'Sales & Event': {
    icon: '🎉', color: '#2563eb',
    // Primarily corporate arrangements (KF + BF bookings)
    revCats: ['Bedrijfsarrangementen'],
    revLabelKey: 'kpiSalesRevLabel'
  },
  'Front-Office': {
    icon: '🎫', color: '#059669',
    // Uses booking channel count, not direct revenue
    metric: 'bookings'
  },
  'Horeca': {
    icon: '🍺', color: '#d97706',
    // Dranken revenue from Untill (excl BTW)
    revCats: ['F&B_drank'],
    revLabelKey: 'kpiDrankRevLabel'
  },
  'Keuken': {
    icon: '🍽️', color: '#dc2626',
    // Food revenue from Untill (excl BTW)
    revCats: ['F&B_food'],
    revLabelKey: 'kpiFoodRevLabel'
  },
  'Facilitair': {
    icon: '🔧', color: '#6b7280',
    overhead: true
  },
  'Kantoor': {
    icon: '💼', color: '#6b7280',
    overhead: true
  },
  'Training, Ontwikkeling & Bijeenkomsten': {
    icon: '📚', color: '#6b7280',
    overhead: true
  }
};

// Color coding for loonkosten % KPI
function kpiColor(pct) {
  if (pct == null || isNaN(pct)) return '#6b7280';
  if (pct < 20) return '#10b981';  // excellent (green)
  if (pct < 30) return '#84cc16';  // good (light green)
  if (pct < 40) return '#f59e0b';  // watch (amber)
  if (pct < 50) return '#f97316';  // high (orange)
  return '#ef4444';                // too high (red)
}

function renderDeptKpiCard(dept, totalOmzet, byRc, salesByChannel) {
  const cfg = DEPT_KPI[dept.deptName] || { icon: '👤', color: '#6b7280', overhead: true };
  const hasClock = dept.clockedH  > 0;
  const hasPlan  = dept.plannedH  > 0;
  if (!hasClock) return '';

  // Calculate revenue relevant to this department
  let deptOmzet = null;
  let deptOmzetLabel = '';
  if (cfg.revCats && byRc) {
    deptOmzet = cfg.revCats.reduce((s, cat) => s + (byRc[cat]?.revenue || 0), 0);
    deptOmzetLabel = cfg.revLabelKey ? t(cfg.revLabelKey) : '';
  }

  // Reference revenue for loonkosten %
  const refOmzet = (deptOmzet !== null && deptOmzet > 0) ? deptOmzet : totalOmzet;
  const plannedPct = refOmzet > 0 && hasPlan  ? (dept.plannedCost  / refOmzet * 100) : null;
  const clockedPct = refOmzet > 0 && hasClock ? (dept.clockedCost  / refOmzet * 100) : null;
  const pctToShow  = clockedPct !== null ? clockedPct : plannedPct;
  const pctColor   = kpiColor(pctToShow);

  // KPI badge (big %)
  const kpiBadge = pctToShow !== null
    ? `<div style="text-align:right;">
        <div style="font-size:22px;font-weight:800;color:${pctColor};line-height:1;">${pctToShow.toFixed(1)}%</div>
        <div style="font-size:10px;color:#666;">${t('kpiLaborPct')}</div>
      </div>`
    : '';

  // Revenue context line
  let revContext = '';
  if (cfg.fbComing) {
    revContext = `<div style="font-size:11px;color:#555;font-style:italic;margin-top:6px;">🔗 ${t('kpiFbComing')}</div>`;
  } else if (cfg.metric === 'bookings' && salesByChannel) {
    const vmTrans = (salesByChannel['VenueManager']?.count || 0) + (salesByChannel['Venue manager']?.count || 0);
    const totalTrans = Object.values(salesByChannel).reduce((s, c) => s + (c.count || 0), 0);
    const costPerBooking = totalTrans > 0 && hasPlan ? (dept.plannedCost / totalTrans) : 0;
    revContext = `
      <div style="display:flex;gap:12px;margin-top:6px;">
        <div style="font-size:11px;color:#888;">${t('kpiVmBoekingen')}: <span style="color:#e0e0f0;font-weight:600;">${vmTrans}</span></div>
        <div style="font-size:11px;color:#888;">${t('kpiTotaalBoekingen')}: <span style="color:#e0e0f0;font-weight:600;">${totalTrans}</span></div>
        ${costPerBooking > 0 ? `<div style="font-size:11px;color:#888;">${t('kpiKostenPerBoeking')}: <span style="color:#e0e0f0;font-weight:600;">${fmtEur(costPerBooking)}</span></div>` : ''}
      </div>`;
  } else if (deptOmzet !== null && deptOmzet > 0) {
    revContext = `<div style="font-size:11px;color:#888;margin-top:6px;">${deptOmzetLabel}: <span style="color:#e0e0f0;font-weight:600;">${fmtEur(deptOmzet)}</span></div>`;
  } else if (cfg.overhead) {
    const ovhCost = hasClock ? dept.clockedCost : dept.plannedCost;
    const ovhPct  = totalOmzet > 0 && ovhCost > 0 ? (ovhCost / totalOmzet * 100).toFixed(1) : null;
    if (ovhPct) revContext = `<div style="font-size:11px;color:#888;margin-top:6px;">${t('kpiOverhead')}: ${ovhPct}% ${t('kpiVanTotaal')}</div>`;
  }

  // Progress bar
  const barBlock = pctToShow !== null && refOmzet > 0
    ? `<div style="height:4px;border-radius:999px;background:#1e1e2a;margin:8px 0 4px;">
        <div style="height:4px;border-radius:999px;background:${pctColor};width:${Math.min(pctToShow, 100).toFixed(1)}%;transition:width .4s;"></div>
      </div>`
    : '';

  return `
    <div style="background:#12121c;border-radius:12px;padding:14px 16px;margin-bottom:10px;border-left:3px solid ${cfg.color};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
        <div style="font-size:15px;font-weight:700;color:#e0e0f0;">${cfg.icon} ${dept.deptName}</div>
        ${kpiBadge}
      </div>
      <div style="display:grid;grid-template-columns:1fr;gap:8px;">
        <div style="background:#1a1a2e;border-radius:8px;padding:10px;">
          <div style="font-size:10px;color:#888;margin-bottom:4px;">${t('kpiClocked')}</div>
          <div style="display:flex;align-items:baseline;gap:12px;">
            <div style="font-size:14px;font-weight:700;color:#10b981;">${dept.clockedH.toFixed(1)}u</div>
            <div style="font-size:12px;color:#aaa;">${fmtEur(dept.clockedCost)}</div>
            ${clockedPct !== null ? `<div style="font-size:11px;color:${kpiColor(clockedPct)};margin-left:auto;">${clockedPct.toFixed(1)}% omzet</div>` : ''}
          </div>
        </div>
      </div>
      ${barBlock}${revContext}
    </div>`;
}

async function renderKpi(forceRefresh = false) {
  setContent(spinner());
  try {
    // Period selector
    const periodSel = `
      <div style="display:flex;gap:6px;margin-bottom:16px;">
        <button onclick="kpiPeriod='dag';renderKpi()" style="flex:1;padding:9px 4px;border-radius:9px;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .2s;${kpiPeriod==='dag'?'background:#7c3aed;color:white;':'background:#1a1a24;color:#888;'}">${t('kpiDag')}</button>
        <button onclick="kpiPeriod='week';renderKpi()" style="flex:1;padding:9px 4px;border-radius:9px;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .2s;${kpiPeriod==='week'?'background:#7c3aed;color:white;':'background:#1a1a24;color:#888;'}">${t('kpiWeek')}</button>
        <button onclick="kpiPeriod='maand';renderKpi()" style="flex:1;padding:9px 4px;border-radius:9px;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .2s;${kpiPeriod==='maand'?'background:#7c3aed;color:white;':'background:#1a1a24;color:#888;'}">${t('kpiMaand')}</button>
      </div>`;

    if (kpiPeriod === 'dag') {
      // Date nav
      const kpiNav = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <button class="nav-btn" onclick="kpiDate=addDays(kpiDate,-1);renderKpi()">‹</button>
          <div style="flex:1;text-align:center;cursor:pointer;position:relative;min-height:38px;display:flex;align-items:center;justify-content:center;" onclick="triggerDatePicker('dp-kpi')">
            <div class="date-label" style="text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;pointer-events:none;">${fmtDateLong(kpiDate)}</div>
            <input type="date" id="dp-kpi" value="${kpiDate}" onchange="kpiDate=this.value;renderKpi()" style="position:absolute;inset:0;opacity:0.001;border:none;cursor:pointer;z-index:10;background:transparent;">
          </div>
          <button class="nav-btn" onclick="kpiDate=addDays(kpiDate,1);renderKpi()">›</button>
        </div>`;

      const [dayD, personnelD, mypos, payter, untillKpi] = await Promise.all([
        api(`/api/day?date=${kpiDate}`, forceRefresh),
        api(`/api/personeel?date=${kpiDate}`, forceRefresh).catch(() => ({ departments: [], totals: {} })),
        api(`/api/mypos?date=${kpiDate}`, forceRefresh).catch(() => null),
        api(`/api/payter?date=${kpiDate}`, forceRefresh).catch(() => null),
        api(`/api/untill/turnover?date=${kpiDate}`, forceRefresh).catch(() => null)
      ]);

      const depts = personnelD.departments || [];
      const byRc = dayD.visit?.byReportingCategory || {};
      const salesByChannel = dayD.sales?.byChannel || {};

      const rollerRev = dayD.visit?.netRevenue || 0;
      const myposRev  = mypos?.omzetExclBtw || 0;
      const payterRev = payter?.omzetExclBtw || 0;
      // Untill F&B excl BTW for KPI
      const untillDrankKpi = (untillKpi?.drank || 0) / 1.21;
      const untillFoodKpi = (untillKpi?.food || 0) / 1.09;
      const untillDiversenKpi = (untillKpi?.diversen || 0) / 1.21;
      const untillRevKpi = untillDrankKpi + untillFoodKpi + untillDiversenKpi;
      const totalOmzet = rollerRev + myposRev + payterRev + untillRevKpi;
      // Inject Untill F&B into byRc for KPI dept cards
      if (untillRevKpi > 0) {
        byRc['F&B'] = { revenue: Math.round(untillRevKpi * 100) / 100, visitors: 0 };
        byRc['F&B_drank'] = { revenue: Math.round(untillDrankKpi * 100) / 100 };
        byRc['F&B_food'] = { revenue: Math.round(untillFoodKpi * 100) / 100 };
      }

      const totP = personnelD.totals || {};
      const plannedPct = totalOmzet > 0 && totP.plannedCost > 0 ? (totP.plannedCost / totalOmzet * 100) : null;
      const clockedPct = totalOmzet > 0 && totP.clockedCost > 0 ? (totP.clockedCost / totalOmzet * 100) : null;

      let deptCards = depts.map(d => renderDeptKpiCard(d, totalOmzet, byRc, salesByChannel)).join('');
      if (!deptCards) deptCards = `<div style="color:#666;text-align:center;padding:40px;">${t('kpiNoData')}</div>`;

      setContent(`
        ${periodSel}
        ${kpiNav}
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;">
          <div class="kpi-card">
            <div class="kpi-label">${t('kpiOmzet')}</div>
            <div class="kpi-value" style="font-size:13px;">${fmtEur(totalOmzet)}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">${t('kpiClockedPct')}</div>
            <div class="kpi-value" style="font-size:18px;color:${kpiColor(clockedPct)};">${clockedPct !== null ? clockedPct.toFixed(1)+'%' : '—'}</div>
          </div>
        </div>
        <div class="section-title">${t('kpiPerDept')}</div>
        ${deptCards}
        ${cacheLabel(dayD)}
      `);

    } else if (kpiPeriod === 'week') {
      const data = await api(`/api/kpi-week?offset=${kpiWeekOffset}`, forceRefresh);
      const depts = data.personeel?.departments || [];
      const rev = data.revenue || {};
      const byRc = rev.byReportingCategory || {};
      const totalOmzet = rev.totalOmzet || 0;

      const totP = data.personeel?.totals || {};
      const plannedPct = totalOmzet > 0 && totP.plannedCost > 0 ? (totP.plannedCost / totalOmzet * 100) : null;
      const clockedPct = totalOmzet > 0 && totP.clockedCost > 0 ? (totP.clockedCost / totalOmzet * 100) : null;

      const dates = data.dates || [];
      const startLabel = dates[0] ? new Date(dates[0]+'T00:00:00').toLocaleDateString(locale(), { day:'numeric', month:'short' }) : '';
      const endLabel   = dates[6] ? new Date(dates[6]+'T00:00:00').toLocaleDateString(locale(), { day:'numeric', month:'short' }) : '';

      const weekNav = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <button class="nav-btn" onclick="kpiWeekOffset--;renderKpi()">‹</button>
          <div class="date-label">${startLabel} – ${endLabel}</div>
          <button class="nav-btn" onclick="kpiWeekOffset++;renderKpi()">›</button>
        </div>`;

      let deptCards = depts.map(d => renderDeptKpiCard(d, totalOmzet, byRc, null)).join('');
      if (!deptCards) deptCards = `<div style="color:#666;text-align:center;padding:40px;">${t('kpiNoData')}</div>`;

      setContent(`
        ${periodSel}
        ${weekNav}
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;">
          <div class="kpi-card">
            <div class="kpi-label">${t('kpiOmzetWeek')}</div>
            <div class="kpi-value" style="font-size:13px;">${fmtEur(totalOmzet)}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">${t('kpiClockedPct')}</div>
            <div class="kpi-value" style="font-size:18px;color:${kpiColor(clockedPct)};">${clockedPct !== null ? clockedPct.toFixed(1)+'%' : '—'}</div>
          </div>
        </div>
        <div class="section-title">${t('kpiPerDeptWeek')}</div>
        ${deptCards}
        ${cacheLabel(data)}
      `);

    } else if (kpiPeriod === 'maand') {
      const monthNames = lang === 'en'
        ? ['January','February','March','April','May','June','July','August','September','October','November','December']
        : ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];

      const monthNav = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <button class="nav-btn" onclick="kpiMonth--;if(kpiMonth<1){kpiMonth=12;kpiMonthYear--;}renderKpi()">‹</button>
          <div class="date-label">${monthNames[kpiMonth - 1]} ${kpiMonthYear}</div>
          <button class="nav-btn" onclick="kpiMonth++;if(kpiMonth>12){kpiMonth=1;kpiMonthYear++;}renderKpi()">›</button>
        </div>`;

      const data = await api(`/api/kpi-month?year=${kpiMonthYear}&month=${kpiMonth}`, forceRefresh);
      const rev = data.revenue || {};
      const byRc = rev.byReportingCategory || {};
      const totalOmzet = rev.totalOmzet || 0;
      const daysWithData = data.daysWithData || 0;
      const totalDays = data.totalDays || 0;

      const totP = data.personeel?.totals || {};
      const clockedPct = totalOmzet > 0 && totP.clockedCost > 0 ? (totP.clockedCost / totalOmzet * 100) : null;

      const depts = data.personeel?.departments || [];
      let deptCards = depts.map(d => renderDeptKpiCard(d, totalOmzet, byRc, null)).join('');
      if (!deptCards) deptCards = `<div style="color:#666;text-align:center;padding:40px;">${t('kpiNoData')}</div>`;

      const dataCoverage = daysWithData < totalDays
        ? `<div style="text-align:center;font-size:11px;color:#888;margin-bottom:12px;">📊 ${daysWithData}/${totalDays} ${lang === 'en' ? 'days with data' : 'dagen met data'}</div>`
        : '';

      setContent(`
        ${periodSel}
        ${monthNav}
        ${dataCoverage}
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;">
          <div class="kpi-card">
            <div class="kpi-label">${lang === 'en' ? '💰 Revenue month' : '💰 Omzet maand'}</div>
            <div class="kpi-value" style="font-size:13px;">${fmtEur(totalOmzet)}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">${t('kpiClockedPct')}</div>
            <div class="kpi-value" style="font-size:18px;color:${kpiColor(clockedPct)};">${clockedPct !== null ? clockedPct.toFixed(1)+'%' : '—'}</div>
          </div>
        </div>
        <div class="section-title">${lang === 'en' ? '🏢 Per department — month' : '🏢 Per afdeling — maand'}</div>
        ${deptCards}
        ${cacheLabel(data)}
      `);
    }
  } catch (e) { setContent(errMsg(e.message)); }
}

// ── Start ─────────────────────────────────────────────────────────────────────
applyLang();
if (accessCode) render();
</script>
