<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Almere Underground – Leads & Reserveringen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f13; color: #f1f1f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
    .container { max-width: 480px; margin: 0 auto; padding: 0 12px 80px; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 8px; }
    .header .back { color: #7c3aed; text-decoration: none; font-size: 14px; font-weight: 600; }
    .header .title { font-size: 18px; font-weight: 800; }
    .lang-switch { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 8px; padding: 4px 8px; color: #f1f1f5; font-size: 12px; cursor: pointer; }

    /* View toggle desktop/mobile */
    body.force-desktop .container { max-width: 900px; }
    body.force-desktop .booking-row { padding: 14px 16px; }
    body.force-desktop .booking-name { font-size: 14px; }
    body.force-mobile .container { max-width: 400px !important; }

    .view-toggle { background: #1a1a24; border: 1px solid #2a2a38; color: #aaa; border-radius: 8px; padding: 5px 8px; font-size: 13px; cursor: pointer; }
    .view-toggle:hover { border-color: #7c3aed; color: #e0e0f0; }

    /* Login */
    .login-box { text-align: center; padding: 32px; }
    .login-box .icon { font-size: 48px; margin-bottom: 12px; }
    .login-box h2 { font-size: 20px; margin-bottom: 16px; font-weight: 700; }
    .login-box input { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 10px; padding: 12px 16px; color: #f1f1f5; font-size: 16px; width: 200px; text-align: center; outline: none; }
    .login-box input:focus { border-color: #7c3aed; }
    .login-box .err { color: #ef4444; font-size: 12px; margin-top: 8px; min-height: 18px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin: 12px 0; background: #1a1a24; border-radius: 12px; padding: 4px; }
    .tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 700; border-radius: 10px; cursor: pointer; color: #888; transition: all 0.2s; border: none; background: none; }
    .tab.active { background: #7c3aed; color: white; }
    .tab:not(.active):hover { color: #ccc; }

    /* Sub-tabs (for leads categories) */
    .subtabs { display: flex; gap: 4px; margin: 8px 0; }
    .subtab { flex: 1; padding: 8px 6px; text-align: center; font-size: 12px; font-weight: 600; border-radius: 8px; cursor: pointer; color: #888; background: #1a1a24; border: 1px solid #2a2a3a; transition: all 0.2s; }
    .subtab.active { border-color: #7c3aed; color: #7c3aed; background: #7c3aed15; }
    .subtab .count { display: inline-block; background: #2a2a3a; border-radius: 6px; padding: 1px 6px; font-size: 10px; margin-left: 4px; }
    .subtab.active .count { background: #7c3aed44; }

    /* Summary cards */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 12px 0; }
    .summary-card { background: #1a1a24; border-radius: 12px; padding: 12px; text-align: center; }
    .summary-card .label { font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .summary-card .value { font-size: 18px; font-weight: 800; }
    .summary-card .value.purple { color: #7c3aed; }
    .summary-card .value.green { color: #22c55e; }
    .summary-card .value.orange { color: #f59e0b; }
    .summary-card .value.red { color: #ef4444; }

    /* Booking row */
    .booking-row { background: #1a1a24; border-radius: 10px; padding: 12px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; gap: 8px; cursor: pointer; transition: background 0.15s; }
    .booking-row:active { background: #22222e; }
    .booking-info { flex: 1; min-width: 0; }
    .booking-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .booking-meta { font-size: 11px; color: #888; margin-top: 2px; }
    .booking-products { font-size: 10px; color: #666; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }
    .booking-amounts { text-align: right; flex-shrink: 0; }
    .booking-owing { font-size: 14px; font-weight: 800; color: #f59e0b; }
    .booking-total { font-size: 11px; color: #666; }

    /* Status badge */
    .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 6px; margin-left: 4px; }
    .badge.kf { background: #ec489922; color: #ec4899; }
    .badge.bf { background: #3b82f622; color: #3b82f6; }
    .badge.ff { background: #7c3aed22; color: #7c3aed; }
    .badge.offerte { background: #22c55e22; color: #22c55e; }
    .badge.opvolgen { background: #ef444422; color: #ef4444; }
    .badge.paid { background: #22c55e22; color: #22c55e; }
    .badge.pending { background: #f59e0b22; color: #f59e0b; }
    .badge.partial { background: #3b82f622; color: #3b82f6; }

    /* Detail panel */
    .detail-panel { display: none; background: #1a1a24; border-radius: 12px; padding: 16px; margin-bottom: 8px; border: 1px solid #2a2a3a; }
    .detail-panel.open { display: block; }
    .detail-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; border-bottom: 1px solid #1e1e2a; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #888; }
    .detail-value { font-weight: 600; }
    .detail-products { margin-top: 8px; }
    .detail-products .product-item { font-size: 11px; color: #aaa; padding: 3px 0; }

    /* Empty state */
    .empty-state { text-align: center; padding: 40px 20px; color: #555; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }


    /* Print table for reserveringen */
    .print-section { display: none; }
    .print-btn { background: #6366f1; border: none; color: white; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .print-btn:hover { opacity: 0.9; }
    @media print {
      body { background: #fff !important; color: #000 !important; }
      .header, .tabs, .subtabs, .summary-grid, .refresh-bar, .no-print, .login-box { display: none !important; }
      .print-section { display: block !important; }
      .booking-row, .detail-panel, #bookingList { display: none !important; }
      .container { max-width: 100% !important; padding: 0 !important; }
      .print-table { width: 100%; border-collapse: collapse; font-size: 11px; color: #000; }
      .print-table th, .print-table td { border: 1px solid #000; padding: 4px 6px; text-align: left; vertical-align: top; }
      .print-table th { font-weight: bold; background: #eee; }
      .print-date-header { font-weight: bold; font-size: 13px; margin: 16px 0 4px; text-decoration: underline; }
    }
    /* Loading */
    .loading { text-align: center; padding: 60px 0; color: #888; }
    .loading .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #2a2a3a; border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Refresh bar */
    .refresh-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
    .refresh-info { font-size: 11px; color: #555; }
    .refresh-btn { background: #7c3aed; border: none; color: white; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .refresh-btn:active { opacity: 0.7; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Roller link */
    .roller-link { display: inline-block; background: #7c3aed22; color: #7c3aed; font-size: 11px; padding: 3px 8px; border-radius: 6px; text-decoration: none; font-weight: 600; margin-top: 4px; }
    .roller-link:hover { background: #7c3aed33; }
    .notes-section { margin-top: 8px; padding: 8px; background: #ffffff08; border-radius: 6px; border-left: 3px solid #f59e0b; }
    .notes-label { font-size: 11px; color: #f59e0b; font-weight: 600; margin-bottom: 4px; }
    .notes-content { font-size: 12px; color: #ccc; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .changelog-panel { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .changelog-panel.open { max-height: 600px; overflow-y: auto; margin-top: 8px; padding: 6px; background: #ffffff06; border-radius: 6px; }
    .changelog-title { font-size: 11px; color: #888; font-weight: 600; margin-bottom: 6px; border-bottom: 1px solid #ffffff10; padding-bottom: 4px; }
    .changelog-entry { font-size: 11px; color: #aaa; padding: 3px 0; border-bottom: 1px solid #ffffff06; }
    .cl-date { color: #888; margin-right: 6px; }
    .cl-field { color: #7c3aed; font-weight: 600; }
    .cl-from { color: #f87171; text-decoration: line-through; }
    .cl-to { color: #22c55e; }
    .cl-new { color: #3b82f6; }
    .changelog-btn { background: #3b82f622 !important; color: #3b82f6 !important; }
        input[type="date"] { color-scheme: dark; }
    </style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <a class="back" href="index.html">← Menu</a>
    <span class="title" id="pageTitle">📋 Leads</span>
    <div style="display:flex;gap:6px;align-items:center;">
      <button id="view-toggle-btn" class="view-toggle" onclick="toggleViewMode()" title="Wissel weergave">🖥️</button>
      <select class="lang-switch" id="langSwitch" onchange="setLang(this.value)">
        <option value="nl">🇳🇱 NL</option>
        <option value="en">🇬🇧 EN</option>
      </select>
    </div>
  </div>

  <!-- Login (fallback) -->
  <div id="login-screen" class="login-box" style="display:none;">
    <div class="icon">🔒</div>
    <h2>Toegangscode</h2>
    <input id="codeInput" placeholder="Code" maxlength="20" />
    <div class="err" id="loginErr"></div>
  </div>

  <!-- Main content -->
  <div id="main-content" style="display:none;">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tabReservations" onclick="switchTab('reservations')">📅 Reserveringen</button>
      <button class="tab" id="tabLeads" onclick="switchTab('leads')">🎯 Op te volgen</button>
      <button class="tab" id="tabControle" onclick="switchTab('controle')">⚠️ Controle</button>
    </div>

    <!-- Summary -->
    <div class="summary-grid" id="summaryGrid"></div>

    <!-- Sub-tabs (leads only) -->
    <div class="subtabs" id="subtabs" style="display:none;">
      <div class="subtab active" id="subtabAll" onclick="switchSubTab('all')">Alle <span class="count" id="countAll">0</span></div>
      <div class="subtab" id="subtabOpvolgen" onclick="switchSubTab('opvolgen')">Op te volgen <span class="count" id="countOpvolgen">0</span></div>
      <div class="subtab" id="subtabOfferte" onclick="switchSubTab('offerte')">Offerte Akkoord <span class="count" id="countOfferte">0</span></div>
    </div>

    <!-- Refresh bar -->
    <div class="refresh-bar">
      <span class="refresh-info" id="refreshInfo">—</span>
      <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">🔄 Ververs</button>
    </div>

    <!-- Print controls (reservations tab only) -->
    <div id="printControls" class="no-print" style="display:none;margin:8px 0;padding:10px;background:#1a1a24;border-radius:10px;">
      <div style="display:flex;gap:10px;align-items:center;justify-content:center;">
        <label style="font-size:13px;color:#888;font-weight:600;">Van:</label>
        <input type="date" id="printFrom" style="background:#0f0f13;border:1px solid #2a2a3a;border-radius:6px;padding:6px 12px;color:#f1f1f5;font-size:13px;min-width:110px;text-align:center;cursor:pointer;-webkit-appearance:none;" />
        <label style="font-size:13px;color:#888;font-weight:600;">Tot:</label>
        <input type="date" id="printTo" style="background:#0f0f13;border:1px solid #2a2a3a;border-radius:6px;padding:6px 12px;color:#f1f1f5;font-size:13px;min-width:110px;text-align:center;cursor:pointer;-webkit-appearance:none;" />
      </div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:8px;">
        <button class="print-btn" onclick="copyReserveringen()" style="background:#10b981;">📋 Kopieer</button>
        <button class="print-btn" onclick="pdfReserveringen()">🖨️ PDF</button>
      </div>
    </div>

    <!-- Print section (visible only in print) -->
    <div class="print-section" id="printSection"></div>

    <!-- Booking list -->
    <div id="bookingList"></div>
  </div>
</div>

<script>
const API = 'https://api.almereunderground.com';
const ROLLER_BASE = 'https://manage.roller.app/booking/';

// ── State ─────────────────────────────────────────────────────────────────
let allBookings = [];
let activeTab = 'reservations';
let activeSubTab = 'all';
let openDetailId = null;
let generatedAt = '';

// ── Auth ──────────────────────────────────────────────────────────────────────
const session = JSON.parse(localStorage.getItem('au_session') || 'null');
const CODE = session?.code || '';

if (!CODE) {
  document.getElementById('login-screen').style.display = 'block';
  const inp = document.getElementById('codeInput');
  inp.addEventListener('keydown', async e => {
    if (e.key !== 'Enter') return;
    const code = inp.value.trim();
    if (!code) return;
    try {
      const r = await fetch(`${API}/api/openstaand`, { headers: { 'X-Access-Code': code } });
      if (r.ok) {
        localStorage.setItem('au_session', JSON.stringify({ code }));
        location.reload();
      } else {
        document.getElementById('loginErr').textContent = 'Ongeldige code';
      }
    } catch { document.getElementById('loginErr').textContent = 'Verbindingsfout'; }
  });
} else {
  document.getElementById('main-content').style.display = 'block';
}

// ── View toggle ───────────────────────────────────────────────────────────────
function getViewMode() { return localStorage.getItem('au_view_mode') || 'auto'; }
function applyViewMode() {
  const mode = getViewMode();
  document.body.classList.remove('force-desktop', 'force-mobile');
  if (mode === 'desktop') document.body.classList.add('force-desktop');
  else if (mode === 'mobile') document.body.classList.add('force-mobile');
  const btn = document.getElementById('view-toggle-btn');
  if (btn) btn.textContent = mode === 'desktop' ? '📱' : mode === 'mobile' ? '↩️' : '🖥️';
}
function toggleViewMode() {
  const cur = getViewMode();
  const next = cur === 'auto' ? 'desktop' : cur === 'desktop' ? 'mobile' : 'auto';
  localStorage.setItem('au_view_mode', next);
  applyViewMode();
}
applyViewMode();
window.addEventListener('resize', applyViewMode);

// ── i18n ──────────────────────────────────────────────────────────────────────
const T = {
  nl: {
    pageTitle: '📋 Leads & Reserveringen',
    tabReservations: '📅 Reserveringen',
    tabLeads: '🎯 Op te volgen',
    subtabAll: 'Alle',
    subtabOpvolgen: 'Op te volgen',
    subtabOfferte: 'Offerte Akkoord',
    summaryCount: 'Aantal',
    summaryValue: 'Waarde',
    summaryOwing: 'Openstaand',
    summaryGuests: 'Gasten',
    refresh: '🔄 Ververs',
    refreshing: '⏳ Bezig...',
    lastUpdate: 'Laatste update',
    noData: 'Geen data beschikbaar',
    noResults: 'Geen boekingen gevonden',
    products: 'Producten',
    guests: 'gasten',
    paid: 'Betaald',
    owing: 'Openstaand',
    total: 'Totaal',
    date: 'Datum',
    created: 'Aangemaakt',
    lastPayment: 'Laatste betaling',
    openInRoller: 'Open in Roller',
    loading: 'Laden...',
    bookingNotes: 'Boekingsnotities',
    posNotes: 'POS notities',
    changelog: 'Wijzigingen',
    changelogLoading: 'Laden...',
    changelogEmpty: 'Geen wijzigingen',
    showChangelog: '📋 Wijzigingen',
  },
  en: {
    pageTitle: '📋 Leads & Reservations',
    tabReservations: '📅 Reservations',
    tabLeads: '🎯 Follow up',
    subtabAll: 'All',
    subtabOpvolgen: 'To follow up',
    subtabOfferte: 'Quote Accepted',
    summaryCount: 'Count',
    summaryValue: 'Value',
    summaryOwing: 'Outstanding',
    summaryGuests: 'Guests',
    refresh: '🔄 Refresh',
    refreshing: '⏳ Loading...',
    lastUpdate: 'Last update',
    noData: 'No data available',
    noResults: 'No bookings found',
    products: 'Products',
    guests: 'guests',
    paid: 'Paid',
    owing: 'Outstanding',
    total: 'Total',
    date: 'Date',
    created: 'Created',
    lastPayment: 'Last payment',
    openInRoller: 'Open in Roller',
    loading: 'Loading...',
    bookingNotes: 'Booking notes',
    posNotes: 'POS notes',
    changelog: 'Changes',
    changelogLoading: 'Loading...',
    changelogEmpty: 'No changes',
    showChangelog: '📋 Changes',
  }
};
let lang = localStorage.getItem('au_lang') || 'nl';
function t(key) { return (T[lang] || T.nl)[key] || key; }
function setLang(l) { lang = l; localStorage.setItem('au_lang', l); document.getElementById('langSwitch').value = l; renderAll(); }
document.getElementById('langSwitch').value = lang;

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

const changelogFieldLabels = {
  status: 'Status', total: 'Totaal', amountOwing: 'Openstaand', amountPaid: 'Betaald',
  bookingDate: 'Datum', leadCategory: 'Categorie', bookingNotes: 'Boekingsnotities', posNotes: 'POS notities'
};

async function loadChangelog(bookingId) {
  const el = document.getElementById('changelog-' + bookingId);
  if (!el) return;
  if (el.classList.contains('open')) { el.classList.remove('open'); el.innerHTML = ''; return; }
  el.innerHTML = `<div style="padding:8px;color:#888;font-size:12px;">${t('changelogLoading')}</div>`;
  el.classList.add('open');
  try {
    const r = await fetch(`${API}/api/leads/changelog?bookingId=${bookingId}`, { headers: { 'X-Access-Code': CODE } });
    const data = await r.json();
    const entries = (data.changelog || []).reverse();
    if (entries.length === 0) {
      el.innerHTML = `<div style="padding:8px;color:#888;font-size:12px;">${t('changelogEmpty')}</div>`;
      return;
    }
    el.innerHTML = `<div class="changelog-title">${t('changelog')}</div>` +
      entries.map(e => {
        const d = new Date(e.ts);
        const ds = d.toLocaleDateString('nl-NL', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
        if (e.type === 'new') return `<div class="changelog-entry"><span class="cl-date">${ds}</span> <span class="cl-new">➕ ${e.detail}</span></div>`;
        const label = changelogFieldLabels[e.field] || e.field;
        const from = e.from || '—';
        const to = e.to || '—';
        return `<div class="changelog-entry"><span class="cl-date">${ds}</span> <span class="cl-field">${label}</span>: <span class="cl-from">${escHtml(from.substring(0,60))}</span> → <span class="cl-to">${escHtml(to.substring(0,60))}</span></div>`;
      }).join('');
  } catch(err) {
    el.innerHTML = `<div style="padding:8px;color:#f87171;font-size:12px;">Fout: ${err.message}</div>`;
  }
}

async function init() {
  renderLoading();
  try {
    const r = await fetch(`${API}/api/leads`, { headers: { 'X-Access-Code': CODE } });
    if (r.ok) {
      const data = await r.json();
      allBookings = data.bookings || [];
      generatedAt = data.generatedAt || '';
      renderAll();
    } else if (r.status === 404) {
      // No leads data yet - try refresh
      await doRefresh();
    } else {
      document.getElementById('bookingList').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Fout bij laden (${r.status})</p></div>`;
    }
  } catch (e) {
    document.getElementById('bookingList').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Verbindingsfout</p></div>`;
  }
}

function renderLoading() {
  document.getElementById('bookingList').innerHTML = `<div class="loading"><div class="spinner"></div><div>${t('loading')}</div></div>`;
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabReservations').classList.toggle('active', tab === 'reservations');
  document.getElementById('tabLeads').classList.toggle('active', tab === 'leads');
  document.getElementById('tabControle').classList.toggle('active', tab === 'controle');
  document.getElementById('subtabs').style.display = tab === 'leads' ? 'flex' : 'none';
  document.getElementById('printControls').style.display = tab === 'reservations' ? 'block' : 'none';
  openDetailId = null;
  renderAll();
}

function switchSubTab(sub) {
  activeSubTab = sub;
  document.querySelectorAll('.subtab').forEach(el => el.classList.remove('active'));
  document.getElementById('subtab' + sub.charAt(0).toUpperCase() + sub.slice(1)).classList.add('active');
  openDetailId = null;
  renderList();
}

// ── Filtering ─────────────────────────────────────────────────────────────────
function getFilteredBookings() {
  if (activeTab === 'reservations') {
    // Future VM bookings that are KF or BF
    return allBookings.filter(b => b.isKF || b.isFF || b.isBF);
  } else if (activeTab === 'controle') {
    // VenueManager bookings without KF/BF/FF/RR classification
    return allBookings.filter(b => b.source === 'VenueManager' && !b.isKF && !b.isBF && !b.isFF && !/^RR\b/i.test(b.name || ''));
  } else {
    // Leads: unpaid VM bookings, exclude confirmed (partial payment received)
    let leads = allBookings.filter(b => b.amountOwing > 0 && b.leadCategory !== 'Bevestigd');
    if (activeSubTab === 'opvolgen') {
      leads = leads.filter(b => b.leadCategory === 'Op te volgen');
    } else if (activeSubTab === 'offerte') {
      leads = leads.filter(b => b.leadCategory === 'Offerte Akkoord');
    }
    return leads;
  }
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function renderAll() {
  // Update tab labels
  document.getElementById('pageTitle').textContent = t('pageTitle');
  document.getElementById('tabReservations').textContent = t('tabReservations');
  document.getElementById('tabLeads').textContent = t('tabLeads');
  document.getElementById('subtabAll').innerHTML = t('subtabAll') + ` <span class="count" id="countAll">0</span>`;
  document.getElementById('subtabOpvolgen').innerHTML = t('subtabOpvolgen') + ` <span class="count" id="countOpvolgen">0</span>`;
  document.getElementById('subtabOfferte').innerHTML = t('subtabOfferte') + ` <span class="count" id="countOfferte">0</span>`;
  document.getElementById('refreshBtn').textContent = t('refresh');

  // Counts for subtabs
  const allLeads = allBookings.filter(b => b.amountOwing > 0 && b.leadCategory !== 'Bevestigd');
  const opvolgen = allLeads.filter(b => b.leadCategory === 'Op te volgen');
  const offerte = allLeads.filter(b => b.leadCategory === 'Offerte Akkoord');
  document.getElementById('countAll').textContent = allLeads.length;
  document.getElementById('countOpvolgen').textContent = opvolgen.length;
  document.getElementById('countOfferte').textContent = offerte.length;
  // Controle count
  const controleCount = allBookings.filter(b => b.source === 'VenueManager' && !b.isKF && !b.isBF && !b.isFF && !/^RR\b/i.test(b.name || '')).length;
  document.getElementById('tabControle').textContent = '⚠️ Controle (' + controleCount + ')';

  // Update time
  if (generatedAt) {
    const d = new Date(generatedAt);
    document.getElementById('refreshInfo').textContent = `${t('lastUpdate')}: ${d.toLocaleDateString('nl-NL')} ${d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' })}`;
  }

  renderSummary();
  renderList();
}

function fmtEur(n) { return '€' + Number(n || 0).toLocaleString('nl-NL', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }

function renderSummary() {
  const filtered = getFilteredBookings();
  const count = filtered.length;
  const totalValue = filtered.reduce((s, b) => s + (b.total || 0), 0);
  const totalOwing = filtered.reduce((s, b) => s + (b.amountOwing || 0), 0);
  const totalGuests = filtered.reduce((s, b) => s + (b.totalGuests || 0), 0);

  const grid = document.getElementById('summaryGrid');
  if (activeTab === 'reservations') {
    grid.innerHTML = `
      <div class="summary-card"><div class="label">${t('summaryCount')}</div><div class="value purple">${count}</div></div>
      <div class="summary-card"><div class="label">${t('summaryValue')}</div><div class="value green">${fmtEur(totalValue)}</div></div>
      <div class="summary-card"><div class="label">${t('summaryGuests')}</div><div class="value">${totalGuests}</div></div>
    `;
  } else {
    grid.innerHTML = `
      <div class="summary-card"><div class="label">${t('summaryCount')}</div><div class="value purple">${count}</div></div>
      <div class="summary-card"><div class="label">${t('summaryOwing')}</div><div class="value orange">${fmtEur(totalOwing)}</div></div>
      <div class="summary-card"><div class="label">${t('summaryValue')}</div><div class="value green">${fmtEur(totalValue)}</div></div>
    `;
  }
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T00:00:00');
  const days = ['zo','ma','di','wo','do','vr','za'];
  const months = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function renderList() {
  const filtered = getFilteredBookings();
  const el = document.getElementById('bookingList');

  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>${t('noResults')}</p></div>`;
    return;
  }

  let html = '';
  for (const b of filtered) {
    const isOpen = openDetailId === b.id;
    const typeBadge = b.isKF
      ? '<span class="badge kf">🎂 KF</span>'
      : b.isFF
      ? '<span class="badge ff">👨‍👩‍👧‍👦 FF</span>'
      : b.isBF
      ? '<span class="badge bf">🏢 BF</span>'
      : '';

    const statusBadge = b.amountOwing <= 0
      ? `<span class="badge paid">${t('paid')}</span>`
      : b.leadCategory === 'Offerte Akkoord'
      ? '<span class="badge offerte">📝 Offerte</span>'
      : b.amountOwing < b.total
      ? `<span class="badge partial">Deels betaald</span>`
      : `<span class="badge pending">Open</span>`;

    const productsSummary = (b.products || []).slice(0, 3).join(', ');

    html += `
      <div class="booking-row" onclick="toggleDetail('${b.id}')">
        <div class="booking-info">
          <div class="booking-name">${b.name || '(geen naam)'} ${typeBadge}</div>
          <div class="booking-meta">${b.startTime ? b.startTime + ' · ' : ''}${fmtDate(b.bookingDate)}${b.pax ? ' · ' + b.pax + ' pax' : ''} ${statusBadge}</div>
          ${productsSummary ? `<div class="booking-products">${productsSummary}</div>` : ''}
        </div>
        <div class="booking-amounts">
          ${b.amountOwing > 0 ? `<div class="booking-owing">${fmtEur(b.amountOwing)}</div>` : ''}
          <div class="booking-total">${fmtEur(b.total)}</div>
        </div>
      </div>
      <div class="detail-panel ${isOpen ? 'open' : ''}" id="detail-${b.id}">
        <div class="detail-row"><span class="detail-label">${t('date')}</span><span class="detail-value">${fmtDate(b.bookingDate)}</span></div>
        <div class="detail-row"><span class="detail-label">${t('created')}</span><span class="detail-value">${fmtDate(b.createdDate || b.createdAt)}</span></div>
        ${b.lastPaymentDate ? `<div class="detail-row"><span class="detail-label">${t('lastPayment')}</span><span class="detail-value">${fmtDate(b.lastPaymentDate)}</span></div>` : ''}
        <div class="detail-row"><span class="detail-label">${t('total')}</span><span class="detail-value">${fmtEur(b.total)}</span></div>
        <div class="detail-row"><span class="detail-label">${t('paid')}</span><span class="detail-value" style="color:#22c55e">${fmtEur(b.amountPaid)}</span></div>
        <div class="detail-row"><span class="detail-label">${t('owing')}</span><span class="detail-value" style="color:#f59e0b">${fmtEur(b.amountOwing)}</span></div>
        <div class="detail-row"><span class="detail-label">Pax</span><span class="detail-value">${b.pax || b.totalGuests || '—'}</span></div>
        ${b.startTime ? `<div class="detail-row"><span class="detail-label">Begintijd</span><span class="detail-value">${b.startTime}</span></div>` : ''}
        ${(b.activityNames || []).length ? `<div class="detail-row"><span class="detail-label">Activiteiten</span><span class="detail-value">${b.activityNames.join(', ')}</span></div>` : ''}
        ${(b.foods || []).length ? `<div class="detail-row"><span class="detail-label">Foods</span><span class="detail-value">${b.foods.join(', ')}</span></div>` : ''}
        ${(b.drinks || []).length ? `<div class="detail-row"><span class="detail-label">Drinks</span><span class="detail-value">${b.drinks.join(', ')}</span></div>` : ''}
        ${(b.products || []).length > 0 ? `
          <div class="detail-products">
            <div style="font-size:11px;color:#888;margin-bottom:4px;">${t('products')}:</div>
            ${b.products.map(p => `<div class="product-item">• ${p}</div>`).join('')}
          </div>
        ` : ''}
        ${b.bookingNotes ? `
          <div class="notes-section">
            <div class="notes-label">📝 ${t('bookingNotes')}</div>
            <div class="notes-content">${escHtml(b.bookingNotes)}</div>
          </div>
        ` : ''}
        ${b.posNotes ? `
          <div class="notes-section">
            <div class="notes-label">🏷️ ${t('posNotes')}</div>
            <div class="notes-content">${escHtml(b.posNotes)}</div>
          </div>
        ` : ''}
        <div style="margin-top:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <a class="roller-link" href="${ROLLER_BASE}${b.id}" target="_blank">🔗 ${t('openInRoller')}</a>
          <a class="roller-link changelog-btn" href="#" onclick="event.preventDefault();event.stopPropagation();loadChangelog('${b.id}')">${t('showChangelog')}</a>
        </div>
        <div class="changelog-panel" id="changelog-${b.id}"></div>
      </div>
    `;
  }

  el.innerHTML = html;
}

function toggleDetail(id) {
  openDetailId = openDetailId === id ? null : id;
  renderList();
}

// ── Refresh ───────────────────────────────────────────────────────────────────
async function doRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = t('refreshing');
  try {
    const r = await fetch(`${API}/api/leads/refresh`, {
      headers: { 'X-Access-Code': CODE }
    });
    if (r.ok) {
      const data = await r.json();
      allBookings = data.bookings || [];
      generatedAt = data.generatedAt || '';
      renderAll();
    } else {
      alert('Refresh mislukt: ' + r.status);
    }
  } catch (e) {
    alert('Verbindingsfout: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = t('refresh');
  }
}


// ── Print reserveringen ──────────────────────────────────────────────────────
function initPrintDates() {
  const today = new Date();
  const from = today.toISOString().slice(0,10);
  const toD = new Date(today); toD.setDate(toD.getDate() + 60);
  const to = toD.toISOString().slice(0,10);
  document.getElementById('printFrom').value = from;
  document.getElementById('printTo').value = to;
}
initPrintDates();

function getFilteredReserveringen() {
  const from = document.getElementById('printFrom').value;
  const to = document.getElementById('printTo').value;
  if (!from || !to) { alert('Selecteer een datumrange'); return null; }

  // Only BF and FF (not KF)
  const filtered = allBookings.filter(b => {
    if (!b.isFF && !b.isBF) return false;
    const bd = (b.bookingDate || '').substring(0, 10);
    return bd >= from && bd <= to;
  });

  filtered.sort((a, b) => {
    const da = (a.bookingDate || '').substring(0, 10);
    const db = (b.bookingDate || '').substring(0, 10);
    if (da !== db) return da.localeCompare(db);
    return (a.startTime || '99:99').localeCompare(b.startTime || '99:99');
  });

  const grouped = {};
  for (const b of filtered) {
    const d = (b.bookingDate || '').substring(0, 10);
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(b);
  }
  return grouped;
}

function fmtPrintDate(iso) {
  const dayNames = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];
  const monthNames = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
  const d = new Date(iso + 'T00:00:00');
  return dayNames[d.getDay()] + ' ' + d.getDate() + ' ' + monthNames[d.getMonth()];
}

function getBookingRow(b) {
  const foods = (b.foods || []).length ? b.foods.join(', ') : '';
  const drinks = (b.drinks || []).length ? b.drinks.join(', ') : '';
  const foodsDisplay = foods || 'Nacalculatie';
  const drinksDisplay = drinks || 'Nacalculatie';
  const activities = (b.activityNames || b.products || []).join('<br>');
  const status = b.leadCategory || (b.amountOwing <= 0 ? 'Betaald' : 'Open');
  return {
    tijd: b.startTime || '-',
    bedrijf: b.name || '-',
    klant: b.contactName || '-',
    pax: b.pax || b.totalGuests || '-',
    activiteit: activities || '-',
    foods: foodsDisplay,
    drinks: drinksDisplay,
    begeleiding: '',
    status: status
  };
}

async function copyReserveringen() {
  const grouped = getFilteredReserveringen();
  if (!grouped) return;

  const cols = ['Tijd','Bedrijf','Klantnaam','Pax','Activiteit','Foods','Drinks','Begeleiding','Status'];

  // Build HTML table
  let html = '';
  let plain = '';
  const colWidths = ['70px','150px','120px','50px','180px','160px','130px','85px','55px'];
  const thBase = 'background:#1e293b;color:#fff;padding:6px 8px;text-align:left;font-size:13px;border:1px solid #334155;word-wrap:break-word;';
  const tdBase = 'padding:5px 8px;font-size:13px;border:1px solid #e2e8f0;word-wrap:break-word;vertical-align:top;';
  const tableStyle = 'border-collapse:collapse;width:1000px;margin-bottom:12px;table-layout:fixed;';

  let first = true;
  for (const [dateStr, bookings] of Object.entries(grouped)) {
    if (!first) html += '<br>';
    first = false;
    html += '<p style="font-weight:bold;font-size:14px;margin:0 0 4px;">' + fmtPrintDate(dateStr) + '</p>';
    html += '<table style="' + tableStyle + '">';
    html += '<colgroup>' + colWidths.map(w => '<col style="width:' + w + '">').join('') + '</colgroup>';
    html += '<tr>' + cols.map((c, i) => '<th style="' + thBase + 'width:' + colWidths[i] + ';">' + c + '</th>').join('') + '</tr>';
    plain += '\n' + fmtPrintDate(dateStr) + '\n';
    plain += cols.join('\t') + '\n';
    for (const b of bookings) {
      const r = getBookingRow(b);
      const vals = [r.tijd, r.bedrijf, r.klant, r.pax, r.activiteit, r.foods, r.drinks, r.begeleiding, r.status];
      html += '<tr>' + vals.map((v, i) => {
        let cellVal = v || '';
        let extraStyle = '';
        if (i === vals.length - 1 && r.status === 'Op te volgen') {
          extraStyle = 'color:#ff0000;font-weight:bold;';
        }
        return '<td style="' + tdBase + 'width:' + colWidths[i] + ';' + extraStyle + '">' + cellVal + '</td>';
      }).join('') + '</tr>';
      plain += vals.join('\t') + '\n';
    }
    html += '</table>';
  }

  if (!plain.trim()) { alert('Geen reserveringen in de geselecteerde periode.'); return; }

  const showSuccess = () => {
    const btn = document.querySelector('.print-btn[onclick*="copy"]');
    const orig = btn.textContent;
    btn.textContent = '✅ Gekopieerd!';
    setTimeout(() => btn.textContent = orig, 2000);
  };

  try {
    // Copy as both HTML (for email) and plain text (fallback)
    const htmlBlob = new Blob([html], { type: 'text/html' });
    const textBlob = new Blob([plain.trim()], { type: 'text/plain' });
    await navigator.clipboard.write([
      new ClipboardItem({
        'text/html': htmlBlob,
        'text/plain': textBlob
      })
    ]);
    showSuccess();
  } catch(e) {
    // Fallback: copy plain text
    try {
      await navigator.clipboard.writeText(plain.trim());
      showSuccess();
    } catch(e2) {
      const ta = document.createElement('textarea');
      ta.value = plain.trim();
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showSuccess();
    }
  }
}

function pdfReserveringen() {
  const grouped = getFilteredReserveringen();
  if (!grouped) return;

  const dates = Object.keys(grouped);
  if (!dates.length) { alert('Geen reserveringen in de geselecteerde periode.'); return; }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const leftM = 10;
  const pw = 277; // landscape width minus margins
  const from = document.getElementById('printFrom').value;
  const to = document.getElementById('printTo').value;

  // Header
  doc.setFontSize(16); doc.setFont(undefined, 'bold'); doc.setTextColor(0,0,0);
  doc.text('Reserveringen', leftM, 15);
  doc.setFontSize(10); doc.setFont(undefined, 'normal');
  doc.text(fmtPrintDate(from) + '  –  ' + fmtPrintDate(to), leftM, 22);

  // Print timestamp
  const now = new Date();
  const ts = 'Geprint op: ' + now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  let y = 30;
  const heads = [['Tijd','Bedrijf','Klantnaam','Pax','Activiteit','Foods','Drinks','Begeleiding','Status']];
  const colStyles = {
    0: { cellWidth: 16 },  // Tijd
    1: { cellWidth: 50 },  // Bedrijf
    2: { cellWidth: 32 },  // Klantnaam
    3: { cellWidth: 12 },  // Pax
    4: { cellWidth: 50 },  // Activiteit
    5: { cellWidth: 36 },  // Foods
    6: { cellWidth: 36 },  // Drinks
    7: { cellWidth: 24 },  // Begeleiding
    8: { cellWidth: 21 },  // Status
  };

  for (let di = 0; di < dates.length; di++) {
    const dateStr = dates[di];
    const bookings = grouped[dateStr];

    // Check if we need a new page (if less than 30mm left)
    if (y > 170) {
      doc.addPage('a4', 'landscape');
      y = 15;
    }

    // Date header
    doc.setFontSize(11); doc.setFont(undefined, 'bold'); doc.setTextColor(0,0,0);
    doc.text(fmtPrintDate(dateStr), leftM, y);
    y += 2;

    const rows = bookings.map(b => {
      const r = getBookingRow(b);
      return [r.tijd, r.bedrijf, r.klant, String(r.pax), r.activiteit, r.foods, r.drinks, r.begeleiding, {
        content: r.status,
        styles: { textColor: r.status === 'Op te volgen' ? [239, 68, 68] : r.status === 'Bevestigd' ? [0, 0, 0] : r.status === 'Betaald' ? [21, 87, 36] : [180, 60, 0] }
      }];
    });

    doc.autoTable({
      head: heads,
      body: rows,
      startY: y,
      margin: { left: leftM, right: leftM },
      styles: { fontSize: 7.5, cellPadding: 1.5, overflow: 'linebreak', lineColor: [200,200,200], lineWidth: 0.2 },
      headStyles: { fillColor: [30, 30, 50], textColor: [255,255,255], fontStyle: 'bold', fontSize: 7 },
      columnStyles: colStyles,
      theme: 'grid',
      didDrawPage: function(data) {
        // Footer with timestamp
        doc.setFontSize(7); doc.setFont(undefined, 'normal'); doc.setTextColor(150,150,150);
        doc.text(ts, leftM, 200);
      }
    });

    y = doc.lastAutoTable.finalY + 10;
  }

  // Save
  const fn = 'Reserveringen_' + from + '_' + to + '.pdf';
  doc.save(fn);
}

// ── Auto-init (after all declarations) ────────────────────────────────────────
if (CODE) { init(); document.getElementById('printControls').style.display = 'block'; }
