name: Update Dashboard Data

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:           # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate dashboard data
        run: python generate_data.py
        env:
          ROLLER_CLIENT_ID: ${{ secrets.ROLLER_CLIENT_ID }}
          ROLLER_CLIENT_SECRET: ${{ secrets.ROLLER_CLIENT_SECRET }}

      - name: Commit and push data files
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@almere-underground.nl"
          git add data/
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: update dashboard data [skip ci]" && git push)
