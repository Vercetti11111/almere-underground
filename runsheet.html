<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Almere Underground – Run Sheet</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    body { margin: 0; background: #0f0f13; color: #f1f1f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    select { background: #1a1a24; color: #f1f1f5; border: 1px solid #3a3a4a; border-radius: 8px; padding: 6px 10px; font-size: 14px; cursor: pointer; }

    /* Login */
    /* login removed - SSO via landing page */
    .login-logo { font-size:40px; margin-bottom:12px; }
    .login-title { font-size:22px; font-weight:800; margin-bottom:4px; }
    .login-sub { font-size:13px; color:#888; margin-bottom:32px; }
    .login-card { background:#1a1a24; border-radius:20px; padding:28px 24px; width:100%; max-width:360px; }
    .login-label { font-size:12px; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }
    .login-input { width:100%; background:#0f0f13; border:2px solid #2a2a38; border-radius:12px; padding:14px 16px; font-size:18px; color:#f1f1f5; letter-spacing:0.15em; text-align:center; outline:none; transition:border-color 0.2s; font-family:monospace; }
    .login-input:focus { border-color:#7c3aed; }
    .login-input.error { border-color:#ef4444; animation: shake 0.3s; }
    .login-btn { width:100%; margin-top:16px; background:#7c3aed; color:white; border:none; border-radius:12px; padding:15px; font-size:16px; font-weight:700; cursor:pointer; transition:background 0.2s; }
    .login-btn:active { background:#6d28d9; }
    .login-error { color:#ef4444; font-size:13px; text-align:center; margin-top:12px; min-height:18px; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    /* App */
    #app-screen { display:block; max-width:1200px; margin:0 auto; padding:16px 12px 90px; }

    /* Common */
    .card { background:#1a1a24; border-radius:16px; padding:16px; margin-bottom:12px; }
    .nav-btn { background:#1a1a24; border:none; color:#aaa; border-radius:10px; padding:8px 14px; font-size:18px; cursor:pointer; }
    .nav-btn:active { background:#2a2a38; }
    .date-label { font-size:15px; font-weight:700; text-align:center; flex:1; }
    .spinner { width:32px; height:32px; border:3px solid #2a2a38; border-top-color:#7c3aed; border-radius:50%; animation:spin 0.8s linear infinite; margin:48px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .err-msg { text-align:center; padding:40px 20px; color:#ef4444; font-size:13px; line-height:1.6; }

    /* Language switcher */
    #lang-select { background:#1a1a24; border:1px solid #2a2a38; color:#f1f1f5; border-radius:8px; padding:5px 8px; font-size:13px; cursor:pointer; }

    /* Runsheet */
    .rs-section { border-radius:14px; overflow:hidden; margin-bottom:20px; max-width:1200px; margin-left:auto; margin-right:auto; }
    .rs-section-header { padding:14px 16px 12px; font-size:14px; font-weight:800; letter-spacing:0.04em; }
    .rs-kf { background:#7c1a1a; }
    .rs-bf { background:#1a3060; }
    .rs-booking { background:#1a1a24; margin-bottom:1px; padding:0; }
    .rs-booking:last-child { border-radius:0 0 14px 14px; }
    .rs-booking-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; padding:8px 16px 0; }
    .rs-booking-left { flex:1; min-width:0; }
    .rs-booking-right { flex-shrink:0; text-align:right; margin-left:12px; display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
    .rs-booking-name-header { font-size:14px; font-weight:800; letter-spacing:0.04em; padding:10px 16px 6px; background:#1a1a24; border-bottom:1px solid #2a2a38; }
    .rs-booking-name-header:first-child { /* first booking after section header */ }
    .rs-booking-id { font-size:12px; color:#ccc; }
    .rs-contact { font-size:12px; color:#999; margin-top:2px; }
    .rs-contact { font-size:12px; color:#999; margin-top:2px; }
    .rs-table { width:calc(100% - 32px); border-collapse:collapse; font-size:12px; margin:0 16px 10px; }
    .rs-table th, .rs-table td { padding-left:16px; }
    .rs-table th { text-align:left; color:#888; font-weight:600; padding:4px 6px 4px 0; border-bottom:1px solid #2a2a38; }
    .rs-table td { padding:5px 6px 5px 0; vertical-align:top; border-bottom:1px solid #1e1e2a; color:#ddd; }
    .rs-table tr:last-child td { border-bottom:none; }

    .rs-notes-label { font-size:10px; color:#666; font-weight:600; text-transform:uppercase; margin-bottom:4px; }
    .pay-badge { display:inline-block; padding:5px 10px; border-radius:10px; font-size:11px; font-weight:700; color:white; line-height:1.5; white-space:pre-line; text-align:left; }
    .rs-tafel { font-size:15px; font-weight:700; color:#f1f1f5; }
    /* Multi-table selector */

    .tafel-chip { display:inline-flex; align-items:center; gap:2px; background:#7c3aed44; color:#a78bfa; border-radius:6px; padding:3px 8px; font-size:12px; font-weight:600; cursor:default; }
    .tafel-chip .chip-x { cursor:pointer; margin-left:2px; font-size:14px; color:#888; }
    .tafel-chip .chip-x:hover { color:#f44; }
    .tafel-add-btn { background:none; border:1px dashed #555; color:#888; border-radius:6px; padding:3px 8px; font-size:12px; cursor:pointer; }
    .tafel-add-btn:hover { border-color:#a78bfa; color:#a78bfa; }
    .tafel-dropdown { position:absolute; z-index:100; background:#1e1e2a; border:1px solid #333; border-radius:8px; max-height:200px; overflow-y:auto; min-width:120px; box-shadow:0 4px 12px rgba(0,0,0,.5); }
    .tafel-dropdown-item { padding:6px 12px; cursor:pointer; font-size:12px; color:#ddd; display:flex; align-items:center; gap:6px; }
    .tafel-dropdown-item:hover { background:#2a2a3a; }
    .tafel-dropdown-item .td-check { width:16px; height:16px; border-radius:4px; border:1.5px solid #555; display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; }
    .tafel-dropdown-item.checked .td-check { background:#7c3aed; border-color:#7c3aed; color:#fff; }
    .tafel-dropdown-item.checked { color:#a78bfa; }
    .pay-paid { background:#166534; }
    .pay-unpaid { background:#92400e; }
    @media (max-width:768px) {
      .ov-table .ov-hide-mobile { display:none !important; }
      .rs-contact, .rs-booking-id, .pay-badge { display:none !important; }
    }
    .rs-empty { text-align:center; padding:32px; color:#555; font-size:13px; background:#1a1a24; border-radius:12px; }
    /* Detail overlay */
    .ov-detail-btn { display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#2a2a3a;color:#8b8bff;border:1px solid #3a3a4a;cursor:pointer;font-size:14px;font-weight:700;line-height:1;margin-right:6px;vertical-align:middle;flex-shrink:0; }
    .ov-detail-btn:hover { background:#3a3a5a;color:#a5a5ff; }
    .ov-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px; }
    .ov-overlay-card { background:#16161e;border-radius:16px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;padding:0;box-shadow:0 12px 40px rgba(0,0,0,0.6); }
    .ov-overlay-header { display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #2a2a38; }
    .ov-overlay-header h3 { margin:0;font-size:16px;color:#f1f1f5;font-weight:800; }
    .ov-overlay-close { background:none;border:none;color:#888;font-size:22px;cursor:pointer;padding:4px 8px; }
    .ov-overlay-close:hover { color:#fff; }
    .ov-overlay-body { padding:16px 20px; }
    .ov-overlay-body .ov-info-row { display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e1e2a;font-size:13px;color:#ccc; }
    .ov-overlay-body .ov-info-label { color:#888;font-weight:600; }
    .ov-overlay-body .ov-act-table { width:100%;border-collapse:collapse;font-size:12px;margin-top:12px; }
    .ov-overlay-body .ov-act-table th { text-align:left;color:#888;font-weight:600;padding:6px 8px;border-bottom:1px solid #2a2a38;font-size:11px; }
    .ov-overlay-body .ov-act-table td { padding:5px 8px;border-bottom:1px solid #1e1e2a;color:#ddd; }
    .ov-overlay-body .ov-notes { background:#111118;border-radius:8px;padding:10px 12px;font-size:12px;color:#bbb;margin-top:12px; }
    .ov-overlay-body .ov-notes-label { font-size:10px;color:#666;font-weight:600;text-transform:uppercase;margin-bottom:4px; }

    @media print {
      body { background:#fff !important; color:#000 !important; font-size:11pt; }
      .nav-btn, #refresh-btn, #lang-select, .cache-label, .no-print { display:none !important; }
      #app-screen { padding:0 !important; max-width:100% !important; }
      .rs-section { border:1px solid #ccc !important; border-radius:4px !important; break-inside:avoid; margin-bottom:12pt; }
      .rs-section-header { -webkit-print-color-adjust:exact; print-color-adjust:exact; padding:8px 12px !important; }
      .rs-booking { border-bottom:1px solid #eee !important; padding:8px 12px !important; break-inside:avoid; }
      .rs-table { font-size:9pt !important; }
      .pay-badge { border:1px solid #888 !important; color:#000 !important; background:#fff !important; }
      .pay-paid { background:#d4edda !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      .pay-unpaid { background:#fff3cd !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      .rs-kf { background:#7c3aed !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      .rs-bf { background:#1d4ed8 !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      h2, .date-label { color:#000 !important; }
      * { box-shadow:none !important; }
    }
  
    /* ── Desktop / View Mode ────────────────────────── */
    body.desktop-mode #app-screen,
    body.force-desktop #app-screen { max-width:1200px; padding:24px 32px 90px; }
    body.desktop-mode .rs-section,
    body.force-desktop .rs-section { }
    body.desktop-mode .rs-booking,
    body.force-desktop .rs-booking { display:flex; flex-wrap:wrap; gap:12px; }
    body.desktop-mode .rs-table,
    body.force-desktop .rs-table { font-size:13px; }
    body.force-mobile #app-screen { max-width:400px !important; }
    body.force-mobile .rs-contact, body.force-mobile .rs-booking-id, body.force-mobile .pay-badge { display:none !important; }

    /* View toggle */
    .view-toggle { background:#1a1a24; border:1px solid #2a2a38; color:#aaa; border-radius:8px; padding:5px 8px; font-size:13px; cursor:pointer; }
    .view-toggle:hover { border-color:#7c3aed; color:#e0e0f0; }

    /* Tab navigation */
    .rs-tabs { display:flex; gap:4px; margin-bottom:16px; }
    .rs-tab { flex:1; text-align:center; padding:10px 6px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; border:none; transition:all 0.2s; }
    .rs-tab-inactive { background:#1a1a24; color:#888; }
    .rs-tab-inactive:hover { color:#ccc; }
    .rs-tab-active { background:#7c3aed; color:#fff; }

    /* Overview table */
    .ov-section { margin-bottom:20px; border-radius:14px; overflow:visible; }
    .ov-header { padding:12px 16px; font-size:14px; font-weight:800; color:#fff; letter-spacing:0.04em; }
    .ov-table { width:100%; border-collapse:collapse; font-size:12px; background:#1a1a24; }
    .ov-table th { text-align:left; padding:8px 10px; color:#888; font-weight:600; border-bottom:1px solid #2a2a38; font-size:11px; }
    .ov-table td { padding:8px 10px; border-bottom:1px solid #1e1e2a; color:#ddd; vertical-align:middle; }
    .ov-table tr:last-child td { border-bottom:none; }
    .ov-select { background:#0f0f13; color:#f1f1f5; border:1px solid #3a3a4a; border-radius:6px; padding:4px 6px; font-size:12px; width:100%; cursor:pointer; }
    .ov-select:focus { border-color:#7c3aed; outline:none; }
    .ov-save-indicator { font-size:10px; color:#22c55e; opacity:0; transition:opacity 0.3s; margin-left:4px; }
    .ov-save-indicator.show { opacity:1; }

  </style>
</head>
<body>

<!-- LOGIN -->
<!-- SSO: login via landing page -->
<div id="app-screen">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <div>
      <a href="index.html" style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;text-decoration:none;">← Almere Underground</a>
      <div style="font-size:20px;font-weight:800;">📋 Run Sheet</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <select id="lang-select" onchange="setLang(this.value)" title="Language / Taal">
        <option value="nl">🇳🇱 NL</option>
        <option value="en">🇬🇧 EN</option>
      </select>
      <button id="view-toggle-btn" class="view-toggle" onclick="toggleViewMode()" title="Wissel weergave">🖥️</button>
      <button id="refresh-btn" onclick="refreshAll()" style="background:#1a1a24;border:1px solid #2a2a38;color:#aaa;border-radius:8px;padding:6px 10px;font-size:16px;cursor:pointer;line-height:1;" title="Data verversen">🔄</button>
    </div>
  </div>

  <div id="content"></div>
</div>

<script>

// ── View Mode Toggle ─────────────────────────────────────────────────────────
function getViewMode() { return localStorage.getItem('au_view_mode') || 'auto'; }
function applyViewMode() {
  const mode = getViewMode();
  document.body.classList.remove('desktop-mode','force-desktop','force-mobile');
  if (mode === 'desktop') document.body.classList.add('force-desktop');
  else if (mode === 'mobile') document.body.classList.add('force-mobile');
  else if (window.innerWidth >= 768) document.body.classList.add('desktop-mode');
  const btn = document.getElementById('view-toggle-btn');
  if (btn) btn.textContent = mode === 'desktop' ? '📱' : mode === 'mobile' ? '🖥️' : (window.innerWidth >= 768 ? '📱' : '🖥️');
  if (btn) btn.title = {auto:'Automatisch — klik om te wisselen', desktop:'Desktop geforceerd', mobile:'Mobiel geforceerd'}[mode];
}
function toggleViewMode() {
  const modes = ['auto','desktop','mobile'];
  const cur = getViewMode();
  const next = modes[(modes.indexOf(cur)+1)%3];
  localStorage.setItem('au_view_mode', next);
  applyViewMode();
}
function isWideView() {
  const m = getViewMode();
  return m === 'desktop' || (m === 'auto' && window.innerWidth >= 768);
}
window.addEventListener('resize', applyViewMode);


const WORKER = 'https://api.almereunderground.com';

// ── Translations ──────────────────────────────────────────────────────────────
const TRANSLATIONS = {
  nl: {
    kfTitle: 'Kinderfeestjes (KF)',
    ffTitle: 'Familie Feesten (FF)',
    bfTitle: 'Bedrijfsfeesten (BF)',
    booking: 'boeking',
    bookings: 'boekingen',
    bookingNr: 'Boeking #',
    pers: 'pers.',
    activity: 'Activiteit',
    subtype: 'Subtype',
    time: 'Tijd',
    persons: 'Pers.',
    location: 'Locatie',
    notes: 'Opmerkingen',
    noNotes: 'geen',
    paid: 'Betaald',
    outstanding: 'Openstaand',
    paidWord: 'betaald',
    openWord: 'open',
    downloadPdf: '📄 Download PDF',
    noBookings: 'Geen KF/FF/BF boekingen voor',
    runsheetTitle: 'Almere Underground — Run Sheet',
    accessCode: 'Toegangscode',
    loginBtn: 'Inloggen →',
    invalidCode: 'Ongeldige toegangscode',
    connError: 'Verbindingsfout – probeer opnieuw',
    fromCache: 'Uit cache',
    liveData: 'Live data',
    agoSec: 's geleden',
    agoMin: 'm geleden',
  },
  en: {
    kfTitle: 'Birthday Parties (KF)',
    ffTitle: 'Family Parties (FF)',
    bfTitle: 'Corporate Events (BF)',
    booking: 'booking',
    bookings: 'bookings',
    bookingNr: 'Booking #',
    pers: 'pers.',
    activity: 'Activity',
    subtype: 'Subtype',
    time: 'Time',
    persons: 'Pers.',
    location: 'Location',
    notes: 'Notes',
    noNotes: 'none',
    paid: 'Paid',
    outstanding: 'Outstanding',
    paidWord: 'paid',
    openWord: 'due',
    downloadPdf: '📄 Download PDF',
    noBookings: 'No KF/FF/BF bookings for',
    runsheetTitle: 'Almere Underground — Run Sheet',
    accessCode: 'Access code',
    loginBtn: 'Log in →',
    invalidCode: 'Invalid access code',
    connError: 'Connection error – please try again',
    fromCache: 'From cache',
    liveData: 'Live data',
    agoSec: 's ago',
    agoMin: 'm ago',
  }
};

let lang = localStorage.getItem('au_lang') || 'nl';
function t(key) { return (TRANSLATIONS[lang] || TRANSLATIONS.nl)[key] || TRANSLATIONS.nl[key] || key; }
function locale() { return lang === 'en' ? 'en-GB' : 'nl-NL'; }

function setLang(newLang) {
  lang = newLang;
  localStorage.setItem('au_lang', lang);
  document.getElementById('lang-select').value = lang;
  render();
}

// ── SSO Auth (via landing page) ───────────────────────────────────────────────
const _session = JSON.parse(localStorage.getItem('au_session') || 'null');
if (!_session || !_session.code || (_session.expiresAt && Date.now() > _session.expiresAt)) {
  localStorage.removeItem('au_session');
  window.location.href = 'index.html';
}
const accessCode = _session ? _session.code : '';

// ── API ───────────────────────────────────────────────────────────────────────
const cache = {};

async function api(path, forceRefresh = false) {
  const key = path;
  if (!forceRefresh && cache[key]) return cache[key];
  const sep = path.includes('?') ? '&' : '?';
  const url = forceRefresh ? `${WORKER}${path}${sep}refresh=1` : `${WORKER}${path}`;
  const r = await fetch(url, { headers: { 'X-Access-Code': accessCode } });
  const data = await r.json();
  if (data.error) throw new Error(data.error);
  cache[key] = data;
  if (!forceRefresh) setTimeout(() => delete cache[key], 5 * 60 * 1000);
  return data;
}

async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  Object.keys(cache).forEach(k => delete cache[k]);
  ovStaff = null; // refresh staff list
  try {
    if (activeTab === 'overzicht') await renderOverview(true);
    else await renderRunsheet(true);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔄'; }
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function todayStr() { return new Date().toLocaleDateString('sv-SE'); }

function addDays(s, n) {
  const d = new Date(s + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toLocaleDateString('sv-SE');
}

function fmtEur(v) {
  if (v == null || isNaN(v)) return '—';
  return '€\u00a0' + v.toLocaleString(locale(), { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDateLong(s) {
  const d = new Date(s + 'T00:00:00').toLocaleDateString(locale(), { weekday: 'long', day: 'numeric', month: 'long' });
  return d.charAt(0).toUpperCase() + d.slice(1);
}

function fmtDate(s) {
  return new Date(s + 'T00:00:00').toLocaleDateString(locale(), { weekday: 'short', day: 'numeric', month: 'short' });
}

function fmtTime(t) {
  if (!t) return '—';
  return t.length > 5 ? t.substring(11, 16) : t;
}

function setContent(html) { document.getElementById('content').innerHTML = html; }
function spinner() { return '<div class="spinner"></div>'; }
function errMsg(m) { return `<div class="err-msg">⚠️ ${m}</div>`; }

function cacheLabel(data) {
  if (!data) return '';
  const at = data._cachedAt || data.generatedAt;
  const fromCache = data._cached;
  const age = data._cacheAge;
  const timeStr = at ? new Date(at).toLocaleString(locale(),{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
  const ageStr = age != null ? (age < 60 ? `${age}${t('agoSec')}` : `${Math.floor(age/60)}${t('agoMin')}`) : '';
  const icon = fromCache ? '📦' : '⚡';
  const label = fromCache ? `${t('fromCache')} · ${ageStr}` : t('liveData');
  return `<div style="font-size:10px;color:#444;text-align:center;margin-top:12px;">${icon} ${label}${timeStr ? ' · ' + timeStr : ''}</div>`;
}

// ── State ─────────────────────────────────────────────────────────────────────
let rsDate = todayStr();
let activeTab = 'details'; // 'overzicht' or 'details'
let ovTables = null; // cached table list
let ovStaff = null; // cached staff for current date
let ovAssignments = {}; // current assignments {bookingId: {tafel, begeleider}}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  render();
}

function tabNav() {
  return `
    <div class="rs-tabs no-print">
      <button class="rs-tab ${activeTab === 'details' ? 'rs-tab-active' : 'rs-tab-inactive'}" onclick="switchTab('details')">📖 Details</button>
      <button class="rs-tab ${activeTab === 'overzicht' ? 'rs-tab-active' : 'rs-tab-inactive'}" onclick="switchTab('overzicht')">📋 Dagplanning</button>
    </div>`;
}

// ── Navigation ────────────────────────────────────────────────────────────────
function dateNav() {
  return `
    <div class="no-print" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <button class="nav-btn" onclick="shiftRs(-1)">‹</button>
      <div style="flex:1;text-align:center;cursor:pointer;position:relative;min-height:38px;display:flex;align-items:center;justify-content:center;" onclick="triggerDatePicker('dp-rs')">
        <div class="date-label" style="text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;pointer-events:none;">${fmtDateLong(rsDate)}</div>
        <input type="date" id="dp-rs" value="${rsDate}" onchange="onRsDateChange(this.value)" style="position:absolute;inset:0;opacity:0.001;border:none;cursor:pointer;z-index:10;background:transparent;">
      </div>
      <button class="nav-btn" onclick="shiftRs(1)">›</button>
    </div>`;
}

function triggerDatePicker(id) {
  const el = document.getElementById(id);
  if (!el) return;
  try { if (el.showPicker) el.showPicker(); else el.click(); } catch(e) { el.click(); }
}

let lastRunsheetData = null; // store for PDF generation
function onRsDateChange(val) { rsDate = val; render(); }
function shiftRs(n) { rsDate = addDays(rsDate, n); render(); }

// ── RUNSHEET VIEW ─────────────────────────────────────────────────────────────
async function renderRunsheet(forceRefresh = false) {
  setContent(spinner());
  try {
    const data = await api(`/api/runsheet?date=${rsDate}`, forceRefresh);
    lastRunsheetData = data;

    function getFirstTime(b) {
      const acts = b.activities || [];
      let eStr = null, eMin = Infinity;
      for (const a of acts) {
        if (!a.startTime) continue;
        const st = a.startTime;
        let hh, mm;
        if (st.length <= 5) { [hh, mm] = st.split(':').map(Number); }
        else { hh = parseInt(st.substring(11,13)); mm = parseInt(st.substring(14,16)); }
        const tot = hh * 60 + mm;
        if (tot < eMin) { eMin = tot; eStr = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0'); }
      }
      return eStr || '';
    }
    function getBookingPax(b) {
      let max = 0;
      for (const a of (b.activities || [])) { if ((a.quantity || 0) > max) max = a.quantity; }
      return max > 0 ? String(max) : '';
    }

    function renderBooking(b) {
      const isPaid = b.paymentStatus === 'paid';
      const payClass = isPaid ? 'pay-paid' : 'pay-unpaid';
      const fmtE = v => '€' + (v || 0).toLocaleString(locale(), {minimumFractionDigits:2, maximumFractionDigits:2});
      const amountPaid = (b.total || 0) - (b.amountOwing || 0);
      const payLabel = isPaid
        ? `${t('paid')}: ${fmtE(b.total)}`
        : `${t('outstanding')}: ${fmtE(b.amountOwing)}\n${t('paid')}: ${fmtE(amountPaid)}`;

      let actRows = '';
      for (const act of (b.activities || [])) {
        const locs = act.locations?.length ? act.locations.join(', ') : '—';
        actRows += `
          <tr>
            <td>${act.mainActivity || '—'}</td>
            <td>${act.subtype || '—'}</td>
            <td>${fmtTime(act.startTime)}${act.endTime ? '–'+fmtTime(act.endTime) : ''}</td>
            <td>${act.quantity || '—'}</td>
            <td>${locs}</td>
          </tr>`;
      }

      const notes = [b.bookingNotes, b.posNotes].filter(Boolean).join(' · ') || t('noNotes');

      return `
        <div class="rs-booking">
          <div class="rs-booking-name-header" style="display:flex;justify-content:space-between;align-items:center;">${b.name}<span style="font-size:12px;font-weight:400;color:#aaa;margin-left:8px;">${getFirstTime(b) ? getFirstTime(b) + ' · ' : ''}${getBookingPax(b) ? getBookingPax(b) + ' pax' : ''}</span></div>
          <div class="rs-booking-top">
            <div class="rs-booking-left">
              ${b.contactName ? `<div class="rs-contact" style="color:#ccc;font-weight:600;">${b.contactName}</div>` : ''}
              ${b.contactPhone ? `<div class="rs-contact">${b.contactPhone}</div>` : ''}
              <div class="rs-booking-id">${t('bookingNr')}${b.id}</div>
            </div>
            <div class="rs-booking-right">
              ${isWideView() ? `<span class="pay-badge ${payClass}">${payLabel}</span>` : ''}
              <div class="rs-tafel">Tafel:</div>
            </div>
          </div>
          ${actRows ? `
          <table class="rs-table">
            <tr>
              <th>${t('activity')}</th><th>${t('subtype')}</th><th>${t('time')}</th><th>${t('persons')}</th><th>${t('location')}</th>
            </tr>
            ${actRows}
          </table>` : ''}
          <div class="rs-notes">
            <div class="rs-notes-label">${t('notes')}</div>
            ${notes}
          </div>
        </div>`;
    }

    function bookingCount(n) {
      return n === 1 ? `1 ${t('booking')}` : `${n} ${t('bookings')}`;
    }

    const kfSection = data.kf?.length ? `
      <div class="rs-section">
        <div class="rs-section-header rs-kf">🎂 ${t('kfTitle')} — ${bookingCount(data.kf.length)}</div>
        ${data.kf.map(renderBooking).join('')}
      </div>` : '';

    const ffSection = data.ff?.length ? `
      <div class="rs-section">
        <div class="rs-section-header rs-ff" style="background:#7c3aed;">👨‍👩‍👧‍👦 ${t('ffTitle')} — ${bookingCount(data.ff.length)}</div>
        ${data.ff.map(renderBooking).join('')}
      </div>` : '';

    const bfSection = data.bf?.length ? `
      <div class="rs-section">
        <div class="rs-section-header rs-bf">🏢 ${t('bfTitle')} — ${bookingCount(data.bf.length)}</div>
        ${data.bf.map(renderBooking).join('')}
      </div>` : '';

    const empty = (!data.kf?.length && !data.ff?.length && !data.bf?.length) ?
      `<div class="rs-empty">${t('noBookings')} ${fmtDate(rsDate)}</div>` : '';

    setContent(`
      ${dateNav()}
      ${tabNav()}
      <div style="text-align:right;margin-bottom:14px;" class="no-print">
        <button onclick="downloadRunsheetPDF('${rsDate}')" style="background:#6366f1;color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;">${t('downloadPdf')}</button>
      </div>
      <div id="rs-print-header" style="display:none;margin-bottom:16px;">
        <div style="font-size:18pt;font-weight:800;">${t('runsheetTitle')}</div>
        <div style="font-size:12pt;color:#555;">${fmtDateLong(rsDate)}</div>
      </div>
      ${kfSection}${ffSection}${bfSection}${empty}
      ${cacheLabel(data)}
    `);
  } catch (e) { setContent(errMsg(e.message)); }
}

// ── OVERVIEW TAB ──────────────────────────────────────────────────────────────
async function renderOverview(forceRefresh = false) {
  setContent(spinner());
  try {
    // Load runsheet data, tables, staff, and assignments in parallel
    const [data, tables, staffRaw, assignments] = await Promise.all([
      api(`/api/runsheet?date=${rsDate}`, forceRefresh),
      ovTables || api('/api/runsheet-tables'),
      api(`/api/runsheet-staff?date=${rsDate}`, forceRefresh),
      api(`/api/runsheet-assignments?date=${rsDate}`, forceRefresh)
    ]);

    lastRunsheetData = data;
    // Tables now come as [{name, capacity}] objects from KV
    ovTables = (tables || []).map(t => {
      if (typeof t === 'string') return { name: t.replace(/^Tafel\s*/i, ''), capacity: 0 };
      return { name: (t.name || '').replace(/^Tafel\s*/i, ''), capacity: t.capacity || 0 };
    });
    // Staff now comes as [{name, start, end}] — store full objects
    ovStaffFull = Array.isArray(staffRaw) ? staffRaw : [];
    ovStaff = ovStaffFull.map(s => typeof s === 'string' ? s : s.name);
    ovAssignments = assignments || {};

    const allBookings = [...(data.kf || []), ...(data.ff || []), ...(data.bf || [])];

    // Sort by earliest start time
    function getFirstTime(b) {
      const acts = b.activities || [];
      if (!acts.length) return '99:99';
      let earliest = '99:99';
      for (const a of acts) {
        const st = a.startTime || '';
        const t = st.length <= 5 ? st : st.substring(11, 16);
        if (t && t < earliest) earliest = t;
      }
      return earliest;
    }

    // PAX = highest quantity across activities
    function getBookingPax(b) {
      let max = 0;
      for (const a of (b.activities || [])) { if ((a.quantity || 0) > max) max = a.quantity; }
      return max > 0 ? String(max) : '';
    }

    // Shorten name: "Frank Keijzer" → "Frank K."
    function shortName(n) {
      if (!n) return '';
      const parts = n.trim().split(/\s+/);
      if (parts.length <= 1) return n;
      return parts[0] + ' ' + parts[parts.length - 1][0] + '.';
    }

    // Filter staff to those whose shift covers the booking start time
    function staffForTime(startTime) {
      if (!startTime || startTime === '99:99') return ovStaff.map(shortName);
      return ovStaffFull.filter(s => {
        if (!s.start || !s.end) return true;
        return startTime >= s.start && startTime < s.end;
      }).map(s => shortName(s.name));
    }

    // Store bookings reference for conflict checking + detail overlay lookup
    window._ovAllBookings = allBookings;
    window._ovBookingMap = {};
    allBookings.forEach(b => { window._ovBookingMap[String(b.id || b.bookingReference || '')] = b; });

    function renderSection(bookings, title, colorClass, bgColor) {
      if (!bookings.length) return '';

      const sorted = bookings.slice().sort((a, b) => getFirstTime(a).localeCompare(getFirstTime(b)));

      const rows = sorted.map(b => {
        const bid = String(b.id || b.bookingReference || '');
        const assign = ovAssignments[bid] || {};
        const isPaid = b.paymentStatus === 'paid';
        const amountPaid = (b.total || 0) - (b.amountOwing || 0);
        const fmtE = v => '€' + (v || 0).toLocaleString('nl-NL', {minimumFractionDigits:2, maximumFractionDigits:2});
        const payText = isPaid
          ? `<span style="color:#22c55e;font-weight:600;">${t('paid')}: ${fmtE(b.total)}</span>`
          : `<span style="color:#f59e0b;font-weight:600;">${t('outstanding')}: ${fmtE(b.amountOwing)}</span><br><span style="font-size:11px;color:#999;">${t('paid')}: ${fmtE(amountPaid)}</span>`;

        const ft = getFirstTime(b);
        const timeStr = ft !== '99:99' ? ft : '—';

        // Multi-table chips
        const selectedTables = Array.isArray(assign.tafels) ? assign.tafels : (assign.tafel ? [assign.tafel] : []);
        const tableChipsHtml = renderTableChips(bid, selectedTables);

        // Staff dropdown — filter by booking start time + add "Anders..." option
        const filteredStaff = staffForTime(ft !== '99:99' ? ft : null);
        const staffOptions = filteredStaff.map(s =>
          `<option value="${s}" ${assign.begeleider === s ? 'selected' : ''}>${s}</option>`
        ).join('');
        // If saved begeleider is not in filtered list (custom or different shift), add it
        const savedBeg = assign.begeleider || '';
        const savedBegShort = shortName(savedBeg);
        const begExtraOpt = (savedBeg && !filteredStaff.includes(savedBeg) && !filteredStaff.includes(savedBegShort))
          ? `<option value="${savedBeg}" selected>${shortName(savedBeg)}</option>` : '';

        const paxVal = getBookingPax(b);
        return `
          <tr>
            <td style="font-weight:600;"><button class="ov-detail-btn" onclick="showBookingOverlay('${bid}')" title="Details">+</button>${b.name || '—'}<span style="float:right;font-weight:400;color:#aaa;font-size:12px;">${paxVal ? paxVal + ' pax' : ''}</span></td>
            <td class="ov-hide-mobile">${b.contactName || '—'}</td>
            <td class="ov-hide-mobile">${b.contactPhone || '—'}</td>
            <td class="ov-hide-mobile" style="color:#999;font-size:11px;">#${bid}</td>
            <td style="position:relative;">
              ${tableChipsHtml}
            </td>
            <td>
              <select class="ov-select" data-bid="${bid}" data-field="begeleider" onchange="handleAssignmentChange(this,'${bid}','begeleider')">
                <option value="">— Kies —</option>
                ${begExtraOpt}
                ${staffOptions}
                <option value="__anders__">Anders…</option>
              </select>
            </td>
            <td style="text-align:center;">${timeStr}</td>
            <td>${payText}</td>
          </tr>`;
      }).join('');

      return `
        <div class="ov-section">
          <div class="ov-header" style="background:${bgColor};">${title} — ${bookings.length === 1 ? '1 boeking' : bookings.length + ' boekingen'}</div>
          <table class="ov-table">
            <tr>
              <th>Reserveringsnaam</th>
              <th class="ov-hide-mobile">Contact</th>
              <th class="ov-hide-mobile">Telefoon</th>
              <th class="ov-hide-mobile">Boeking</th>
              <th>Tafel</th>
              <th>Begeleider</th>
              <th>Begintijd</th>
              <th>Betaald / Openstaand</th>
            </tr>
            ${rows}
          </table>
        </div>`;
    }

    const kfHtml = renderSection(data.kf || [], '🎂 ' + t('kfTitle'), 'rs-kf', '#7c1a1a');
    const ffHtml = renderSection(data.ff || [], '👨‍👩‍👧‍👦 ' + t('ffTitle'), 'rs-ff', '#6b21a8');
    const bfHtml = renderSection(data.bf || [], '🏢 ' + t('bfTitle'), 'rs-bf', '#1a3060');
    const empty = !allBookings.length ? `<div class="rs-empty">${t('noBookings')} ${fmtDate(rsDate)}</div>` : '';

    setContent(`
      ${dateNav()}
      ${tabNav()}
      <div style="text-align:right;margin-bottom:14px;" class="no-print">
        <button onclick="downloadRunsheetPDF('${rsDate}')" style="background:#6366f1;color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;">${t('downloadPdf')}</button>
      </div>
      ${kfHtml}${ffHtml}${bfHtml}${empty}
      ${cacheLabel(data)}
    `);
  } catch (e) { setContent(errMsg(e.message)); }
}

// ── Multi-table selector ─────────────────────────────────────────────────────

function getTableLabel(tableName) {
  const tObj = (ovTables || []).find(t => t.name === tableName);
  return tObj && tObj.capacity ? `${tableName} (${tObj.capacity})` : tableName;
}

function renderTableChips(bid, selectedTables) {
  const chips = selectedTables.map(tn =>
    `<span class="tafel-chip">${getTableLabel(tn)}<span class="chip-x" onclick="removeTable('${bid}','${tn}')">&times;</span></span>`
  ).join('');
  return `<div class="tafel-multi" id="tafel-multi-${bid}">${chips}<button class="tafel-add-btn" onclick="showTableDropdown(event,'${bid}')">+ Tafel</button></div>`;
}

function showTableDropdown(evt, bid) {
  evt.stopPropagation();
  // Close any existing dropdown
  closeTableDropdown();

  const dd = document.createElement('div');
  dd.className = 'tafel-dropdown';
  dd.id = 'tafel-dropdown-active';
  dd.dataset.bid = bid;
  dd.onclick = e => e.stopPropagation(); // keep open on clicks inside

  rebuildDropdownItems(dd, bid);

  // "Anders..." option
  const anders = document.createElement('div');
  anders.className = 'tafel-dropdown-item';
  anders.style.borderTop = '1px solid #333';
  anders.innerHTML = '<span class="td-check" style="border:none"></span>Anders…';
  anders.onclick = (e) => {
    e.stopPropagation();
    closeTableDropdown();
    const custom = prompt('Voer een tafelnummer in:');
    if (custom && custom.trim()) addTable(bid, custom.trim());
  };
  dd.appendChild(anders);

  // Position dropdown near button
  const btn = evt.currentTarget;
  const container = btn.closest('td');
  container.appendChild(dd);

  // Close on outside click
  setTimeout(() => document.addEventListener('click', closeTableDropdown, { once: true }), 10);
}

function rebuildDropdownItems(dd, bid) {
  // Remove existing table items (keep "Anders..." at end)
  dd.querySelectorAll('.tafel-dd-table').forEach(el => el.remove());
  const assign = ovAssignments[bid] || {};
  const selected = Array.isArray(assign.tafels) ? assign.tafels : (assign.tafel ? [assign.tafel] : []);
  const anders = dd.querySelector('.tafel-dropdown-item:last-child');

  for (const tObj of (ovTables || [])) {
    const tn = tObj.name;
    const isChecked = selected.includes(tn);
    const item = document.createElement('div');
    item.className = 'tafel-dropdown-item tafel-dd-table' + (isChecked ? ' checked' : '');
    item.innerHTML = `<span class="td-check">${isChecked ? '✓' : ''}</span>${getTableLabel(tn)}`;
    item.onclick = (e) => {
      e.stopPropagation();
      if (isChecked) {
        removeTable(bid, tn);
      } else {
        addTable(bid, tn);
      }
      // Rebuild dropdown items to reflect new state
      rebuildDropdownItems(dd, bid);
    };
    dd.insertBefore(item, anders);
  }
}

function closeTableDropdown() {
  const dd = document.getElementById('tafel-dropdown-active');
  if (dd) dd.remove();
}

function addTable(bid, tableName) {
  if (!ovAssignments[bid]) ovAssignments[bid] = {};
  const assign = ovAssignments[bid];
  const current = Array.isArray(assign.tafels) ? assign.tafels : (assign.tafel ? [assign.tafel] : []);

  // Conflict check
  const conflicts = [];
  for (const [otherBid, a] of Object.entries(ovAssignments)) {
    if (otherBid === bid) continue;
    const otherTables = Array.isArray(a.tafels) ? a.tafels : (a.tafel ? [a.tafel] : []);
    if (otherTables.includes(tableName)) {
      const allB = window._ovAllBookings || [];
      const match = allB.find(b => String(b.id || b.bookingReference || '') === otherBid);
      conflicts.push(match ? match.name : `#${otherBid}`);
    }
  }
  if (conflicts.length > 0) {
    const msg = `⚠️ Tafel ${tableName} is al toegewezen aan:\n\n${conflicts.map(c => '• ' + c).join('\n')}\n\nWeet je zeker dat je deze tafel wilt toewijzen?`;
    if (!confirm(msg)) return;
  }

  if (!current.includes(tableName)) current.push(tableName);
  assign.tafels = current;
  assign.tafel = current[0] || ''; // backward compat
  updateTableChipsUI(bid, current);
  saveAssignments();
}

function removeTable(bid, tableName) {
  if (!ovAssignments[bid]) return;
  const assign = ovAssignments[bid];
  const current = Array.isArray(assign.tafels) ? assign.tafels : (assign.tafel ? [assign.tafel] : []);
  assign.tafels = current.filter(t => t !== tableName);
  assign.tafel = assign.tafels[0] || '';
  updateTableChipsUI(bid, assign.tafels);
  saveAssignments();
}

function updateTableChipsUI(bid, selectedTables) {
  const container = document.getElementById(`tafel-multi-${bid}`);
  if (container) container.outerHTML = renderTableChips(bid, selectedTables);
}

// ── Assignment handler (conflict check + "Anders" popup) ─────────────────────
let saveTimer = null;
let ovStaffFull = []; // [{name, start, end}]

function handleAssignmentChange(selectEl, bookingId, field) {
  const value = selectEl.value;

  // "Anders…" → prompt for manual input
  if (value === '__anders__') {
    const label = 'Voer een naam in:';
    const custom = prompt(label);
    if (!custom || !custom.trim()) {
      const prev = (ovAssignments[bookingId] || {})[field] || '';
      selectEl.value = prev;
      return;
    }
    const val = custom.trim();
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = val;
    opt.selected = true;
    const andersOpt = selectEl.querySelector('option[value="__anders__"]');
    selectEl.insertBefore(opt, andersOpt);
    selectEl.value = val;
    doSaveAssignment(bookingId, field, val, selectEl);
    return;
  }

  doSaveAssignment(bookingId, field, value, selectEl);
}

function doSaveAssignment(bookingId, field, value, selectEl) {
  if (!ovAssignments[bookingId]) ovAssignments[bookingId] = {};
  ovAssignments[bookingId][field] = value;
  saveAssignments(selectEl);
}

function saveAssignments(flashEl) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      const url = `${WORKER}/api/runsheet-assignments?date=${rsDate}`;
      await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Access-Code': accessCode },
        body: JSON.stringify(ovAssignments)
      });
      cache[`/api/runsheet-assignments?date=${rsDate}`] = JSON.parse(JSON.stringify(ovAssignments));
      if (flashEl) {
        flashEl.style.borderColor = '#22c55e';
        setTimeout(() => { flashEl.style.borderColor = ''; }, 800);
      }
    } catch (e) {
      console.error('Save failed:', e);
      if (flashEl) {
        flashEl.style.borderColor = '#ef4444';
        setTimeout(() => { flashEl.style.borderColor = ''; }, 800);
      }
    }
  }, 300);
}

// ── Booking detail overlay ─────────────────────────────────────────────────
function showBookingOverlay(bid) {

  const fmtE = v => '€' + (v || 0).toLocaleString('nl-NL', {minimumFractionDigits:2, maximumFractionDigits:2});
  const isPaid = b.paymentStatus === 'paid';
  const amountPaid = (b.total || 0) - (b.amountOwing || 0);

    const et = a.endTime ? (a.endTime.length <= 5 ? a.endTime : a.endTime.substring(11,16)) : '';
    actRows += `<tr><td>${a.mainActivity || '—'}</td><td>${a.subtype || '—'}</td><td>${st}${et ? '–'+et : ''}</td><td>${a.quantity || '—'}</td><td>${locs}</td></tr>`;
  }

  const notes = [b.bookingNotes, b.posNotes].filter(Boolean).join(' · ');

  const html = `
    <div class="ov-overlay" onclick="if(event.target===this)closeBookingOverlay()">
      <div class="ov-overlay-card">
        <div class="ov-overlay-header">
          <h3>${b.name || '—'}</h3>
          <button class="ov-overlay-close" onclick="closeBookingOverlay()">✕</button>
        </div>
        <div class="ov-overlay-body">
          <div class="ov-info-row"><span class="ov-info-label">Contact</span><span>${b.contactName || '—'}</span></div>
          <div class="ov-info-row"><span class="ov-info-label">Telefoon</span><span>${b.contactPhone || '—'}</span></div>
          <div class="ov-info-row"><span class="ov-info-label">E-mail</span><span>${b.contactEmail || '—'}</span></div>
          <div class="ov-info-row"><span class="ov-info-label">Boekingsnummer</span><span>#${bid}</span></div>
          <div class="ov-info-row"><span class="ov-info-label">Betaald</span><span>${fmtE(amountPaid)}</span></div>
          <div class="ov-info-row"><span class="ov-info-label">Openstaand</span><span style="color:${isPaid ? '#22c55e' : '#f59e0b'};font-weight:600;">${isPaid ? '—' : fmtE(b.amountOwing)}</span></div>
          <div class="ov-info-row"><span class="ov-info-label">Totaal</span><span style="font-weight:600;">${fmtE(b.total)}</span></div>
          ${actRows ? `
          <table class="ov-act-table">
            <tr><th>Activiteit</th><th>Type</th><th>Tijd</th><th>Pax</th><th>Locatie</th></tr>
            ${actRows}
          </table>` : ''}
          ${notes ? `<div class="ov-notes"><div class="ov-notes-label">Opmerkingen</div>${notes}</div>` : ''}
        </div>
      </div>
    </div>`;

  // Remove existing overlay if any
  closeBookingOverlay();
  const div = document.createElement('div');
  div.id = 'booking-overlay-wrapper';
  div.innerHTML = html;
  document.body.appendChild(div);
}

function closeBookingOverlay() {
  const el = document.getElementById('booking-overlay-wrapper');
  if (el) el.remove();
}

async function downloadRunsheetPDF(date) {
  const { jsPDF } = window.jspdf;
  const data = lastRunsheetData;
  if (!data) { alert('Geen data geladen'); return; }

  const fmtE = v => '\u20AC' + (v || 0).toLocaleString('nl-NL', {minimumFractionDigits:2, maximumFractionDigits:2});
  const shortN = n => { if (!n) return ''; const p = n.trim().split(/\s+/); return p.length <= 1 ? n : p[0] + ' ' + p[p.length-1][0] + '.'; };
  const allKF = data.kf || [];
  const allFF = data.ff || [];
  const allBF = data.bf || [];

  // Load saved assignments for PDF
  let pdfAssignments = ovAssignments;
  if (!pdfAssignments || !Object.keys(pdfAssignments).length) {
    try {
      const r = await fetch(`${WORKER}/api/runsheet-assignments?date=${date}`, { headers: { 'X-Access-Code': accessCode } });
      pdfAssignments = await r.json();
      if (pdfAssignments.error) pdfAssignments = {};
    } catch(e) { pdfAssignments = {}; }
  }

  // Helper: first activity start time
  function firstTime(b) {
    const acts = b.activities || [];
    if (!acts.length) return '';
    // Find earliest startTime across all activities
    // startTime can be "14:00" (short) or full ISO string
    let earliestStr = null;
    let earliestMin = Infinity;
    for (const a of acts) {
      if (!a.startTime) continue;
      const st = a.startTime;
      let hh, mm;
      if (st.length <= 5) {
        // "14:00"
        [hh, mm] = st.split(':').map(Number);
      } else {
        // ISO: extract HH:MM from position 11
        hh = parseInt(st.substring(11, 13));
        mm = parseInt(st.substring(14, 16));
      }
      const totalMin = hh * 60 + mm;
      if (totalMin < earliestMin) {
        earliestMin = totalMin;
        earliestStr = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
      }
    }
    return earliestStr || '';
  }

  // Helper: PAX = highest quantity across all activities
  function getPax(b) {
    const acts = b.activities || [];
    if (!acts.length) return '';
    let max = 0;
    for (const a of acts) { if ((a.quantity || 0) > max) max = a.quantity; }
    return max > 0 ? String(max) : '';
  }

  // Helper: has limo (subtype contains 'drank')
  function hasLimo(b) {
    return (b.activities || []).some(a =>
      (a.subtype || '').toLowerCase().includes('drank') ||
      (a.mainActivity || '').toLowerCase().includes('drank')
    );
  }

  // Helper: get tafels display string from assignment
  function getTafelsStr(assign) {
    if (!assign) return '';
    const arr = Array.isArray(assign.tafels) ? assign.tafels : (assign.tafel ? [assign.tafel] : []);
    return arr.map(t => t.replace(/^Tafel\s*/i, '')).join(', ');
  }

  // Color constants
  const kfRgb = [99, 102, 241];   // indigo
  const ffRgb = [107, 33, 168];   // purple
  const bfRgb = [234, 88, 12];    // orange
  const leftM = 10;

  // ═══════════════════════════════════════════════════════════════════════════
  // PAGE 1: FRONTPAGE — Landscape overview
  // ═══════════════════════════════════════════════════════════════════════════
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const lpw = 277; // landscape page width (297 - 2×10)

  // Track frontpage pages for numbering
  const frontpagePages = [];

  function drawFrontpageHeader() {
    doc.setFontSize(18); doc.setFont(undefined, 'bold'); doc.setTextColor(0,0,0);
    doc.text('Run Sheet - Overzicht', leftM, 15);
    doc.setFontSize(11); doc.setFont(undefined, 'normal');
    doc.text(fmtDateLong(date), leftM, 22);
    return 32;
  }

  drawFrontpageHeader();
  frontpagePages.push(doc.internal.getNumberOfPages());
  let fy = 32;

  // Sort bookings by earliest start time
  function sortByTime(arr) {
    return arr.slice().sort((a, b) => {
      const ta = firstTime(a) || '99:99';
      const tb = firstTime(b) || '99:99';
      return ta.localeCompare(tb);
    });
  }
  const sortedKF = sortByTime(allKF);
  const sortedBF = sortByTime(allBF);

  function buildOverviewRows(bookings) {
    return bookings.map(b => {
      const bid = String(b.id || b.bookingReference || '');
      const assign = pdfAssignments[bid] || {};
      const isPaid = b.paymentStatus === 'paid' || (b.amountOwing || 0) <= 0;
      const amtPaid = (b.total || 0) - (b.amountOwing || 0);
      const payStr = isPaid
        ? 'BETAALD'
        : 'Betaald: ' + fmtE(amtPaid) + '\nOpenstaand: ' + fmtE(b.amountOwing);
      return [
        b.name || '',
        b.contactName || '',
        b.contactPhone || '',
        '#' + (bid || ''),
        getPax(b),
        getTafelsStr(assign),
        shortN(assign.begeleider || ''),
        firstTime(b),
        { content: payStr, styles: { textColor: isPaid ? [21, 87, 36] : [180, 60, 0] } }
      ];
    });
  }

  const fpColStyles = {
    0: { cellWidth: 46 },
    1: { cellWidth: 34 },
    2: { cellWidth: 30 },
    3: { cellWidth: 22 },
    4: { cellWidth: 14 },
    5: { cellWidth: 22 },
    6: { cellWidth: 28 },
    7: { cellWidth: 20 },
    8: { cellWidth: lpw - 46 - 34 - 30 - 22 - 14 - 22 - 28 - 20 }
  };

  function drawSectionBarFP(label, rgb, atY) {
    doc.setFontSize(10); doc.setFont(undefined, 'bold');
    doc.setFillColor(rgb[0], rgb[1], rgb[2]);
    doc.setTextColor(255,255,255);
    doc.roundedRect(leftM, atY - 4, lpw, 7, 1, 1, 'F');
    doc.text(label, leftM + 2, atY + 1);
    doc.setTextColor(0,0,0);
    return atY + 9;
  }

  const fpHead = [['Reserveringsnaam', 'Contactnaam', 'Telefoon', 'Boeking ID', 'Pax', 'Tafel', 'Begeleider', 'Begintijd', 'Betaald / Openstaand']];
  const fpTableOpts = {
    margin: { left: leftM, right: leftM, top: 42 },
    tableWidth: lpw,
    theme: 'grid',
    headStyles: { fillColor: [60,60,60], textColor: [255,255,255], fontStyle: 'bold', fontSize: 8 },
    styles: { fontSize: 8, cellPadding: 2, textColor: [30,30,30], lineWidth: 0.3, lineColor: [190,190,190] },
    head: fpHead,
    columnStyles: fpColStyles
  };

  // Draw KF section
  if (sortedKF.length) {
    const kfLabel = 'Kinderfeestjes (KF) \u2014 ' + (sortedKF.length === 1 ? '1 boeking' : sortedKF.length + ' boekingen');
    fy = drawSectionBarFP(kfLabel, kfRgb, fy);

    doc.autoTable(Object.assign({}, fpTableOpts, {
      startY: fy,
      body: buildOverviewRows(sortedKF),
      didDrawPage: function(d) {
        const pg = doc.internal.getNumberOfPages();
        if (frontpagePages.indexOf(pg) === -1) frontpagePages.push(pg);
        if (d.pageNumber > 1) {
          drawFrontpageHeader();
          drawSectionBarFP(kfLabel, kfRgb, 32);
        }
      }
    }));
    fy = doc.lastAutoTable.finalY + 12;
  }

  // Draw FF section
  const sortedFF = sortByTime(allFF);
  if (sortedFF.length) {
    if (fy + 25 > 200) {
      doc.addPage('a4', 'landscape');
      frontpagePages.push(doc.internal.getNumberOfPages());
      drawFrontpageHeader();
      fy = 32;
    }
    const ffLabel = 'Familie Feesten (FF) \u2014 ' + (sortedFF.length === 1 ? '1 boeking' : sortedFF.length + ' boekingen');
    fy = drawSectionBarFP(ffLabel, ffRgb, fy);

    doc.autoTable(Object.assign({}, fpTableOpts, {
      startY: fy,
      body: buildOverviewRows(sortedFF),
      didDrawPage: function(d) {
        const pg = doc.internal.getNumberOfPages();
        if (frontpagePages.indexOf(pg) === -1) frontpagePages.push(pg);
        if (d.pageNumber > 1) {
          drawFrontpageHeader();
          drawSectionBarFP(ffLabel, ffRgb, 32);
        }
      }
    }));
    fy = doc.lastAutoTable.finalY + 12;
  }

  // Draw BF section
  if (sortedBF.length) {
    if (fy + 25 > 200) {
      doc.addPage('a4', 'landscape');
      frontpagePages.push(doc.internal.getNumberOfPages());
      drawFrontpageHeader();
      fy = 32;
    }
    const bfLabel = 'Bedrijfsfeesten (BF) \u2014 ' + (sortedBF.length === 1 ? '1 boeking' : sortedBF.length + ' boekingen');
    fy = drawSectionBarFP(bfLabel, bfRgb, fy);

    doc.autoTable(Object.assign({}, fpTableOpts, {
      startY: fy,
      body: buildOverviewRows(sortedBF),
      didDrawPage: function(d) {
        const pg = doc.internal.getNumberOfPages();
        if (frontpagePages.indexOf(pg) === -1) frontpagePages.push(pg);
        if (d.pageNumber > 1) {
          drawFrontpageHeader();
          drawSectionBarFP(bfLabel, bfRgb, 32);
        }
      }
    }));
  }


  // ═══════════════════════════════════════════════════════════════════════════
  // DETAIL PAGES — Portrait, per booking
  // ═══════════════════════════════════════════════════════════════════════════
  const ppw = 190; // portrait page width
  let y = 15;
  let currentSection = '';
  let currentSectionRgb = kfRgb;

  function drawPageHeader(showSection) {
    doc.setFontSize(18); doc.setFont(undefined, 'bold'); doc.setTextColor(0,0,0);
    doc.text('Run Sheet - Details', leftM, 15);
    doc.setFontSize(11); doc.setFont(undefined, 'normal');
    doc.text(fmtDateLong(date), leftM, 22);
    let startY = 32;
    if (showSection && currentSection) startY = drawSectionBar(startY);
    return startY;
  }

  function drawSectionBar(atY) {
    doc.setFontSize(10); doc.setFont(undefined, 'bold');
    doc.setFillColor(currentSectionRgb[0], currentSectionRgb[1], currentSectionRgb[2]);
    doc.setTextColor(255,255,255);
    doc.roundedRect(leftM, atY - 4, ppw, 7, 1, 1, 'F');
    doc.text(currentSection, leftM + 2, atY + 1);
    doc.setTextColor(0,0,0);
    return atY + 8;
  }

  function drawBookingNameBar(name, atY) {
    doc.setFontSize(10); doc.setFont(undefined, 'bold');
    doc.setFillColor(currentSectionRgb[0], currentSectionRgb[1], currentSectionRgb[2]);
    doc.setTextColor(255,255,255);
    doc.roundedRect(leftM, atY - 2, ppw, 7, 1, 1, 'F');
    doc.text(name, leftM + 2, atY + 3);
    doc.setTextColor(0,0,0);
    return atY + 8;
  }

  // ── Detail pages — generated from data (works from any tab) ──
  function renderDetailSection(bookings, sectionLabel, isBF, sectionRgb) {
    if (!bookings || bookings.length === 0) return;
    currentSectionRgb = sectionRgb;
    currentSection = sectionLabel;

    if (!isBF) {
      doc.addPage('a4', 'portrait');
      y = drawPageHeader(false);
      y = drawSectionBar(y);
    }

    sortByTime(bookings).forEach(b => {
      if (isBF) {
        doc.addPage('a4', 'portrait');
        y = drawPageHeader(false);
        y = drawSectionBar(y);
      }

      const bid = String(b.id || b.bookingReference || '');
      const bkAssign = pdfAssignments[bid] || {};
      const bName = (b.name || '').replace(/[^\x20-\x7E\u00C0-\u024F\s]/g, '').trim();
      const bookingId = '#' + bid;

      // Contact info
      const cParts = [b.contactName, b.contactPhone, b.contactEmail].filter(Boolean);
      let infoLines = cParts.join('\n');
      infoLines += (infoLines ? '\n' : '') + bookingId;

      // Activities table
      const colHeaders = ['Activiteit', 'Subtype', 'Begintijd', 'Personen', 'Locatie'];
      const tableBody = (b.activities || []).map(a => [
        a.mainActivity || a.name || '',
        a.subtype || '',
        (a.startTime || '').substring(0, 5),
        String(a.quantity || ''),
        (a.locations || []).join(', ') || '—'
      ]);

      // Payment badge
      const totalPaid = (b.payments || []).reduce((s, p) => s + (p.amount || 0), 0);
      const totalPrice = b.totalPrice || 0;
      const openAmt = Math.max(0, totalPrice - totalPaid);
      const isPaid = openAmt <= 0;
      const badgePdf = isPaid ? 'BETAALD' : ('Open: ' + fmtE(openAmt));

      // Pax + begintijd
      const detailPax = getPax(b);
      const detailTime = firstTime(b);

      // Notes
      const noteText = [b.bookingNotes, b.posNotes].filter(Boolean).join(' · ').trim();

      // Page break check for KF
      if (!isBF) {
        const estH = 30 + tableBody.length * 8 + (noteText ? 14 : 0);
        if (y + estH > 280) { doc.addPage('a4', 'portrait'); y = drawPageHeader(true); }
      }

      const padL = 5;
      y = drawBookingNameBar(bName, y);

      // Build right-cell content: begintijd + pax stacked
      let rightCell = '';
      if (detailTime) rightCell += 'Begintijd: ' + detailTime;
      if (detailPax) rightCell += (rightCell ? '\n' : '') + 'Pax: ' + detailPax;

      doc.autoTable({
        startY: y,
        margin: { left: leftM, right: leftM },
        tableWidth: ppw,
        theme: 'plain',
        styles: { lineWidth: 0.3, lineColor: [190,190,190], cellPadding: { top: 2, bottom: 2, left: padL, right: 3 }, fontSize: 8, textColor: [30,30,30] },
        head: [],
        body: (function() {
          const rows = [];
          // Info row — contact left | begintijd+pax right | badge | tafel
          rows.push([
            { content: infoLines, styles: { fontSize: 8, textColor: [100,100,100], cellPadding: { top: 4, bottom: 3, left: padL, right: 2 } } },
            { content: rightCell, styles: { fontStyle: 'bold', fontSize: 10, textColor: [60,60,60], cellPadding: { top: 4, bottom: 3, left: padL, right: 2 } } },
            { content: badgePdf, styles: { fontStyle: 'bold', fontSize: 7, halign: 'center', valign: 'middle', textColor: isPaid ? [21,87,36] : [133,100,0], fillColor: isPaid ? [212,237,218] : [255,243,205], cellPadding: { top: 4, bottom: 3, left: 3, right: 3 } } },
            { content: 'Tafel: ' + getTafelsStr(bkAssign) + '\nBegeleider: ' + shortN(bkAssign.begeleider || '—'), colSpan: 2, styles: { fontStyle: 'bold', fontSize: 10, halign: 'left', valign: 'middle', cellPadding: { top: 4, bottom: 3, left: padL, right: 2 } } },
          ]);
          // Column headers
          const hdrRow = [];
          for (let i = 0; i < 5; i++) {
            hdrRow.push({ content: (colHeaders[i] || '').toUpperCase(), styles: { fontStyle: 'bold', fontSize: 7, textColor: [0,0,0], cellPadding: { top: 2, bottom: 1, left: padL, right: 1 } } });
          }
          rows.push(hdrRow);
          // Data rows
          tableBody.forEach(cells => {
            const row = [];
            for (let i = 0; i < 5; i++) {
              row.push({ content: cells[i] || '', styles: { fontSize: 7.5, cellPadding: { top: 1, bottom: 1, left: padL, right: 1 } } });
            }
            rows.push(row);
          });
          // Notes
          if (noteText) {
            rows.push([
              { content: 'Opmerkingen: ' + noteText, colSpan: 5, styles: { fontSize: 7.5, textColor: [60,60,60], cellPadding: { top: 2, bottom: 4, left: padL, right: 3 } } }
            ]);
          }
          return rows;
        })(),
        columnStyles: {
          0: { cellWidth: 52 },
          1: { cellWidth: 48 },
          2: { cellWidth: 28 },
          3: { cellWidth: 22 },
          4: { cellWidth: 40 },
        },
        tableLineWidth: 0.3,
        tableLineColor: [190,190,190],
        didDrawPage: function(d) {
          if (d.pageNumber > 1) { y = drawPageHeader(true); }
        }
      });

      y = doc.lastAutoTable.finalY + 4;
    });
  }

  // Generate KF detail pages
  const kfLabel = allKF.length === 1 ? 'Kinderfeestje (1 boeking)' : 'Kinderfeestjes (' + allKF.length + ' boekingen)';
  renderDetailSection(allKF, kfLabel, false, kfRgb);

  // Generate FF detail pages
  const ffLabel = allFF.length === 1 ? 'Familie Feest (1 boeking)' : 'Familie Feesten (' + allFF.length + ' boekingen)';
  renderDetailSection(allFF, ffLabel, false, ffRgb);

  // Generate BF detail pages
  const bfLabel = allBF.length === 1 ? 'Bedrijfsfeest (1 boeking)' : 'Bedrijfsfeesten (' + allBF.length + ' boekingen)';
  renderDetailSection(allBF, bfLabel, true, bfRgb);

  // ═══════════════════════════════════════════════════════════════════════════
  // LAST PAGE: AFTEKENLIJST — Landscape, KF only
  // ═══════════════════════════════════════════════════════════════════════════
  if (allKF.length > 0) {
    doc.addPage('a4', 'landscape');

    const aftPages = [];
    const ckLabel = allKF.length === 1 ? '1 boeking' : allKF.length + ' boekingen';
    const aftHeaderText = 'Kinderfeestjes (KF) \u2014 ' + ckLabel;

    function drawAftHeader() {
      doc.setFontSize(18); doc.setFont(undefined, 'bold'); doc.setTextColor(0,0,0);
      doc.text('Run Sheet - Aftekenlijst', leftM, 15);
      doc.setFontSize(11); doc.setFont(undefined, 'normal');
      doc.text(fmtDateLong(date), leftM, 22);
      // Section bar
      doc.setFontSize(10); doc.setFont(undefined, 'bold');
      doc.setFillColor(kfRgb[0], kfRgb[1], kfRgb[2]);
      doc.setTextColor(255,255,255);
      doc.roundedRect(leftM, 28, lpw, 7, 1, 1, 'F');
      doc.text(aftHeaderText, leftM + 2, 33);
      doc.setTextColor(0,0,0);
    }

    drawAftHeader();
    aftPages.push(doc.internal.getNumberOfPages());

    const checkRows = sortByTime(allKF).map(b => {
      const bid = String(b.id || b.bookingReference || '');
      const ca = pdfAssignments[bid] || {};
      return [
        b.name || '',
        getPax(b),          // PAX
        getTafelsStr(ca),     // Tafel
        shortN(ca.begeleider || ''),  // Begeleider
        firstTime(b),       // Aankomsttijd
        hasLimo(b) ? 'Ja' : 'Nee',  // Limo
        '',                 // Eten & Tijd
        '',                 // Taart & Tijd
        '',                 // Gezongen
        '',                 // Gegeten
        ''                  // Bijzonderheden
      ];
    });

    doc.autoTable({
      startY: 37,
      margin: { left: leftM, right: leftM, top: 37 },
      tableWidth: lpw,
      theme: 'grid',
      headStyles: { fillColor: kfRgb, textColor: [255,255,255], fontStyle: 'bold', fontSize: 8 },
      styles: { fontSize: 8, cellPadding: 3, textColor: [30,30,30], lineWidth: 0.3, lineColor: [190,190,190], minCellHeight: 10 },
      head: [['Boekingsnaam', 'Pax', 'Tafel', 'Begeleider', 'Aankomst', 'Limo', 'Eten & Tijd', 'Taart & Tijd', 'Gezongen', 'Gegeten', 'Bijzonderheden']],
      body: checkRows,
      columnStyles: {
        0: { cellWidth: 42 },
        1: { cellWidth: 12 },
        2: { cellWidth: 18 },
        3: { cellWidth: 28 },
        4: { cellWidth: 18 },
        5: { cellWidth: 14 },
        6: { cellWidth: 26 },
        7: { cellWidth: 26 },
        8: { cellWidth: 20 },
        9: { cellWidth: 20 },
        10: { cellWidth: lpw - 42 - 12 - 18 - 28 - 18 - 14 - 26 - 26 - 20 - 20 }
      },
      didDrawPage: function(d) {
        const pg = doc.internal.getNumberOfPages();
        if (aftPages.indexOf(pg) === -1) aftPages.push(pg);
        if (d.pageNumber > 1) {
          drawAftHeader();
        }
      }
    });

    // Add page numbers to aftekenlijst pages
    const aftTotal = aftPages.length;
    if (aftTotal > 1) {
      aftPages.forEach((pg, idx) => {
        doc.setPage(pg);
        doc.setFontSize(9); doc.setFont(undefined, 'normal'); doc.setTextColor(120,120,120);
        doc.text((idx + 1) + '/' + aftTotal, 297 - leftM, 10, { align: 'right' });
      });
    }
  }

  // Add page numbers to frontpage pages (only if >1 page)
  const fpTotal = frontpagePages.length;
  if (fpTotal > 1) {
    frontpagePages.forEach((pg, idx) => {
      doc.setPage(pg);
      doc.setFontSize(9); doc.setFont(undefined, 'normal'); doc.setTextColor(120,120,120);
      doc.text((idx + 1) + '/' + fpTotal, 297 - leftM, 10, { align: 'right' });
    });
  }

  // Print timestamp footer on every page
  const now = new Date();
  const pad2 = n => String(n).padStart(2, '0');
  const printStamp = 'Geprint op: ' + now.getFullYear() + '/' + pad2(now.getMonth() + 1) + '/' + pad2(now.getDate()) + ' ' + pad2(now.getHours()) + ':' + pad2(now.getMinutes());
  const totalPages = doc.internal.getNumberOfPages();
  for (let p = 1; p <= totalPages; p++) {
    doc.setPage(p);
    const pgW = doc.internal.pageSize.getWidth();
    const pgH = doc.internal.pageSize.getHeight();
    doc.setFontSize(8); doc.setFont(undefined, 'normal'); doc.setTextColor(150,150,150);
    doc.text(printStamp, pgW - leftM, pgH - 5, { align: 'right' });
  }

  doc.save(`RunSheet-${date}.pdf`);
}



// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  if (!accessCode) return;
  if (activeTab === 'overzicht') renderOverview(false);
  else renderRunsheet(false);
}

// ── Start ─────────────────────────────────────────────────────────────────────
document.getElementById('lang-select').value = lang;
if (accessCode) render();

applyViewMode();
</script>
