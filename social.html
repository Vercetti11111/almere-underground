<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Social Stats — Almere Underground</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #9ca3af;
    --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    --tt-cyan: #00f2ea;
    --tt-pink: #ff0050;
    --google-gold: #fbbc04;
    --fb-blue: #1877f2;
    --yt-red: #ff0000;
    --tp-green: #00b67a;
    --ta-green: #34e0a1;
    --dw-orange: #ff8c00;
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }
  .header {
    padding: 0;
    max-width: 600px;
    margin: 0 auto;
  }

  .section-title {
    max-width: 600px;
    margin: 20px auto 10px;
    font-size: 1.1rem;
    font-weight: 700;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    max-width: 600px;
    margin: 0 auto 8px;
  }
  @media (min-width: 768px) {
    .cards { grid-template-columns: 1fr 1fr; }
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .card.instagram::before { background: var(--ig-gradient); }
  .card.tiktok::before { background: linear-gradient(90deg, var(--tt-cyan), var(--tt-pink)); }
  .card.google::before { background: var(--google-gold); }
  .card.facebook::before { background: var(--fb-blue); }
  .card.youtube::before { background: var(--yt-red); }
  .card.trustpilot::before { background: var(--tp-green); }
  .card.tripadvisor::before { background: var(--ta-green); }
  .card.dagjeweg::before { background: var(--dw-orange); }
  .card.lasermaxx::before { background: #e60012; }
  .card.roller-gx::before { background: #6366f1; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .card-icon { font-size: 1.5rem; }
  .card-title { font-size: 0.9rem; font-weight: 600; }
  .card-title small {
    display: block;
    color: var(--muted);
    font-size: 0.7rem;
    font-weight: 400;
  }
  .main-metric {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 8px;
  }
  .main-value {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .main-label {
    color: var(--muted);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .secondary-metric {
    color: var(--muted);
    font-size: 0.78rem;
    margin-bottom: 10px;
  }
  .secondary-metric span { color: var(--text); font-weight: 600; }
  .stars { color: var(--google-gold); font-size: 0.8rem; }
  .stars-tp { color: var(--tp-green); font-size: 0.8rem; }
  .stars-ta { color: var(--ta-green); font-size: 0.8rem; }
  .stars-dw { color: var(--dw-orange); font-size: 0.8rem; }

  .growth-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    padding: 8px 4px;
  }
  .growth-item {
    text-align: center;
  }
  .growth-label {
    color: var(--muted);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 2px;
  }
  .growth-val {
    font-size: 0.8rem;
    font-weight: 600;
  }
  .growth-val.up { color: var(--green); }
  .growth-val.down { color: var(--red); }
  .growth-val.neutral { color: var(--muted); }

  .chart-container {
    max-width: 600px;
    margin: 12px auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .chart-title { font-size: 0.95rem; font-weight: 600; }
  .period-btns { display: flex; gap: 4px; }
  .period-btn {
    background: var(--border);
    border: none;
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 0.72rem;
    cursor: pointer;
  }
  .period-btn.active { background: #3b82f6; color: white; }
  canvas { width: 100% !important; height: 200px !important; }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .loading .spinner {
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .last-update {
    text-align: center;
    color: var(--muted);
    font-size: 0.72rem;
    margin-top: 16px;
  }
  .back-link {
    display: block;
    text-align: center;
    color: #3b82f6;
    text-decoration: none;
    font-size: 0.85rem;
    margin-top: 12px;
    padding: 8px;
  }

    /* ── Desktop / View Mode ────────────────────────── */
    /* Desktop (auto ≥900px) */
    @media (min-width: 900px) {
      .cards { max-width:1920px; grid-template-columns: repeat(4, 1fr); }
      .section-title, .header, .chart-container, .google-insights-card { max-width:1920px; }
    }
    /* Forced desktop */
    body.force-desktop .cards { max-width:1920px; grid-template-columns: repeat(4, 1fr); }
    body.force-desktop .section-title,
    body.force-desktop .header,
    body.force-desktop .chart-container,
    body.force-desktop .google-insights-card { max-width:1920px; margin-left:auto; margin-right:auto; }

    /* Forced mobile */
    body.force-mobile .cards { max-width:400px !important; grid-template-columns: 1fr !important; }
    body.force-mobile .section-title,
    body.force-mobile .chart-container,
    body.force-mobile .header,
    body.force-mobile .google-insights-card { max-width:400px !important; }

    /* View toggle */
    .view-toggle { background:#1a1a24; border:1px solid #2a2a38; color:#aaa; border-radius:8px; padding:5px 8px; font-size:13px; cursor:pointer; }
    .view-toggle:hover { border-color:#7c3aed; color:#e0e0f0; }


  .card-link {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 6px;
    background: rgba(255,255,255,0.06); color: #888;
    text-decoration: none; font-size: 12px; margin-left: auto;
    transition: all 0.2s;
  }
  .card-link:hover { background: rgba(255,255,255,0.15); color: #fff; }
  /* Google Reviews Insights (wide card) */
  .google-insights-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 20px;
    max-width: 1920px;
    margin-left: auto;
    margin-right: auto;
  }
  .insights-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .insights-icon { font-size: 22px; }
  .insights-title { font-size: 16px; font-weight: 700; color: #fff; }
  .insights-body {
    display: flex; gap: 24px; align-items: flex-start;
  }
  .insights-col { flex: 1; min-width: 0; }
  .insights-divider {
    width: 1px; background: rgba(255,255,255,0.08); align-self: stretch; min-height: 60px; flex-shrink: 0;
  }
  .unanswered-col { max-width: 220px; flex: 0 0 220px; }
  .insights-label {
    font-size: 11px; color: #aaa; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .insights-big { font-size: 36px; font-weight: 800; line-height: 1.1; }
  .insights-sub { font-size: 12px; color: #888; margin-top: 4px; }
  .insights-bar {
    margin-top: 8px; height: 6px; background: rgba(255,255,255,0.06);
    border-radius: 3px; overflow: hidden;
  }
  .insights-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .sentiment-section { margin-top: 4px; }
  .sentiment-row-label { font-size: 12px; color: #999; font-weight: 600; margin-bottom: 4px; }
  .sentiment-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .sentiment-tag { font-size: 12px; padding: 5px 12px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .sentiment-tag.pos { background: rgba(34,197,94,0.15); color: #22c55e; }
  .sentiment-tag.neg { background: rgba(239,68,68,0.15); color: #ef4444; }
  .insights-neg-detail { margin-top: 0; }
  .neg-reviews-toggle {
    margin-top: 14px; font-size: 13px; color: #f59e0b; cursor: pointer;
    font-weight: 600; padding: 8px 0;
  }
  .neg-reviews-list { display: none; margin-top: 8px; }
  .neg-reviews-list.open { display: block; }
  .neg-review-item {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px; padding: 12px 16px; margin-bottom: 8px;
  }
  .neg-review-header { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; font-size: 13px; }
  .neg-review-text { color: #ccc; margin-top: 6px; font-size: 12px; line-height: 1.6; }
  .replied-badge { font-size: 11px; color: #22c55e; margin-left: 6px; font-weight: 600; }
  .unreplied-badge { font-size: 11px; color: #ef4444; margin-left: 6px; font-weight: 600; }

  .star-dist { margin-top: 12px; }
  .star-dist-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .star-dist-label { font-size: 12px; color: #aaa; width: 16px; text-align: right; font-weight: 600; }
  .star-dist-bar-bg { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
  .star-dist-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .star-dist-count { font-size: 11px; color: #888; width: 28px; text-align: right; }
  @media (max-width: 899px) {
    .google-insights-card { max-width: 600px; }
  }
  /* Mobile: stack columns */
  @media (max-width: 768px) {
    .insights-body { flex-direction: column; gap: 16px; }
    .unanswered-col { max-width: 100%; flex: 1; }
    .insights-divider { width: 100%; height: 1px; min-height: 0; }
  }
  </style>
</head>
<body>

  <div class="header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <div>
      <a href="index.html" style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;text-decoration:none;">← Almere Underground</a>
      <div style="font-size:20px;font-weight:800;">📊 Social Stats</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <select id="lang-select" onchange="setLang(this.value)" title="Language / Taal">
        <option value="nl">🇳🇱 NL</option>
        <option value="en">🇬🇧 EN</option>
      </select>
      <button id="view-toggle-btn" class="view-toggle" onclick="toggleViewMode()" title="Wissel weergave">🖥️</button>
      <button id="refresh-btn" onclick="loadData()" style="background:#1a1a24;border:1px solid #2a2a38;color:#aaa;border-radius:8px;padding:6px 10px;font-size:16px;cursor:pointer;line-height:1;" title="Data verversen">🔄</button>
    </div>
  </div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div>Data laden...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>

// ── View Mode Toggle ─────────────────────────────────────────────────────────
function setLang(l) { /* Social Stats is NL-only for now */ }

function getViewMode() { return localStorage.getItem('au_view_mode') || 'auto'; }
function applyViewMode() {
  const mode = getViewMode();
  document.body.classList.remove('desktop-mode','force-desktop','force-mobile');
  if (mode === 'desktop') document.body.classList.add('force-desktop');
  else if (mode === 'mobile') document.body.classList.add('force-mobile');
  else if (window.innerWidth >= 768) document.body.classList.add('desktop-mode');
  const btn = document.getElementById('view-toggle-btn');
  if (btn) btn.textContent = mode === 'desktop' ? '📱' : mode === 'mobile' ? '🖥️' : (window.innerWidth >= 768 ? '📱' : '🖥️');
  if (btn) btn.title = {auto:'Automatisch — klik om te wisselen', desktop:'Desktop geforceerd', mobile:'Mobiel geforceerd'}[mode];
}
function toggleViewMode() {
  const modes = ['auto','desktop','mobile'];
  const cur = getViewMode();
  const next = modes[(modes.indexOf(cur)+1)%3];
  localStorage.setItem('au_view_mode', next);
  applyViewMode();
}
function isWideView() {
  const m = getViewMode();
  return m === 'desktop' || (m === 'auto' && window.innerWidth >= 768);
}
window.addEventListener('resize', applyViewMode);
applyViewMode();


const API = 'https://api.almereunderground.com';

function renderGoogleInsights() {
  const gd = window._googleReviewData;
  if (!gd) return;
  const card = document.getElementById('googleInsightsCard');
  card.style.display = '';

  const unanswered = gd.unanswered_count || 0;
  const total = gd.total_reviews || 0;
  const answered = total - unanswered;
  const pct = total ? Math.round(answered / total * 100) : 0;
  const uColor = unanswered > 20 ? '#ef4444' : unanswered > 5 ? '#f59e0b' : '#22c55e';

  // Star distribution
  const dist = gd.star_distribution || {};
  const maxCount = Math.max(...Object.values(dist), 1);
  const starColors = {5:'#22c55e',4:'#84cc16',3:'#eab308',2:'#f97316',1:'#ef4444'};
  let starHtml = '<div class="star-dist">';
  for (let s = 5; s >= 1; s--) {
    const cnt = dist[s] || 0;
    const w = maxCount ? Math.round(cnt / maxCount * 100) : 0;
    starHtml += `<div class="star-dist-row">
      <span class="star-dist-label">${s}★</span>
      <div class="star-dist-bar-bg"><div class="star-dist-bar" style="width:${w}%;background:${starColors[s]};"></div></div>
      <span class="star-dist-count">${cnt}</span>
    </div>`;
  }
  starHtml += '</div>';

  // Unanswered column
  document.getElementById('insightsUnanswered').innerHTML = `
    <div class="insights-label">📩 Onbeantwoorde reviews <span style="font-size:10px;color:#888;">(laatste 2 maanden)</span></div>
    <div class="insights-big" style="color:${uColor};">${unanswered}</div>
    <div class="insights-sub">van ${total} reviews · ${pct}% beantwoord${gd.unanswered_total ? ' (totaal ' + gd.unanswered_total + ' onbeantwoord)' : ''}</div>
    <div class="insights-bar"><div class="insights-bar-fill" style="width:${pct}%;background:${uColor};"></div></div>
    <div class="insights-label" style="margin-top:14px;">📊 Sterren verdeling</div>
    ${starHtml}
  `;

  // Sentiment column
  const posThemes = (gd.positive_themes || []).slice(0, 5);
  const negThemes = (gd.negative_themes || []).slice(0, 5);
  const posHtml = posThemes.map(t => `<span class="sentiment-tag pos">👍 ${t.theme} (${t.count})</span>`).join('');
  const negHtml = negThemes.map(t => `<span class="sentiment-tag neg">👎 ${t.theme} (${t.count})</span>`).join('');
  document.getElementById('insightsSentiment').innerHTML = `
    <div class="insights-label">💬 Sentiment (afgelopen 3 maanden)</div>
    <div class="sentiment-section">
      <div class="sentiment-row-label">Goed:</div>
      <div class="sentiment-tags">${posHtml || '<span style="color:#888;font-size:12px;">—</span>'}</div>
    </div>
    <div class="sentiment-section" style="margin-top:8px;">
      <div class="sentiment-row-label">Verbeterpunten:</div>
      <div class="sentiment-tags">${negHtml || '<span style="color:#888;font-size:12px;">—</span>'}</div>
    </div>
  `;

  // Negative reviews expandable detail
  const negReviews = gd.negative_reviews || [];
  if (negReviews.length) {
    document.getElementById('insightsNegDetail').innerHTML = `
      <div class="neg-reviews-toggle" onclick="const list=this.nextElementSibling;list.classList.toggle('open');this.textContent=list.classList.contains('open')?'▾ Verberg negatieve reviews':'▸ ${negReviews.length} negatieve reviews bekijken'">▸ ${negReviews.length} negatieve reviews bekijken</div>
      <div class="neg-reviews-list">
        ${negReviews.map(r => `<div class="neg-review-item">
          <div class="neg-review-header">
            <span class="neg-stars">${'⭐'.repeat(r.stars)}</span>
            <strong>${r.author}</strong>
            <span style="color:#888;font-size:11px;margin-left:6px;">${r.date}</span>
            ${r.replied ? '<span class="replied-badge">✅ beantwoord</span>' : '<span class="unreplied-badge">⚠️ onbeantwoord</span>'}
          </div>
          <div class="neg-review-text">${r.text.substring(0, 300)}${r.text.length > 300 ? '…' : ''}</div>
        </div>`).join('')}
      </div>
    `;
  }
}

function renderExtraReviews() {
  const rd = window._allReviewData;
  if (!rd) return;
  
  // LaserMaxx
  if (rd.lasermaxx) {
    const el = document.getElementById('lmCount');
    if (el) el.textContent = fmt(rd.lasermaxx.total);
    const latestEl = document.getElementById('lmLatest');
    if (latestEl && rd.lasermaxx.reviews && rd.lasermaxx.reviews.length) {
      latestEl.textContent = 'Laatste: ' + rd.lasermaxx.reviews[0].date;
    }
  }
  
  // Roller GX
  if (rd.roller_gx && rd.roller_gx.total > 0) {
    const avg = rd.roller_gx.avg_rating || rd.combined?.sources?.roller_gx?.avg_rating || 0;
    const avgEl = document.getElementById('gxAvg');
    const starsEl = document.getElementById('gxStars');
    const countEl = document.getElementById('gxCount');
    const fansEl = document.getElementById('gxFans');
    if (avgEl) avgEl.textContent = avg ? avg.toFixed(1) : '—';
    if (starsEl && avg) starsEl.innerHTML = starsHtml(avg, 'stars');
    if (countEl) countEl.textContent = fmt(rd.roller_gx.total);
    if (fansEl) fansEl.textContent = fmt(rd.roller_gx.total);
  }

  // Combined review total badge
  if (rd.combined && rd.combined.total_reviews) {
    const badge = document.getElementById('combinedBadge');
    if (badge) {
      badge.innerHTML = `<strong>${fmt(rd.combined.total_reviews)}</strong> reviews totaal · <strong>${rd.combined.weighted_avg_rating}★</strong> gewogen gemiddelde`;
      badge.style.display = '';
    }
  }
}

function fmt(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString('nl-NL');
}

// Find data entry closest to N days ago
function getAgo(data, latestIdx, daysAgo) {
  if (daysAgo === 0) return data[latestIdx];
  const latestDate = new Date(data[latestIdx].date + 'T12:00:00');
  const targetDate = new Date(latestDate);
  targetDate.setDate(targetDate.getDate() - daysAgo);
  const targetStr = targetDate.toISOString().slice(0, 10);

  // Find exact or closest earlier entry
  for (let i = latestIdx; i >= 0; i--) {
    if (data[i].date <= targetStr) return data[i];
  }
  return null;
}

function growthHtml(current, compare) {
  if (current == null || compare == null) return '<span class="growth-val neutral">—</span>';
  const diff = current - compare;
  if (diff === 0) return '<span class="growth-val neutral">0</span>';
  const cls = diff > 0 ? 'up' : 'down';
  const sign = diff > 0 ? '+' : '';
  // For ratings (small numbers with decimals)
  if (!Number.isInteger(diff) || (Math.abs(current) < 10 && !Number.isInteger(current))) {
    return `<span class="growth-val ${cls}">${sign}${diff.toFixed(1)}</span>`;
  }
  return `<span class="growth-val ${cls}">${sign}${diff}</span>`;
}

function growthRow(data, latestIdx, getValue) {
  const current = getValue(data[latestIdx]);
  const d1 = getAgo(data, latestIdx, 1);
  const d7 = getAgo(data, latestIdx, 7);
  const d14 = getAgo(data, latestIdx, 14);
  const d30 = getAgo(data, latestIdx, 30);

  return `<div class="growth-row">
    <div class="growth-item">
      <div class="growth-label">1d</div>
      ${growthHtml(current, d1 ? getValue(d1) : null)}
    </div>
    <div class="growth-item">
      <div class="growth-label">7d</div>
      ${growthHtml(current, d7 ? getValue(d7) : null)}
    </div>
    <div class="growth-item">
      <div class="growth-label">14d</div>
      ${growthHtml(current, d14 ? getValue(d14) : null)}
    </div>
    <div class="growth-item">
      <div class="growth-label">30d</div>
      ${growthHtml(current, d30 ? getValue(d30) : null)}
    </div>
  </div>`;
}

function starsHtml(rating, cssClass) {
  if (!rating) return '';
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.3;
  return `<span class="${cssClass}">${'★'.repeat(full)}${half ? '½' : ''}${'☆'.repeat(5 - full - (half ? 1 : 0))}</span>`;
}

async function loadData() {
  try {
    const _session = JSON.parse(localStorage.getItem('au_session') || 'null');
    if (!_session || !_session.code) { window.location.href = 'index.html'; return; }
    const code = _session.code;
    const [r, grRes, allRevRes] = await Promise.all([
      fetch(`${API}/api/social-stats`, { headers: { 'X-Access-Code': code } }),
      fetch(`${API}/api/google-reviews`, { headers: { 'X-Access-Code': code } }).catch(() => null),
      fetch(`${API}/api/reviews`, { headers: { 'X-Access-Code': code } }).catch(() => null)
    ]);
    const data = await r.json();
    let googleReviewData = null;
    try { if (grRes && grRes.ok) googleReviewData = await grRes.json(); } catch(e) {}
    window._googleReviewData = googleReviewData;
    let allReviewData = null;
    try { if (allRevRes && allRevRes.ok) allReviewData = await allRevRes.json(); } catch(e) {}
    window._allReviewData = allReviewData;
    if (!Array.isArray(data) || data.length === 0) {
      document.getElementById('app').innerHTML = '<div class="loading">Nog geen data beschikbaar.</div>';
      return;
    }
    render(data);
    renderGoogleInsights();
    renderExtraReviews();
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="loading">Fout bij laden: ${e.message}</div>`;
  }
}

let followersChartInstance = null;
let reviewsChartInstance = null;

function setDays(days, btn) {
  const data = window._socialData;
  if (!data) return;
  const slice = days > 0 ? data.slice(-days) : data;

  if (btn) {
    btn.closest('.period-btns').querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  const labels = slice.map(d => {
    const dt = new Date(d.date + 'T12:00:00');
    return dt.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
  });

  if (followersChartInstance) followersChartInstance.destroy();
  const ctx = document.getElementById('followersChart').getContext('2d');
  followersChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Instagram', data: slice.map(d => d.instagram?.followers || null), borderColor: '#e1306c', borderWidth: 2, pointRadius: 0, tension: 0.3 },
        { label: 'TikTok', data: slice.map(d => d.tiktok?.followers || null), borderColor: '#00f2ea', borderWidth: 2, pointRadius: 0, tension: 0.3 },
        { label: 'Facebook', data: slice.map(d => d.facebook?.followers || null), borderColor: '#1877f2', borderWidth: 2, pointRadius: 0, tension: 0.3 },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#9ca3af', font: { size: 11 }, usePointStyle: true, pointStyle: 'circle' } } },
      scales: {
        x: { ticks: { color: '#9ca3af', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: '#2a2d3a' } },
        y: { ticks: { color: '#9ca3af', font: { size: 10 } }, grid: { color: '#2a2d3a' } }
      }
    }
  });
}

function setReviewDays(days, btn) {
  const data = window._socialData;
  if (!data) return;
  const slice = days > 0 ? data.slice(-days) : data;

  if (btn) {
    btn.closest('.period-btns').querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  const labels = slice.map(d => {
    const dt = new Date(d.date + 'T12:00:00');
    return dt.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
  });

  if (reviewsChartInstance) reviewsChartInstance.destroy();
  const ctx = document.getElementById('reviewsChart').getContext('2d');
  reviewsChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Google Reviews', data: slice.map(d => d.google_reviews?.review_count || null), borderColor: '#fbbc04', backgroundColor: 'rgba(251,188,4,0.1)', borderWidth: 2, pointRadius: 0, tension: 0.3, fill: true },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#9ca3af', font: { size: 11 }, usePointStyle: true, pointStyle: 'circle' } } },
      scales: {
        x: { ticks: { color: '#9ca3af', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: '#2a2d3a' } },
        y: { min: 1000, max: 1500, ticks: { color: '#fbbc04', font: { size: 10 } }, grid: { color: '#2a2d3a' } }
      }
    }
  });
}
