<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Social Stats — Almere Underground</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #9ca3af;
    --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    --tt-cyan: #00f2ea;
    --tt-pink: #ff0050;
    --google-gold: #fbbc04;
    --fb-blue: #1877f2;
    --yt-red: #ff0000;
    --tp-green: #00b67a;
    --ta-green: #34e0a1;
    --dw-orange: #ff8c00;
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }
  .header {
    padding: 0;
  }

  .section-title {
    max-width: 600px;
    margin: 20px auto 10px;
    font-size: 1.1rem;
    font-weight: 700;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    max-width: 600px;
    margin: 0 auto 8px;
  }
  @media (min-width: 500px) {
    .cards { grid-template-columns: 1fr 1fr; }
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .card.instagram::before { background: var(--ig-gradient); }
  .card.tiktok::before { background: linear-gradient(90deg, var(--tt-cyan), var(--tt-pink)); }
  .card.google::before { background: var(--google-gold); }
  .card.facebook::before { background: var(--fb-blue); }
  .card.youtube::before { background: var(--yt-red); }
  .card.trustpilot::before { background: var(--tp-green); }
  .card.tripadvisor::before { background: var(--ta-green); }
  .card.dagjeweg::before { background: var(--dw-orange); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .card-icon { font-size: 1.5rem; }
  .card-title { font-size: 0.9rem; font-weight: 600; }
  .card-title small {
    display: block;
    color: var(--muted);
    font-size: 0.7rem;
    font-weight: 400;
  }
  .main-metric {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 8px;
  }
  .main-value {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .main-label {
    color: var(--muted);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .secondary-metric {
    color: var(--muted);
    font-size: 0.78rem;
    margin-bottom: 10px;
  }
  .secondary-metric span { color: var(--text); font-weight: 600; }
  .stars { color: var(--google-gold); font-size: 0.8rem; }
  .stars-tp { color: var(--tp-green); font-size: 0.8rem; }
  .stars-ta { color: var(--ta-green); font-size: 0.8rem; }
  .stars-dw { color: var(--dw-orange); font-size: 0.8rem; }

  .growth-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    padding: 8px 4px;
  }
  .growth-item {
    text-align: center;
  }
  .growth-label {
    color: var(--muted);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 2px;
  }
  .growth-val {
    font-size: 0.8rem;
    font-weight: 600;
  }
  .growth-val.up { color: var(--green); }
  .growth-val.down { color: var(--red); }
  .growth-val.neutral { color: var(--muted); }

  .chart-container {
    max-width: 600px;
    margin: 12px auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .chart-title { font-size: 0.95rem; font-weight: 600; }
  .period-btns { display: flex; gap: 4px; }
  .period-btn {
    background: var(--border);
    border: none;
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 0.72rem;
    cursor: pointer;
  }
  .period-btn.active { background: #3b82f6; color: white; }
  canvas { width: 100% !important; height: 200px !important; }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .loading .spinner {
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .last-update {
    text-align: center;
    color: var(--muted);
    font-size: 0.72rem;
    margin-top: 16px;
  }
  .back-link {
    display: block;
    text-align: center;
    color: #3b82f6;
    text-decoration: none;
    font-size: 0.85rem;
    margin-top: 12px;
    padding: 8px;
  }

    /* ── Desktop / View Mode ────────────────────────── */
    body.desktop-mode .cards,
    body.force-desktop .cards { max-width:900px; grid-template-columns: repeat(4, 1fr); }
    body.desktop-mode .section-title,
    body.force-desktop .section-title { max-width:900px; }
    body.desktop-mode .chart-container,
    body.force-desktop .chart-container { max-width:900px; }

    body.force-mobile .cards { max-width:400px !important; grid-template-columns: 1fr !important; }
    body.force-mobile .section-title,
    body.force-mobile .chart-container,


    /* View toggle */
    .view-toggle { background:#1a1a24; border:1px solid #2a2a38; color:#aaa; border-radius:8px; padding:5px 8px; font-size:13px; cursor:pointer; }
    .view-toggle:hover { border-color:#7c3aed; color:#e0e0f0; }

  </style>
</head>
<body>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <div>
      <a href="index.html" style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;text-decoration:none;">← Almere Underground</a>
      <div style="font-size:20px;font-weight:800;">📊 Social Stats</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <select id="lang-select" onchange="setLang(this.value)" title="Language / Taal">
        <option value="nl">🇳🇱 NL</option>
        <option value="en">🇬🇧 EN</option>
      </select>
      <button id="view-toggle-btn" class="view-toggle" onclick="toggleViewMode()" title="Wissel weergave">🖥️</button>
      <button id="refresh-btn" onclick="loadData()" style="background:#1a1a24;border:1px solid #2a2a38;color:#aaa;border-radius:8px;padding:6px 10px;font-size:16px;cursor:pointer;line-height:1;" title="Data verversen">🔄</button>
    </div>
  </div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div>Data laden...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>

// ── View Mode Toggle ─────────────────────────────────────────────────────────
function setLang(l) { /* Social Stats is NL-only for now */ }

function getViewMode() { return localStorage.getItem('au_view_mode') || 'auto'; }
function applyViewMode() {
  const mode = getViewMode();
  document.body.classList.remove('desktop-mode','force-desktop','force-mobile');
  if (mode === 'desktop') document.body.classList.add('force-desktop');
  else if (mode === 'mobile') document.body.classList.add('force-mobile');
  else if (window.innerWidth >= 768) document.body.classList.add('desktop-mode');
  const btn = document.getElementById('view-toggle-btn');
  if (btn) btn.textContent = mode === 'desktop' ? '📱' : mode === 'mobile' ? '🖥️' : (window.innerWidth >= 768 ? '📱' : '🖥️');
  if (btn) btn.title = {auto:'Automatisch — klik om te wisselen', desktop:'Desktop geforceerd', mobile:'Mobiel geforceerd'}[mode];
}
function toggleViewMode() {
  const modes = ['auto','desktop','mobile'];
  const cur = getViewMode();
  const next = modes[(modes.indexOf(cur)+1)%3];
  localStorage.setItem('au_view_mode', next);
  applyViewMode();
}
function isWideView() {
  const m = getViewMode();
  return m === 'desktop' || (m === 'auto' && window.innerWidth >= 768);
}
window.addEventListener('resize', applyViewMode);


const API = 'https://api.almereunderground.com';

function fmt(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString('nl-NL');
}

// Find data entry closest to N days ago
function getAgo(data, latestIdx, daysAgo) {
  if (daysAgo === 0) return data[latestIdx];
  const latestDate = new Date(data[latestIdx].date + 'T12:00:00');
  const targetDate = new Date(latestDate);
  targetDate.setDate(targetDate.getDate() - daysAgo);
  const targetStr = targetDate.toISOString().slice(0, 10);

  // Find exact or closest earlier entry
  for (let i = latestIdx; i >= 0; i--) {
    if (data[i].date <= targetStr) return data[i];
  }
  return null;
}

function growthHtml(current, compare) {
  if (current == null || compare == null) return '<span class="growth-val neutral">—</span>';
  const diff = current - compare;
  if (diff === 0) return '<span class="growth-val neutral">0</span>';
  const cls = diff > 0 ? 'up' : 'down';
  const sign = diff > 0 ? '+' : '';
  // For ratings (small numbers with decimals)
  if (!Number.isInteger(diff) || (Math.abs(current) < 10 && !Number.isInteger(current))) {
    return `<span class="growth-val ${cls}">${sign}${diff.toFixed(1)}</span>`;
  }
  return `<span class="growth-val ${cls}">${sign}${diff}</span>`;
}

function growthRow(data, latestIdx, getValue) {
  const current = getValue(data[latestIdx]);
  const d1 = getAgo(data, latestIdx, 1);
  const d7 = getAgo(data, latestIdx, 7);
  const d14 = getAgo(data, latestIdx, 14);
  const d30 = getAgo(data, latestIdx, 30);

  return `<div class="growth-row">
    <div class="growth-item">
      <div class="growth-label">1d</div>
      ${growthHtml(current, d1 ? getValue(d1) : null)}
    </div>
    <div class="growth-item">
      <div class="growth-label">7d</div>
      ${growthHtml(current, d7 ? getValue(d7) : null)}
    </div>
    <div class="growth-item">
      <div class="growth-label">14d</div>
      ${growthHtml(current, d14 ? getValue(d14) : null)}
    </div>
    <div class="growth-item">
      <div class="growth-label">30d</div>
      ${growthHtml(current, d30 ? getValue(d30) : null)}
    </div>
  </div>`;
}

function starsHtml(rating, cssClass) {
  if (!rating) return '';
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.3;
  return `<span class="${cssClass}">${'★'.repeat(full)}${half ? '½' : ''}${'☆'.repeat(5 - full - (half ? 1 : 0))}</span>`;
}

async function loadData() {
  try {
    const _session = JSON.parse(localStorage.getItem('au_session') || 'null');
    if (!_session || !_session.code) { window.location.href = 'index.html'; return; }
    const code = _session.code;
    const r = await fetch(`${API}/api/social-stats`, {
      headers: { 'X-Access-Code': code }
    });
    const data = await r.json();
    if (!Array.isArray(data) || data.length === 0) {
      document.getElementById('app').innerHTML = '<div class="loading">Nog geen data beschikbaar.</div>';
      return;
    }
    render(data);
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="loading">Fout bij laden: ${e.message}</div>`;
  }
}

function render(data) {
  const li = data.length - 1;
  const latest = data[li];
  const ig = latest.instagram || {};
  const tt = latest.tiktok || {};
  const fb = latest.facebook || {};
  const yt = latest.youtube || {};
  const gr = latest.google_reviews || {};
  const tp = latest.trustpilot || {};
  const ta = latest.tripadvisor || {};
  const dw = latest.dagjeweg || {};

  document.getElementById('app').innerHTML = `
    <!-- SOCIALS SECTION -->
    <div class="section-title">📱 Socials <span class="line"></span></div>
    <div class="cards">
      <!-- Instagram -->
      <div class="card instagram">
        <div class="card-header">
          <span class="card-icon">📸</span>
          <div class="card-title">Instagram<small>@almereunderground</small></div>
        </div>
        <div class="main-metric">
          <span class="main-value">${fmt(ig.followers)}</span>
          <span class="main-label">volgers</span>
        </div>
        <div class="secondary-metric"><span>${fmt(ig.posts)}</span> posts</div>
        ${growthRow(data, li, d => d.instagram?.followers)}
      </div>

      <!-- TikTok -->
      <div class="card tiktok">
        <div class="card-header">
          <span class="card-icon">🎵</span>
          <div class="card-title">TikTok<small>@almereunderground</small></div>
        </div>
        <div class="main-metric">
          <span class="main-value">${fmt(tt.followers)}</span>
          <span class="main-label">volgers</span>
        </div>
        <div class="secondary-metric"><span>${fmt(tt.likes)}</span> likes</div>
        ${growthRow(data, li, d => d.tiktok?.followers)}
      </div>

      <!-- Facebook -->
      <div class="card facebook">
        <div class="card-header">
          <span class="card-icon">👍</span>
          <div class="card-title">Facebook<small>Almere Underground</small></div>
        </div>
        <div class="main-metric">
          <span class="main-value">${fmt(fb.followers)}</span>
          <span class="main-label">volgers</span>
        </div>
        ${growthRow(data, li, d => d.facebook?.followers)}
      </div>

      <!-- YouTube -->
      <div class="card youtube">
        <div class="card-header">
          <span class="card-icon">▶️</span>
          <div class="card-title">YouTube<small>@AlmereUnderground</small></div>
        </div>
        <div class="main-metric">
          <span class="main-value">${fmt(yt.subscribers)}</span>
          <span class="main-label">subs</span>
        </div>
        ${growthRow(data, li, d => d.youtube?.subscribers)}
      </div>
    </div>

    <!-- Followers trend chart (between socials and reviews) -->
    <div class="chart-container">
      <div class="chart-header">
        <span class="chart-title">📈 Volgers trend</span>
        <div class="period-btns">
          <button class="period-btn active" onclick="setDays(30, this)">30d</button>
          <button class="period-btn" onclick="setDays(90, this)">90d</button>
          <button class="period-btn" onclick="setDays(0, this)">Alles</button>
        </div>
      </div>
      <canvas id="followersChart"></canvas>
    </div>

    <!-- REVIEWS SECTION -->
    <div class="section-title">⭐ Reviews <span class="line"></span></div>
    <div class="cards">
      <!-- Google Reviews -->
      <div class="card google">
        <div class="card-header">
          <span class="card-icon">⭐</span>
          <div class="card-title">Google Reviews<small>Maps & Zoeken</small></div>
        </div>
        <div class="main-metric">
          <span class="main-value">${gr.rating || '—'}</span>
          <span class="main-label">${starsHtml(gr.rating, 'stars')}</span>
        </div>
        <div class="secondary-metric"><span>${fmt(gr.review_count)}</span> reviews</div>
        ${growthRow(data, li, d => d.google_reviews?.review_count)}
      </div>

      <!-- Trustpilot -->
      <div class="card trustpilot">
        <div class="card-header">
          <span class="card-icon">🟢</span>
          <div class="card-title">Trustpilot<small>almereunderground.nl</small></div>
        </div>
        <div class="main-metric">
          <span class="main-value">${tp.rating || '—'}</span>
          <span class="main-label">${starsHtml(tp.rating, 'stars-tp')}</span>
        </div>
        <div class="secondary-metric"><span>${fmt(tp.review_count)}</span> reviews</div>
        ${growthRow(data, li, d => d.trustpilot?.review_count)}
      </div>

      <!-- TripAdvisor -->
      <div class="card tripadvisor">
        <div class="card-header">
          <span class="card-icon">🦉</span>
          <div class="card-title">TripAdvisor<small>Family Entertainment Center</small></div>
        </div>
        <div class="main-metric">
          <span class="main-value">${ta.rating || '—'}</span>
          <span class="main-label">${starsHtml(ta.rating, 'stars-ta')}</span>
        </div>
        <div class="secondary-metric"><span>${fmt(ta.review_count)}</span> reviews</div>
        ${growthRow(data, li, d => d.tripadvisor?.review_count)}
      </div>

      <!-- Dagjeweg -->
      <div class="card dagjeweg">
        <div class="card-header">
          <span class="card-icon">🎡</span>
          <div class="card-title">Dagjeweg.nl<small>Uitjes & Reviews</small></div>
        </div>
        <div class="main-metric">
          <span class="main-value">${dw.rating || '—'}</span>
          <span class="main-label">${dw.rating ? '<span class="stars-dw">' + '★'.repeat(Math.round(dw.rating/2)) + '☆'.repeat(5-Math.round(dw.rating/2)) + '</span> /10' : ''}</span>
        </div>
        <div class="secondary-metric"><span>${fmt(dw.reviews)}</span> reviews</div>
        ${growthRow(data, li, d => d.dagjeweg?.reviews)}
      </div>
    </div>

    <!-- Reviews trend chart (Google only) -->
    <div class="chart-container">
      <div class="chart-header">
        <span class="chart-title">⭐ Reviews trend</span>
        <div class="period-btns">
          <button class="period-btn active" onclick="setReviewDays(30, this)">30d</button>
          <button class="period-btn" onclick="setReviewDays(90, this)">90d</button>
          <button class="period-btn" onclick="setReviewDays(0, this)">Alles</button>
        </div>
      </div>
      <canvas id="reviewsChart"></canvas>
    </div>

    <div class="last-update">Laatste verversing: ${latest.date} ${new Date().toLocaleTimeString("nl-NL", {hour:"2-digit",minute:"2-digit"})}</div>
    <a class="back-link" href="index.html">← Terug naar menu</a>
  `;

  window._socialData = data;
  setDays(30);
  setReviewDays(30);
}

let followersChartInstance = null;
let reviewsChartInstance = null;

function setDays(days, btn) {
  const data = window._socialData;
  if (!data) return;
  const slice = days > 0 ? data.slice(-days) : data;

  if (btn) {
    btn.closest('.period-btns').querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  const labels = slice.map(d => {
    const dt = new Date(d.date + 'T12:00:00');
    return dt.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
  });

  if (followersChartInstance) followersChartInstance.destroy();
  const ctx = document.getElementById('followersChart').getContext('2d');
  followersChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Instagram', data: slice.map(d => d.instagram?.followers || null), borderColor: '#e1306c', borderWidth: 2, pointRadius: 0, tension: 0.3 },
        { label: 'TikTok', data: slice.map(d => d.tiktok?.followers || null), borderColor: '#00f2ea', borderWidth: 2, pointRadius: 0, tension: 0.3 },
        { label: 'Facebook', data: slice.map(d => d.facebook?.followers || null), borderColor: '#1877f2', borderWidth: 2, pointRadius: 0, tension: 0.3 },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#9ca3af', font: { size: 11 }, usePointStyle: true, pointStyle: 'circle' } } },
      scales: {
        x: { ticks: { color: '#9ca3af', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: '#2a2d3a' } },
        y: { ticks: { color: '#9ca3af', font: { size: 10 } }, grid: { color: '#2a2d3a' } }
      }
    }
  });
}

function setReviewDays(days, btn) {
  const data = window._socialData;
  if (!data) return;
  const slice = days > 0 ? data.slice(-days) : data;

  if (btn) {
    btn.closest('.period-btns').querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  const labels = slice.map(d => {
    const dt = new Date(d.date + 'T12:00:00');
    return dt.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
  });

  if (reviewsChartInstance) reviewsChartInstance.destroy();
  const ctx = document.getElementById('reviewsChart').getContext('2d');
  reviewsChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Google Reviews', data: slice.map(d => d.google_reviews?.review_count || null), borderColor: '#fbbc04', backgroundColor: 'rgba(251,188,4,0.1)', borderWidth: 2, pointRadius: 0, tension: 0.3, fill: true },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#9ca3af', font: { size: 11 }, usePointStyle: true, pointStyle: 'circle' } } },
      scales: {
        x: { ticks: { color: '#9ca3af', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: '#2a2d3a' } },
        y: { min: 1000, max: 1500, ticks: { color: '#fbbc04', font: { size: 10 } }, grid: { color: '#2a2d3a' } }
      }
    }
  });
}

loadData();
</script>
</body>
</html>
