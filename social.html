<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Social Stats — Almere Underground</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #9ca3af;
    --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    --tt-cyan: #00f2ea;
    --tt-pink: #ff0050;
    --google-gold: #fbbc04;
    --fb-blue: #1877f2;
    --yt-red: #ff0000;
    --tp-green: #00b67a;
    --ta-green: #34e0a1;
    --dw-orange: #ff8c00;
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }
  .header {
    text-align: center;
    padding: 20px 0;
  }
  .header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .header .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
  }
  .cards {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    max-width: 600px;
    margin: 0 auto 24px;
  }
  @media (min-width: 500px) {
    .cards { grid-template-columns: 1fr 1fr; }
    .card.wide { grid-column: 1 / -1; }
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .card.instagram::before { background: var(--ig-gradient); }
  .card.tiktok::before { background: linear-gradient(90deg, var(--tt-cyan), var(--tt-pink)); }
  .card.google::before { background: var(--google-gold); }
  .card.facebook::before { background: var(--fb-blue); }
  .card.youtube::before { background: var(--yt-red); }
  .card.trustpilot::before { background: var(--tp-green); }
  .card.tripadvisor::before { background: var(--ta-green); }
  .card.dagjeweg::before { background: var(--dw-orange); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .card-icon { font-size: 1.5rem; }
  .card-title {
    font-size: 0.9rem;
    font-weight: 600;
  }
  .card-title small {
    display: block;
    color: var(--muted);
    font-size: 0.7rem;
    font-weight: 400;
  }
  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .metrics.single { grid-template-columns: 1fr; }
  .metric { text-align: center; }
  .metric-value {
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .metric-label {
    color: var(--muted);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .metric-change {
    font-size: 0.75rem;
    margin-top: 2px;
  }
  .metric-change.up { color: var(--green); }
  .metric-change.down { color: var(--red); }
  .metric-change.neutral { color: var(--muted); }

  .chart-container {
    max-width: 600px;
    margin: 0 auto 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .chart-title {
    font-size: 0.95rem;
    font-weight: 600;
  }
  .period-btns {
    display: flex;
    gap: 4px;
  }
  .period-btn {
    background: var(--border);
    border: none;
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 0.72rem;
    cursor: pointer;
  }
  .period-btn.active {
    background: #3b82f6;
    color: white;
  }
  canvas { width: 100% !important; height: 200px !important; }
  
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .loading .spinner {
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .stars { color: var(--google-gold); }
  .stars-tp { color: var(--tp-green); }
  .stars-ta { color: var(--ta-green); }
  .stars-dw { color: var(--dw-orange); }
  .last-update {
    text-align: center;
    color: var(--muted);
    font-size: 0.72rem;
    margin-top: 16px;
  }
  .back-link {
    display: block;
    text-align: center;
    color: #3b82f6;
    text-decoration: none;
    font-size: 0.85rem;
    margin-top: 12px;
    padding: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📊 Social Stats</h1>
  <div class="subtitle">Almere Underground — Social Media & Reviews</div>
</div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div>Data laden...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
const API = 'https://almere-underground.frankkeijzer.workers.dev';

function fmt(n) {
  if (n == null) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toLocaleString('nl-NL');
}

function changeText(current, previous, suffix = '') {
  if (previous == null || current == null) return '<span class="metric-change neutral">—</span>';
  const diff = current - previous;
  if (diff === 0) return '<span class="metric-change neutral">0</span>';
  const cls = diff > 0 ? 'up' : 'down';
  const sign = diff > 0 ? '+' : '';
  const display = typeof current === 'number' && current < 10 ? diff.toFixed(1) : fmt(Math.abs(diff));
  return `<span class="metric-change ${cls}">${sign}${typeof current === 'number' && current < 10 ? diff.toFixed(1) : (diff > 0 ? '+' : '') + fmt(Math.abs(diff))}${suffix}</span>`;
}

function chg(current, previous) {
  if (previous == null || current == null) return '<span class="metric-change neutral">—</span>';
  const diff = current - previous;
  if (diff === 0) return '<span class="metric-change neutral">0</span>';
  const cls = diff > 0 ? 'up' : 'down';
  const sign = diff > 0 ? '+' : '';
  if (Number.isInteger(diff)) return `<span class="metric-change ${cls}">${sign}${diff}</span>`;
  return `<span class="metric-change ${cls}">${sign}${diff.toFixed(1)}</span>`;
}

function starsHtml(rating, cssClass) {
  if (!rating) return '';
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.3;
  return `<span class="${cssClass}">${'★'.repeat(full)}${half ? '½' : ''}${'☆'.repeat(5 - full - (half ? 1 : 0))}</span>`;
}

async function loadData() {
  try {
    const code = localStorage.getItem('au_access_code') || '';
    const r = await fetch(`${API}/api/social-stats`, {
      headers: code ? { 'X-Access-Code': code } : {}
    });
    const data = await r.json();
    if (!Array.isArray(data) || data.length === 0) {
      document.getElementById('app').innerHTML = '<div class="loading">Nog geen data beschikbaar.</div>';
      return;
    }
    render(data);
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="loading">Fout bij laden: ${e.message}</div>`;
  }
}

function render(data) {
  const latest = data[data.length - 1];
  const yesterday = data.length > 1 ? data[data.length - 2] : null;

  const ig = latest.instagram || {};
  const tt = latest.tiktok || {};
  const gr = latest.google_reviews || {};
  const fb = latest.facebook || {};
  const yt = latest.youtube || {};
  const tp = latest.trustpilot || {};
  const ta = latest.tripadvisor || {};
  const dw = latest.dagjeweg || {};
  const igY = yesterday?.instagram || {};
  const ttY = yesterday?.tiktok || {};
  const grY = yesterday?.google_reviews || {};
  const fbY = yesterday?.facebook || {};
  const ytY = yesterday?.youtube || {};
  const tpY = yesterday?.trustpilot || {};
  const taY = yesterday?.tripadvisor || {};
  const dwY = yesterday?.dagjeweg || {};

  document.getElementById('app').innerHTML = `
    <div class="cards">
      <!-- Instagram -->
      <div class="card instagram">
        <div class="card-header">
          <span class="card-icon">📸</span>
          <div class="card-title">Instagram<small>@almereunderground</small></div>
        </div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-value">${fmt(ig.followers)}</div>
            <div class="metric-label">Volgers</div>
            ${chg(ig.followers, igY.followers)}
          </div>
          <div class="metric">
            <div class="metric-value">${fmt(ig.posts)}</div>
            <div class="metric-label">Posts</div>
            ${chg(ig.posts, igY.posts)}
          </div>
        </div>
      </div>

      <!-- TikTok -->
      <div class="card tiktok">
        <div class="card-header">
          <span class="card-icon">🎵</span>
          <div class="card-title">TikTok<small>@almereunderground</small></div>
        </div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-value">${fmt(tt.followers)}</div>
            <div class="metric-label">Volgers</div>
            ${chg(tt.followers, ttY.followers)}
          </div>
          <div class="metric">
            <div class="metric-value">${fmt(tt.likes)}</div>
            <div class="metric-label">Likes</div>
            ${chg(tt.likes, ttY.likes)}
          </div>
        </div>
      </div>

      <!-- Facebook -->
      <div class="card facebook">
        <div class="card-header">
          <span class="card-icon">👍</span>
          <div class="card-title">Facebook<small>Almere Underground</small></div>
        </div>
        <div class="metrics single">
          <div class="metric">
            <div class="metric-value">${fmt(fb.followers)}</div>
            <div class="metric-label">Volgers</div>
            ${chg(fb.followers, fbY.followers)}
          </div>
        </div>
      </div>

      <!-- YouTube -->
      <div class="card youtube">
        <div class="card-header">
          <span class="card-icon">▶️</span>
          <div class="card-title">YouTube<small>@AlmereUnderground</small></div>
        </div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-value">${fmt(yt.subscribers)}</div>
            <div class="metric-label">Subs</div>
            ${chg(yt.subscribers, ytY.subscribers)}
          </div>
          <div class="metric">
            <div class="metric-value">${fmt(yt.videos)}</div>
            <div class="metric-label">Video's</div>
            ${chg(yt.videos, ytY.videos)}
          </div>
        </div>
      </div>

      <!-- Google Reviews -->
      <div class="card google">
        <div class="card-header">
          <span class="card-icon">⭐</span>
          <div class="card-title">Google Reviews<small>Maps & Zoeken</small></div>
        </div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-value">${gr.rating || '—'}</div>
            <div class="metric-label">${starsHtml(gr.rating, 'stars')}</div>
            ${chg(gr.rating, grY.rating)}
          </div>
          <div class="metric">
            <div class="metric-value">${fmt(gr.review_count)}</div>
            <div class="metric-label">Reviews</div>
            ${chg(gr.review_count, grY.review_count)}
          </div>
        </div>
      </div>

      <!-- Trustpilot -->
      <div class="card trustpilot">
        <div class="card-header">
          <span class="card-icon">🟢</span>
          <div class="card-title">Trustpilot<small>almereunderground.nl</small></div>
        </div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-value">${tp.rating || '—'}</div>
            <div class="metric-label">${starsHtml(tp.rating, 'stars-tp')}</div>
            ${chg(tp.rating, tpY.rating)}
          </div>
          <div class="metric">
            <div class="metric-value">${fmt(tp.review_count)}</div>
            <div class="metric-label">Reviews</div>
            ${chg(tp.review_count, tpY.review_count)}
          </div>
        </div>
      </div>

      <!-- TripAdvisor -->
      <div class="card tripadvisor">
        <div class="card-header">
          <span class="card-icon">🦉</span>
          <div class="card-title">TripAdvisor<small>Family Entertainment Center</small></div>
        </div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-value">${ta.rating || '—'}</div>
            <div class="metric-label">${starsHtml(ta.rating, 'stars-ta')}</div>
            ${chg(ta.rating, taY.rating)}
          </div>
          <div class="metric">
            <div class="metric-value">${fmt(ta.review_count)}</div>
            <div class="metric-label">Reviews</div>
            ${chg(ta.review_count, taY.review_count)}
          </div>
        </div>
      </div>

      <!-- Dagjeweg -->
      <div class="card dagjeweg">
        <div class="card-header">
          <span class="card-icon">🎡</span>
          <div class="card-title">Dagjeweg.nl<small>Uitjes & Reviews</small></div>
        </div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-value">${dw.rating || '—'}</div>
            <div class="metric-label">${dw.rating ? '<span class="stars-dw">' + '★'.repeat(Math.round(dw.rating/2)) + '☆'.repeat(5-Math.round(dw.rating/2)) + '</span> /10' : ''}</div>
            ${chg(dw.rating, dwY.rating)}
          </div>
          <div class="metric">
            <div class="metric-value">${fmt(dw.reviews)}</div>
            <div class="metric-label">Reviews</div>
            ${chg(dw.reviews, dwY.reviews)}
          </div>
        </div>
      </div>
    </div>

    <!-- Followers trend chart -->
    <div class="chart-container">
      <div class="chart-header">
        <span class="chart-title">📈 Volgers trend</span>
        <div class="period-btns">
          <button class="period-btn active" onclick="setDays(30, this)">30d</button>
          <button class="period-btn" onclick="setDays(90, this)">90d</button>
          <button class="period-btn" onclick="setDays(0, this)">Alles</button>
        </div>
      </div>
      <canvas id="followersChart"></canvas>
    </div>

    <!-- Reviews trend chart -->
    <div class="chart-container">
      <div class="chart-header">
        <span class="chart-title">⭐ Reviews trend</span>
        <div class="period-btns">
          <button class="period-btn active" onclick="setReviewDays(30, this)">30d</button>
          <button class="period-btn" onclick="setReviewDays(90, this)">90d</button>
          <button class="period-btn" onclick="setReviewDays(0, this)">Alles</button>
        </div>
      </div>
      <canvas id="reviewsChart"></canvas>
    </div>

    <div class="last-update">Laatste update: ${latest.date}</div>
    <a class="back-link" href="index.html">← Terug naar menu</a>
  `;

  window._socialData = data;
  setDays(30);
  setReviewDays(30);
}

let followersChartInstance = null;
let reviewsChartInstance = null;

function setDays(days, btn) {
  const data = window._socialData;
  if (!data) return;
  const slice = days > 0 ? data.slice(-days) : data;
  
  if (btn) {
    btn.closest('.period-btns').querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  const labels = slice.map(d => {
    const dt = new Date(d.date + 'T12:00:00');
    return dt.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
  });

  if (followersChartInstance) followersChartInstance.destroy();
  const ctx = document.getElementById('followersChart').getContext('2d');
  followersChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Instagram', data: slice.map(d => d.instagram?.followers || null), borderColor: '#e1306c', borderWidth: 2, pointRadius: 0, tension: 0.3 },
        { label: 'TikTok', data: slice.map(d => d.tiktok?.followers || null), borderColor: '#00f2ea', borderWidth: 2, pointRadius: 0, tension: 0.3 },
        { label: 'Facebook', data: slice.map(d => d.facebook?.followers || null), borderColor: '#1877f2', borderWidth: 2, pointRadius: 0, tension: 0.3 },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#9ca3af', font: { size: 11 }, usePointStyle: true, pointStyle: 'circle' } } },
      scales: {
        x: { ticks: { color: '#9ca3af', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: '#2a2d3a' } },
        y: { ticks: { color: '#9ca3af', font: { size: 10 } }, grid: { color: '#2a2d3a' } }
      }
    }
  });
}

function setReviewDays(days, btn) {
  const data = window._socialData;
  if (!data) return;
  const slice = days > 0 ? data.slice(-days) : data;

  if (btn) {
    btn.closest('.period-btns').querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  const labels = slice.map(d => {
    const dt = new Date(d.date + 'T12:00:00');
    return dt.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
  });

  if (reviewsChartInstance) reviewsChartInstance.destroy();
  const ctx = document.getElementById('reviewsChart').getContext('2d');
  reviewsChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Google', data: slice.map(d => d.google_reviews?.review_count || null), borderColor: '#fbbc04', borderWidth: 2, pointRadius: 0, tension: 0.3, yAxisID: 'y' },
        { label: 'TripAdvisor', data: slice.map(d => d.tripadvisor?.review_count || null), borderColor: '#34e0a1', borderWidth: 2, pointRadius: 0, tension: 0.3, yAxisID: 'y' },
        { label: 'Trustpilot', data: slice.map(d => d.trustpilot?.review_count || null), borderColor: '#00b67a', borderWidth: 2, pointRadius: 0, tension: 0.3, yAxisID: 'y1' },
        { label: 'Dagjeweg', data: slice.map(d => d.dagjeweg?.reviews || null), borderColor: '#ff8c00', borderWidth: 2, pointRadius: 0, tension: 0.3, yAxisID: 'y1' },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#9ca3af', font: { size: 11 }, usePointStyle: true, pointStyle: 'circle' } } },
      scales: {
        x: { ticks: { color: '#9ca3af', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: '#2a2d3a' } },
        y: { position: 'left', ticks: { color: '#fbbc04', font: { size: 10 } }, grid: { color: '#2a2d3a' }, title: { display: true, text: 'Google / TA', color: '#9ca3af', font: { size: 10 } } },
        y1: { position: 'right', ticks: { color: '#00b67a', font: { size: 10 } }, grid: { display: false }, title: { display: true, text: 'Trustpilot', color: '#9ca3af', font: { size: 10 } } }
      }
    }
  });
}

loadData();
</script>
</body>
</html>
