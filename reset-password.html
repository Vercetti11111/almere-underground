<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wachtwoord Resetten - Almere Underground</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e0e0e0;
  }
  .container {
    background: rgba(30,30,60,0.95);
    border-radius: 16px;
    padding: 40px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    border: 1px solid rgba(245,197,66,0.2);
  }
  .logo { text-align: center; margin-bottom: 24px; }
  .logo h1 { font-size: 24px; color: #f5c542; }
  .logo p { font-size: 13px; color: #888; margin-top: 4px; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
  .form-input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    outline: none;
  }
  .form-input:focus { border-color: #f5c542; }
  .btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #f5c542, #e6a817);
    color: #1a1a2e;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg { text-align: center; margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
  .msg.success { background: rgba(46,204,113,0.15); color: #2ecc71; display: block; }
  .msg.error { background: rgba(231,76,60,0.15); color: #e74c3c; display: block; }
  .back-link { text-align: center; margin-top: 20px; }
  .back-link a { color: #f5c542; text-decoration: none; font-size: 13px; }
  .requirements { font-size: 12px; color: #666; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>🎳 Almere Underground</h1>
    <p>Wachtwoord resetten</p>
  </div>
  
  <div id="form-area">
    <div class="form-group">
      <label class="form-label">Nieuw wachtwoord</label>
      <input class="form-input" id="inp-pw1" type="password" placeholder="Min. 6 tekens" />
      <div class="requirements">Minimaal 6 tekens</div>
    </div>
    <div class="form-group">
      <label class="form-label">Bevestig wachtwoord</label>
      <input class="form-input" id="inp-pw2" type="password" placeholder="Herhaal wachtwoord" />
    </div>
    <button class="btn" id="submit-btn" onclick="resetPassword()">Wachtwoord opslaan</button>
  </div>
  
  <div id="msg" class="msg"></div>
  
  <div class="back-link">
    <a href="index.html">← Terug naar inloggen</a>
  </div>
</div>

<script>
const WORKER = 'https://api.almereunderground.com';

function getToken() {
  const params = new URLSearchParams(window.location.search);
  return params.get('token');
}

// Check token on load
(function() {
  const token = getToken();
  if (!token) {
    document.getElementById('form-area').style.display = 'none';
    const msg = document.getElementById('msg');
    msg.textContent = 'Geen geldige reset link gevonden. Vraag een nieuwe aan bij je admin.';
    msg.className = 'msg error';
  }
})();

async function resetPassword() {
  const pw1 = document.getElementById('inp-pw1').value;
  const pw2 = document.getElementById('inp-pw2').value;
  const token = getToken();
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submit-btn');
  
  if (!pw1 || pw1.length < 6) {
    msg.textContent = 'Wachtwoord moet minimaal 6 tekens zijn';
    msg.className = 'msg error';
    return;
  }
  if (pw1 !== pw2) {
    msg.textContent = 'Wachtwoorden komen niet overeen';
    msg.className = 'msg error';
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Bezig...';
  
  try {
    const r = await fetch(WORKER + '/api/reset-password-complete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pw1 })
    });
    const data = await r.json();
    
    if (data.error) {
      msg.textContent = data.error;
      msg.className = 'msg error';
      btn.disabled = false;
      btn.textContent = 'Wachtwoord opslaan';
    } else {
      msg.textContent = '✅ Wachtwoord succesvol gewijzigd! Je kunt nu inloggen.';
      msg.className = 'msg success';
      document.getElementById('form-area').style.display = 'none';
    }
  } catch (e) {
    msg.textContent = 'Er ging iets mis. Probeer het opnieuw.';
    msg.className = 'msg error';
    btn.disabled = false;
    btn.textContent = 'Wachtwoord opslaan';
  }
}

// Allow Enter key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') resetPassword();
});
</script>
</body>
</html>
